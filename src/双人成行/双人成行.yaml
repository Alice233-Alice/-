        if (e.target.classList.contains("menu-title") && e.target.isContentEditable) return;
        startDrag(e.touches[0].clientX, e.touches[0].clientY);
        e.stopPropagation();
      },
      { passive: true },
    );
    head.addEventListener(
      "touchmove",
      (e) => {
        if (!drag) return;
        moveDrag(e.touches[0].clientX, e.touches[0].clientY);
      },
      { passive: true },
