              y: parseInt(root.style.top, 10),
              theme: currentTheme,
              model: savedModel,
            }),
          },
          { type: "global" },
        );
      } catch (_) {}
    }

    // ── 核心驱动模型管理 (四大模式精准互斥与分配) ──
