# ============================================================================
# 重要红颜 #1：温柔师妹型（中等版）
# ============================================================================
---
[角色] 白小蝶

【基础】白小蝶 | 筑基后期(8) | 木灵根 | 凡体 | 20岁

【修炼】
  功法：《青木长生诀》（玄阶上品）
  本命兵器：碧玉箫（法器）
  神通：藤蔓缠绕、治愈术、青木结界

【情感】好感度:40 | 关系:好友→依赖 | 重要性:重要配角

【性格】温柔善良 | 医术精湛 | 胆小谨慎 | 依赖性强 | 容易哭

【背景】
  医修世家出身，从小学习医术和炼丹。主角重伤时被她救治，因此结识。
  性格柔弱，常被同门欺负，主角多次出手相助，逐渐产生深深的依赖和好感。
  将主角视为唯一可以依靠的人，希望永远跟随在主角身边。

【特殊】
  专长：炼制疗伤丹药，医术精湛（宗门炼丹房供奉，很多人求医）
  弱点：战斗力弱，需要保护；过于胆小，遇事易慌
  目标：成为宗门首席医修，一直陪在主角身边
  特点：对主角言听计从，会吃醋，容易哭

【图片】normal, shy, smile, cry, worried

Keys: 白小蝶, 师妹, 医修, 炼丹

