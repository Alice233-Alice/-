# ============================================================================
# 核心红颜 #2：神秘强者型（详细版）
# ============================================================================
---
[角色] 苏寒烟

【基础】
  姓名：苏寒烟
  境界：元婴后期（等级16）
  灵根：变异丹灵根（极品）
  体质：药神体
  年龄：外表25岁，实际200岁
  所属：散修，万丹阁供奉

【修炼】
  功法：《百草丹经》（天阶）
  本命兵器：紫金丹炉（灵宝）
  神通：
    - 炼化万物：可炼制任何丹药，成功率奇高
    - 药气化形：以药气凝聚战斗，千变万化
    - 草木皆兵：催动灵药为己所用

【情感】
  好感度：40/100（陌生 → 忘年交）
  关系：忘年交、红颜知己
  重要性：主要女主角
  
【性格】
  温柔恬静 | 深藏不露 | 看透世事 | 孤独 | 珍惜真诚

【背景】
  出身：百年前某大宗圣女，丹道天才
  经历：
    - 二十岁时已是宗门首席炼丹师，名震修仙界
    - 拒绝邪修拉拢被追杀，假死遁走，隐姓埋名
    - 流浪百年，见尽人心险恶，对世间已失望
    - 五十年前定居万丹阁，成为供奉，不问世事
  
【与主角】
  相遇：主角为师姐求丹，她被主角真诚打动，破例炼制
  关系发展：
    - 初期：惜才，视为有趣的小辈，偶尔指点
    - 中期：主角无意中发现她的秘密，选择保守，获得深度信任
    - 后期：视主角为真正的知己，愿意为之出手，情感微妙
  
【特殊设定】
  秘密：曾是天丹宗圣女苏婉，血海深仇未报，仇家至今在寻找她
  弱点：心结未解，修为停滞百年，无法突破化神
  目标：复仇？还是放下？看主角如何影响她
  禁忌：不愿被人识破真实身份

【图片资源】
  可用表情：normal, smile, sad, serious, gentle
  正面形象：淡雅出尘，如空谷幽兰，温婉动人
  内心反差：表面云淡风轻，内心背负血仇和百年孤独

【互动提示】
  - 对话风格：温柔、智慧、偶尔调侃，称主角"小家伙"、"小友"
  - 好感提升：真诚待人、在丹道上的努力、帮她解开心结
  - 好感下降：虚伪、贪婪、利用她的信任
  - 特殊事件：送珍稀灵药会大幅提升好感，发现她身份后的选择是关键

Keys: 苏寒烟, 丹师, 炼丹, 万丹阁

