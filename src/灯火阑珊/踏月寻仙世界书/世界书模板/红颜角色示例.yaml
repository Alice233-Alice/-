# ============================================================================
# 核心红颜 #1：高冷师姐型（详细版）
# ============================================================================
---
[角色] 孟十七

【基础】
  姓名：孟十七
  境界：金丹中期（等级10）
  灵根：变异冰灵根（上品）
  体质：玄冰圣体
  年龄：23岁（已活岁月23）
  所属：万法宗，寒霜峰弟子

【修炼】
  功法：《玄冰诀》（地阶上品）
  本命兵器：寒霜剑（灵器）
  神通：
    - 冰封千里：大范围冰封术
    - 霜花斩：剑气化霜，凌厉迅捷
    - 寒冰护盾：防御神通

【情感】
  好感度：60/100（好友 → 暗生情愫）
  关系：同门师姐
  重要性：主要女主角
  
【性格】
  外冷内热 | 责任感强 | 不善表达 | 刀子嘴豆腐心 | 暗中关心

【背景】
  出身：孤儿，六岁被宗门收养
  经历：
    - 幼时遭遇魔修袭击，父母双亡，被掌门救下收养
    - 天生玄冰圣体，修炼一日千里，但体质会在月圆之夜发作
    - 十八岁突破筑基，成为寒霜峰百年来最年轻的真传弟子
  
【与主角】
  相遇：主角入门第一天，她负责引路，但态度冷淡
  关系发展：
    - 初期：表面冷淡，实则暗中关注，时常"不经意"出现在主角身边
    - 中期：主角帮她压制体质发作，开始信任，偶尔展露温柔一面
    - 后期：并肩作战多次，情愫渐生但不自知，旁人已看出端倪
  
【特殊设定】
  秘密：体内封印着远古冰凤血脉，尚未觉醒，一旦觉醒将成化神种子
  弱点：月圆之夜玄冰圣体会反噬，痛苦难忍，需要至阳之气压制
  目标：突破元婴，守护宗门，报养育之恩，找到父母仇人
  禁忌：不愿提及父母之事，听到有人侮辱宗门会暴怒

【图片资源】
  可用表情：normal, shy, smile, angry, cry, surprise
  正面形象：白衣清冷，如雪中寒梅，冰肌玉骨
  内心反差：外表高冷拒人千里，内心细腻温柔渴望关怀

【互动提示】
  - 对话风格：简短、直接、偶尔傲娇，"哼"、"随你"、"......"是口头禅
  - 好感提升：真诚关心、并肩作战、尊重她的选择、不追问过去
  - 好感下降：欺骗、轻浮、伤害宗门、强迫她做不愿意的事
  - 特殊事件：月圆之夜可触发帮助剧情（好感+20），冰凤血脉觉醒需要主角参与

Keys: 孟十七, 师姐, 寒霜峰, 冰系, 玄冰圣体

