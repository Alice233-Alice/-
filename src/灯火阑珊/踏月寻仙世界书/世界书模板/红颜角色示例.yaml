# 重要红颜 #2：活泼师妹型（中等版）
# ============================================================================
---
[角色] 云灵儿

【基础】云灵儿 | 筑基初期(5) | 雷灵根 | 凡体 | 18岁

【修炼】
  功法：《紫霄雷诀》（玄阶中品）
  本命兵器：紫电鞭（法器）
  神通：雷遁、紫雷术、雷光闪

【情感】好感度:50 | 关系:崇拜→暗恋 | 重要性:重要配角

【性格】活泼开朗 | 好奇心强 | 冲动莽撞 | 崇拜强者 | 真诚直率

【背景】
  外门弟子，天赋出众但总是闯祸。因一次任务遇险被主角救下，从此崇拜主角。
  性格大大咧咧，口无遮拦，常常说出让人尴尬的话。
  修炼刻苦，想要追上主角的脚步，成为配得上主角的人。

【特殊】
  专长：雷系法术威力大，速度快
  弱点：容易冲动，不会隐藏情绪，战斗经验不足
  目标：突破金丹，成为内门弟子，追上主角
  特点：每天都要找主角说话，见不到就不开心

【图片】normal, smile, excited, pout, surprise

Keys: 云灵儿, 师妹, 雷系

