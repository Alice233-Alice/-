# ============================================================================
# 使用说明
# ============================================================================

1. 将以上内容复制到你的世界书中，每个 --- 分隔的部分是一个独立条目

2. 图片资源配置（如需要可视化卡片）：
   在 src/美化状态栏/character-assets.ts 中添加：
   
   export const CHARACTER_ASSETS = {
     孟十七: {
       normal: 'https://your-image-host.com/mengshiqi_normal.jpg',
       shy: 'https://your-image-host.com/mengshiqi_shy.jpg',
       // ... 其他表情
     },
     苏寒烟: {
       normal: 'https://your-image-host.com/suhanyan_normal.jpg',
       // ...
     },
     // ... 其他角色
   };

3. MVU 变量初始化（可选）：
   在 initvar.yaml 或第一条消息中添加：
   
   红颜:
     孟十七:
       等级: 10
       修为: 200
       灵根: "变异冰灵根"
       体质: "玄冰圣体"
       功法: "《玄冰诀》"
       本命兵器: "寒霜剑"
       神通列表:
         冰封千里: "大范围冰封术"
         霜花斩: "剑气化霜"
       灵石: 1000
       已活岁月: 23
       尝试突破: false
       好感度: 60
       关系: "同门师姐"
       重要性: "主要角色"

4. Token 统计：
   - 红颜索引: ~50 token
   - 孟十七（核心）: ~200 token
   - 苏寒烟（核心）: ~200 token
   - 白小蝶（重要）: ~100 token
   - 云灵儿（重要）: ~100 token
   - 夜无痕（次要）: ~40 token
   - 总计: ~730 token（未使用动态管理）
   - 实际激活: ~200-400 token（使用动态管理后）

5. 根据你的需求调整：
   - 增加/减少角色数量
   - 调整详细程度
   - 修改好感度起点和关系发展
   - 自定义性格和背景
   - 配置动态管理规则

祝创作愉快！💖