---
# 红尘劫剑录 - 功法技能体系
# 核心理念：将七情六欲化为剑意，情感越极致，剑意越强

# ============================================================================
# 核心心法
# ============================================================================

#1 红尘劫剑
技能类型：核心心法/被动
等级阶段：初窥门径
核心机制：将强烈情感（七情六欲）转化为不同属性的红尘剑意，情绪越极致，剑意越强
当前感悟：已融入【背叛之痛】【离别之苦】【无生杀意】等感悟，剑意更加凝练纯粹
提升方向：随情感历练加深而自然进阶

# ============================================================================
# 体质类被动
# ============================================================================

#2 冰肌血骨
技能类型：体质/被动
等级阶段：已激活
特性表现：肉身呈冰霜与赤雷共生形态，冰霜为骨提供防御与控制，赤雷为血提供毁灭性攻击
免疫效果：完全免疫雷电与冰霜伤害
进化状态：体内赤雷之力愈发活跃，隐现于皮肤之下

#3 无垢剑体
技能类型：体质/被动
等级阶段：已激活
体质特征：肉身如无垢琉璃，不染尘埃
核心能力：与【红尘·劫剑婴】达成共鸣，本能吸引并转化天地灵气，极大加快灵力恢复速度
战斗表现：在雷劫中展现恐怖恢复力，肉身碎裂后可迅速重组

#4 剑灵化形
技能类型：权能/被动
等级阶段：已激活
触发条件：完成与剑灵的深度认主
效果描述：剑灵可消耗能量，由灵体状态转化为拥有实体的人形

# ============================================================================
# 秘术类
# ============================================================================

#5 避天诀·残缺
技能类型：秘术/功法
等级阶段：小成
核心能力：收敛自身所有气息与灵力波动，直接作用于规则层面
具体效果：扭曲光线、改写轨迹、抹除生命气息，形成概念上"不存在"的结界
隐匿强度：使化神境以下修士无法通过任何方式察觉

#6 红尘·回响
技能类型：因果联系/被动
等级阶段：入门
触发条件：因果之人（林清雪）尚存于世且心存善念与期盼
核心效果：获得来自远方的念力加持，可建立共鸣守护神魂、抵御心魔
进阶能力：从对方念力中汲取力量，温养自身神魂

# ============================================================================
# 法则之力
# ============================================================================

#7 黄泉玄冥冰
技能类型：法则之力/主动
等级阶段：入门
力量来源：神之断指的残缺法则
法则属性：【静止】与【终结】
核心能力：释放能冻结万物乃至法则的绝对零度寒气

#8 红尘业火雷
技能类型：法则之力/主动
等级阶段：入门
力量来源：红尘劫雷蜕变而成
法则属性：【毁灭】与【欲望】
核心能力：释放能焚烧神魂、引动心魔业火的赤红雷霆

# ============================================================================
# 基础剑招
# ============================================================================

#9 红尘·葬仙
技能类型：基础剑招/主动
等级阶段：入门
灵根调动：变异冰雷灵根
攻击形态：将纯粹雷电之力凝聚成无形剑气或实体雷剑
特殊效果：极强穿透力与麻痹效果

#10 红尘·悲欢
技能类型：情感剑招/主动
等级阶段：小成
灵根调动：变异冰雷灵根
剑意来源：内心极度的悲凉与绝望
核心能力：化为极致深寒剑意，精准冻结敌方灵力运转节点
附加效果：使目标陷入绝望幻象中被冰封碎裂

#11 红尘·离恨
技能类型：诅咒剑招/主动
等级阶段：小成
剑意来源：被背叛后的彻骨之恨
伤害特性：不仅物理切割，更附带无法愈合的法则诅咒
进阶应用：可融入领域类剑招，形成大范围【迟缓】与【诅咒】效果

#12 一念·焚寂
技能类型：爆破剑招/主动
等级阶段：入门
核心机制：用绝对零度冰壳压缩极致雷霆之力，刺入目标体内后撤去冰壳引发内部毁灭性爆破
技巧特点：经识海推演后变得更为内敛和致命

# ============================================================================
# 防御与辅助
# ============================================================================

#13 剑守·琉璃血莲
技能类型：防御剑招/主动
等级阶段：入门
防御形态：以极寒玄冰凝聚半透明冰晶莲花完全包裹被保护者
防御特性：极强防御力，受损可瞬间自我修复
反哺效果：将部分伤害转化为纯净元气反哺被保护者

#14 红尘·赤丝缝魂
技能类型：治疗技能/主动
等级阶段：入门
真意核心：【红尘真意·强行团圆】
治疗手段：
  - 【冰魄微针】封锁痛觉神经，瞬间麻醉止血
  - 【赤丝穿引】以赤红雷线强行缝合血肉骨骼，刺激细胞高速再生
  - 【魂体同修】冰针红线探入识海，对受损神魂进行修补

# ============================================================================
# 身法与风格
# ============================================================================

#15 惊鸿·照影
技能类型：身法/主动
等级阶段：入门
移动方式：利用雷灵力进行爆发性瞬时移动
战术效果：在移动路径上留下冰霜残影，残影受攻击时自爆造成冰霜与雷电伤害

#16 红梅落雪
技能类型：战斗风格/主动
等级阶段：已确立
核心特征：所有剑气皆由冰霜构成，结构精密
击中效果：剑气碎裂后，内部包裹的暗红劫雷瞬间爆发如血梅绽放
持续伤害：附骨之疽般的雷霆钻入敌人骨髓，从内部焚烧殆尽

# ============================================================================
# 领域类剑招
# ============================================================================

#17 红尘·琉璃界
技能类型：领域剑招/主动
等级阶段：入门
施展方式：将剑插入地面，以极寒剑气冻结大范围地面
领域形态：升起无数六棱冰镜，形成巨大镜面迷宫
进阶组合：可与【红尘·离恨】结合，使每面镜子附带【迟缓】诅咒，通过无限折射叠加大幅限制敌人速度

#18 镜花水月·杀
技能类型：终结剑招/主动
等级阶段：入门
施展条件：必须在【红尘·琉璃界】中施展
核心机制：每一面镜子映照的敌人倒影都被标记为拥有实体
蓄力过程：通过舞剑敲击阵眼，将剑气与劫雷之力传导储存在所有冰镜中
终结爆发：引爆阵眼使所有冰镜同时炸裂，释放被折射千万次的实质性剑光进行无死角毁灭性切割
杀招真意：斩镜即斩人

# ============================================================================
# 超远程打击
# ============================================================================

#19 天罚·广寒阙
技能类型：毁灭技/主动
等级阶段：入门
力量来源：调动金丹投影，引动天地之力
攻击形态：召唤由万吨冰川凝聚的巨剑从天而降，剑心封印毁灭性赤红狂雷
技能定位：天灾级别超远程范围打击
消耗代价：威力巨大，消耗极高

# ============================================================================
# 法则神通
# ============================================================================

#20 红尘·业火焚心咒
技能类型：法则神通/主动
等级阶段：入门
力量来源：【红尘业火雷】的特性
攻击方式：直接攻击目标元婴或神魂，无视物理防御
核心机制：引爆目标内心的罪孽、恐惧与愧疚，化为燃烧自身的业火
伤害规律：目标负面因果越重，业火越旺
终结效果：使目标在灵魂惨嚎中"自焚"而亡

# ============================================================================
# 核心元婴
# ============================================================================

#21 红尘·劫剑婴
技能类型：元婴/核心
等级阶段：已成型
诞生过程：由【寂灭劫源·霜雷剑丸】坍缩并吸收九重雷劫与神寒碎片后诞生
外观形态：巴掌大小的云无心，身披赤雷战甲，脚踏冰莲，怀抱小剑
本质意义：云无心大道与力量的具象化
进化能力：可吞噬法则之力反哺自身

# ============================================================================
# 组合技
# ============================================================================

#22 惊鸿·焚寂一点红
技能类型：组合剑招/主动
等级阶段：入门
组合构成：【惊鸿·照影】+【黄泉玄冥冰】+【一念·焚寂】+【红梅落雪】
技能定位：瞬杀型剑招，结合位移、控制与爆发
施展流程：以雷霆折叠空间突进 → 用冰霜冻结目标 → 在其体内引爆毁灭性雷霆

#23 琉璃·离恨千重劫
技能类型：组合领域剑招/主动
等级阶段：入门
组合构成：【红尘·琉璃界】+【红尘·离恨】+【红尘·葬仙】+【红梅落雪】
技能定位：绝望囚笼，充满诅咒与毁灭
核心机制：在镜面迷宫领域基础上，为每面镜子附加【离恨】迟缓诅咒，并通过【葬仙】雷剑进行无差别轰炸

#24 黄泉·广寒坠
技能类型：组合毁灭技/主动
等级阶段：入门
组合构成：【红尘业火雷】+【黄泉玄冥冰】+【天罚·广寒阙】+【红梅落雪】
施展流程：先以【黄泉玄冥冰】冻结目标 → 召唤融合了【红尘业火雷】的【天罚·广寒阙】从天而降
打击效果：以万吨冰川巨剑精准轰击被冻靶子，造成双重法则毁灭性打击

#25 琉璃葬·红尘三千劫
技能类型：终结大招/主动
等级阶段：入门
组合构成：【红尘·琉璃界】+【镜花水月·杀】+【红梅落雪】
技能定位：终极因果律杀招
核心机制：在【红尘·琉璃界】中施展，将领域内每面镜子映照的敌人都标记为实体
杀招真意：通过斩碎镜子直接斩杀敌人本体，无视距离与防御

# ============================================================================
# 备注说明
# ============================================================================

# 功法进阶路线：
# 1. 基础剑招 → 情感剑招 → 法则神通
# 2. 单一技能 → 组合技 → 终结大招
# 3. 随情感历练加深，所有技能威力自然提升

# 修炼要点：
# 1. 红尘劫剑的核心在于情感历练，而非单纯修炼
# 2. 经历的情感越极致，领悟的剑意越强
# 3. 所有技能都可与法则之力结合进化

# 战斗风格：
# 1. 以冰霜控制配合雷霆爆发
# 2. 擅长领域控制与因果律杀招
# 3. 防御、治疗、输出兼备的全能型剑修
