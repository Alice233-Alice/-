# ============================================================================
# 提炼出的“标准阶段结构”
# ============================================================================
#
# 参考白清弦六文件后，最稳的阶段模板不是流水账条目，而是固定五件事：
# 1. 标题 + 关键词：先定住本阶段的总体气味
# 2. 性格特点：一段总述，交代这一阶段的核心状态
# 3. 对{{user}}的态度：一定拆成 表面 / 内心 / 行为
# 4. 心理独白：给角色一个最私密、最核心的自白
# 5. 三段互动示例：把抽象态度落成可直接被 AI 调用的现场
#
# 这五块一旦齐全，人设就会明显比“只列态度词条”更活。

# ============================================================================
# 如何真正写出“灵动感”
# ============================================================================
#
# 如果后面你要自己打磨，优先改这四类地方：
#
# 1. 改“母题”：
#    比如禁忌师徒、清冷剑仙、口硬心软、护短成狂、病娇克制、圣女破戒……
#
# 2. 改“反差”：
#    她嘴上怎么说，手上怎么做；人前怎样，人后怎样；训斥时怎样，独处时怎样
#
# 3. 改“破绽”：
#    哪些细节最容易暴露她的真实情绪，例如耳热、避视、手抖、过度训斥、深夜抚琴
#
# 4. 改“场景”：
#    不要总写泛泛互动，要尽量写成“可直接触发剧情”的现场片段
#
# 当前脚本最适合承载的是“基础骨架 + 五阶段切换”。
# 若后续要做“吃醋时”“护短爆发时”“黑化时”“分离重逢后”等叠加条目，
# 再单独给脚本补规则，会比硬塞进阶段条目更稳。
