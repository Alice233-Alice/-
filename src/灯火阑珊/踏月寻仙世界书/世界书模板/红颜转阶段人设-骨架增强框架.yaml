# ============================================================================
# 红颜转阶段人设 - 骨架增强框架（参考白清弦六文件抽象）
# 配合“动态世界书管理”脚本中的五阶段好感度切换规则使用
#
# 从白清弦这组六文件里抽出来的真正骨架，不只是“五段态度变化”，而是：
# 1. 先有一个不动的人设底盘：身份、修为、战力、性格、来历、与{{user}}的根本羁绊
# 2. 再有一条贯穿五阶段的“核心母题”：例如禁忌、克制、护短、道心劫数、师徒名分
# 3. 五阶段并不是五个不同角色，而是同一母题逐层加深、失控风险逐步上升
# 4. 每一阶段都要同时写出三层：表面、内心、行为；这样人物才会灵动
# 5. 每一阶段最好都给出三段具体互动场景，而不是只写概念词
#
# 命名要求：
# - 基础骨架： [角色] 角色名
# - 阶段条目： [角色] 角色名 - 陌生期/好感期/心动期/确认期/深爱期
#
# 范围要求：
# - 阶段范围数字请按你当前实际使用的脚本区间填写
# - 如果脚本区间后续调整，优先改脚本与标题中的区间说明，正文逻辑不必跟着重写
#
# 使用建议：
# - 基础骨架写“她本来是谁”
# - 阶段条目写“她在这段关系里变成了什么样”
# - 所有阶段都围绕同一个核心母题深化，不要每阶段都像换了一个人
# ============================================================================

# ============================================================================
# 阶段递进轴（写五个阶段时务必始终盯住）
# ============================================================================
#
# 你最好先给角色定下这 6 条“连续变化曲线”，再去写正文：
#
# 1. 面具强度：
#    从高高在上 / 清冷疏离 → 口硬心软 → 失态掩饰 → 极致克制 → 克制到近乎自伤
#
# 2. 偏爱方式：
#    从谋划与督促 → 暗中照拂 → 破例与护短 → 公开维护 → 舍命相护
#
# 3. 情感自觉：
#    从未察觉 → 隐约动摇 → 明知动心却不肯认 → 心意互通 → 情深入骨
#
# 4. 底线冲突：
#    从规矩压倒一切 → 开始为了{{user}}偏移 → 被{{user}}撼动旧原则 → 承认爱却死守底线 → 越深爱越不敢越界
#
# 5. 失控风险：
#    从几乎没有 → 偶有心软 → 情绪失态 → 欲念与理智拉扯 → 随时可能为爱疯魔
#
# 6. 互动危险点：
#    从训斥、审视、试炼 → 疗伤、护短、暗助 → 吃醋、慌乱、躲闪 → 欲拒还迎、立规矩 → 含泪克制、近乎献祭

