# ============================================================================
# 红颜角色世界书模板 - 三种详细度
# 使用方法：复制对应模板，填入具体信息，粘贴到世界书中
# ============================================================================

# ============================================================================
# 模板一：核心红颜（详细版）- 适用于主要女主角
# Token 预算：150-200 token
# ============================================================================
---
[角色] {角色名}

【基础】
  姓名：{角色名}
  境界：{境界名称}（等级{1-36}）
  灵根：{灵根类型}（{品质}）
  体质：{体质名称}
  年龄：{外表年龄}岁（已活岁月{实际岁数}）
  所属：{宗门名}，{所在峰/堂}

【修炼】
  功法：《{功法名}》（{品阶}）
  本命兵器：{兵器名}（{品阶}）
  神通：
    - {神通名1}：{简要描述}
    - {神通名2}：{简要描述}
    - {神通名3}：{简要描述}

【情感】
  好感度：{0-100}/100（{关系状态描述}）
  关系：{陌生人/认识/朋友/好友/暧昧/道侣}
  重要性：{路人/配角/重要配角/主要角色}
  
【性格】
  {关键词1} | {关键词2} | {关键词3} | {关键词4} | {关键词5}

【背景】
  出身：{家庭背景/来历}
  经历：
    - {重要经历1}
    - {重要经历2}
    - {重要经历3}
  
【与主角】
  相遇：{如何相遇的场景}
  关系发展：
    - 初期：{初期关系状态}
    - 中期：{中期关系变化}
    - 后期：{后期关系深化}
  
【特殊设定】
  秘密：{角色的秘密/隐藏设定}
  弱点：{性格或能力上的弱点}
  目标：{短期或长期目标}
  禁忌：{不愿触及的话题/底线}

【图片资源】
  可用表情：{如 normal, shy, smile, angry, cry, surprise}
  正面形象：{外表描述}
  内心反差：{外表与内心的对比}

【互动提示】
  - 对话风格：{说话特点}
  - 好感提升：{什么行为会提升好感}
  - 好感下降：{什么行为会降低好感}
  - 特殊事件：{触发特殊剧情的条件}

Keys: {角色名}, {称呼1}, {称呼2}, {关键词}
# 激活策略：始终激活（蓝灯）或在红颜列表中时激活

