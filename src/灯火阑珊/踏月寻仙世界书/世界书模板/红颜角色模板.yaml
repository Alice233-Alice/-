# ============================================================================
# 使用建议
# ============================================================================

1. 根据角色重要性选择合适的模板
   - 主要女主角（2-3人）：使用详细版
   - 重要配角（5-10人）：使用中等版
   - 背景人物（10+人）：使用简要版

2. Token 控制
   - 单个核心红颜：150-200 token
   - 单个重要红颜：80-120 token
   - 单个次要红颜：30-50 token
   - 总预算建议：核心 3人×180 + 重要 7人×100 = 1,240 token

3. 动态管理
   - 核心红颜：始终激活（蓝灯）或在红颜列表中时激活
   - 重要红颜：提到时激活或在红颜列表中时激活
   - 次要红颜：提到时才激活（绿灯）

4. 图片资源配置
   - 在 character-assets.ts 中配置对应的图片URL
   - 确保 img_code 与世界书中的可用表情一致
   - 详见 visual-cards-system.yaml

5. MVU 变量集成
   - 红颜的详细数据会存储在 MVU 变量的 红颜 字段中
   - 世界书提供性格、背景等描述性信息
   - 数值数据（好感度、境界等）由 MVU 自动管理

6. 创作技巧
   - 使用"骨架+血肉"法：世界书写骨架，AI生成血肉
   - 性格用3-5个关键词，AI会自动演绎
   - 留白艺术：不要写满所有细节
   - 对比设定：外表vs内心，实力vs性格
   - 特殊元素：给每个角色独特的"记忆点"

