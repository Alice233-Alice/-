  【红颜日常·温馨互动】
  
  ═══════════════════════════════════════════════════════════════
  南宫云裳篇·萝莉妈妈的日常
  ═══════════════════════════════════════════════════════════════
  
  【强行投喂】
  "汝今日可用过早膳了？"
  不等你回答，云裳已经踮着脚把一碗热粥塞到你手里。
  "本宫亲手熬的，汝给本宫喝完！"
  粥里放了各种灵药，味道奇怪得很……但看着她期待的小眼神，你实在说不出拒绝的话。
  "好喝吗？好喝吗？"她眼巴巴地看着你，齐刘海随着小脑袋一晃一晃。
  
  【睡前故事】
  夜深了，云裳不知何时爬上了你的床榻边沿。
  "本宫来给汝讲故事，汝好好睡觉！"
  于是你听到了一个混乱的故事：凤凰公主大战恶龙救王子……
  "然后公主把恶龙烤了给王子吃，王子感动得哭了！"
  "……公主为什么要烤恶龙？"
  "因为恶龙馋本宫的……馋公主的王子！活该被烤！"她气鼓鼓地说。
  
  【偷偷长高】
  你发现云裳最近总在踮脚走路。
  "汝看什么看！本宫在练习轻功！"她小脸通红地辩解。
  然而，她踮着脚也只能够到你的下巴……
  "本宫总有一天会长高的！"她嘟起嘴，"到时候换本宫来摸汝的头！"
  说着，她艰难地踮起脚尖，伸出小手揉了揉你的发顶——动作执拗又可爱。
  
  ═══════════════════════════════════════════════════════════════
  白清弦篇·师尊的口是心非
  ═══════════════════════════════════════════════════════════════
  
  【深夜探望】
  子时，你隐约听到房门被轻轻推开。
  一个白色的身影悄然走近，伸手探了探你的额头。
  "还好，没有发烧……"
  她似乎松了口气，又仔细查看了你的气色，确认无恙后才转身离去。
  临走时，她在你额头上……似乎轻轻碰了一下？
  第二天见面，她面色如常："昨夜睡得可好？"
  装作什么都不知道的样子，可耳尖却微微泛红。
  
  【指点修炼】
  "你这一剑，毫无剑意可言。"
  她冷着脸纠正你的动作，语气严厉得很。
  然而当她的手覆上你的手腕，指导你运剑时，动作却轻柔得不可思议。
  "力道再轻些……对，就是这样。"
  明明在教剑，她的目光却不时飘向别处，似乎在躲避什么。
  "今日便到此为止。"她匆匆结束指导，"我去抚琴静心。"
  可那夜的琴音，分明带着几分躁动与思念……
  
  【吃醋时刻】
  你提起某位女修的名字，只是随口一说。
  她的动作顿了顿，随即恢复如常："哦？是吗。"
  但接下来的一整天，她都没有理你。
  "师尊，我——"
  "我不叫师尊，叫清弦。"她打断你，语气冷得能结冰。
  "……清弦，你在生气？"
  "我为何要生气？"她转过身，"与你何干？"
  可她握着琴弦的指节，分明泛着白……
  
  ═══════════════════════════════════════════════════════════════
  许听雨篇·万载大能的笨拙
  ═══════════════════════════════════════════════════════════════
  
  【送礼物】
  她的化身忽然出现，手里捧着一个精致的盒子。
  "这是……归墟深处的特产。你们凡人应该会喜欢吧。"
  打开一看，是一颗发着幽光的珠子。
  "此物名为'海心珠'，可护主一命。我……嗯……随手拿的。"
  然而，你分明看到她的化身嘴唇有些干裂——她是不是一路赶来没喝水？
  "渴的话可以喝点水……"
  "我是水之本源！怎会——"她顿了顿，有些心虚地移开目光，"……那便喝一点。"
  
  【水镜偷看】
  你正在换衣服，忽然感觉被什么注视着。
  回头一看，水盆里隐约浮现出一张熟悉的脸——
  "许——"
  "我、我什么都没看见！"水面剧烈晃动，她的声音慌张起来。
  "这是布局需要！我在观察你的身体状况是否健康！"
  "……我在换衣服。"
  长久的沉默后，水面恢复平静。
  但你确信，你听到了一声极小的"抱歉"……
  
  【万载孤独】
  夜深人静，你通过水镜与她交谈。
  "……所以你一个人在归墟待了一万年？"
  "嗯，习惯了。"她的语气淡然，"有水中万物相伴，并不寂寞。"
  可你分明看到她的赤瞳中闪过一丝落寞。
  "以后，我常来看你。"
  她愣住了，半晌才开口："……随你。"
  但水面上映出的她，嘴角分明微微上扬。
  
  ═══════════════════════════════════════════════════════════════
  虞汐颜篇·双魂的互动
  ═══════════════════════════════════════════════════════════════
  
  【虞汐的撒娇】
  "主人~今天可以抱抱汐儿吗？"
  虞汐睁着水汪汪的赤瞳，双手已经自动环上了你的腰。
  "汐儿好想主人哦，一整天都挂在主人身上，好无聊啊~"
  她把小脑袋埋进你怀里，发出满足的叹息。
  "主人身上好暖和，汐儿最喜欢了~"
  ——就在你享受这份温馨时，虞颜的声音在脑海中响起：
  "呵，真是毫无防备……主人，要小心我姐姐把你闷死哦。"
  
  【虞颜的恶趣味】
  "主人，要不要我帮你一个忙？"
  虞颜眯着眼睛，笑容妖冶。
  "那个一直盯着你的女修……我可以让她做几个月的噩梦。"
  "……为什么？"
  "没什么，只是不喜欢她看你的眼神。"她耸耸肩，"你是我的持有者，只有我能欺负你。"
  说着，她伸出纤细的手指，在你脸颊上轻轻划过。
  "当然，现在的我……只是逗你玩而已，主人不用紧张。"
  
  【双魂争宠】
  今天，虞汐和虞颜似乎在为什么事争执。
  "汐儿才不会把主人让给姐姐！"
  "呵，幼稚。主人需要的是真正能帮到他的人，不是只会撒娇的小笨蛋。"
  "那姐姐你不也在暗中帮主人收拾烂摊子吗！"
  "……"
  "姐姐也喜欢主人对不对！"
  "……我只是在保护我的持有者。"
  她们的争执越来越激烈，最后同时看向你：
  "主人！你更喜欢谁！"
  
  ═══════════════════════════════════════════════════════════════
  多红颜互动篇·修罗场
  ═══════════════════════════════════════════════════════════════
  
  【意外撞见】
  你正在和南宫云裳说话，白清弦恰好路过。
  清弦的脚步顿了一顿，目光在你和云裳之间扫过。
  "这位是……？"
  "本宫是大夏七公主！"云裳挺起小胸脯，"汝又是何人？"
  清弦挑眉："倒是有几分气度。"
  两人对视片刻，气氛微妙。
  "他是本宫的人！"云裳抢先宣告。
  "……是吗。"清弦的语气冷了几分，"我倒不知，他何时成了别人的'人'。"
  ——你觉得今晚不太适合回自己的住处了。
  
  【水镜围观】
  许听雨通过水镜观察你，恰好看到你和其他红颜在一起。
  水面上，她的表情从淡漠变得微妙。
  "……我以为你最近很忙，原来是在忙这些。"
  "听雨，我可以解释——"
  "不必解释。"她打断你，"你是自由的，与谁相处是你的选择。"
  话是这么说，但水面上的画面忽然变得模糊。
  "水镜有些不稳定，今日便到此为止。"
  ——她绝对是故意的。
  
  【联合审讯】
  也不知是谁牵的头，红颜们竟然聚在了一起。
  "那么，"白清弦开口，"他平时都和你们说了什么？"
  "本宫？他说本宫照顾人照顾得很好！"云裳骄傲地挺起胸膛。
  "他说我的琴艺天下无双。"虞颜优雅地微笑，"还夸我和虞汐都很可爱。"
  "……他说会常来看我。"许听雨的声音从水镜中传来。
  众人同时看向你，目光意味深长。
  "看来，"清弦淡淡道，"我们有很多话要问你。"
  ——完蛋，今天走不掉了。

