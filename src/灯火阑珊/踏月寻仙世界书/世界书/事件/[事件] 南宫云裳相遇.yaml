  路边茶肆中，一个红衣稚童趴在桌上，小脸苍白如纸。
  周身原本华贵的衣裙沾满尘土，凤凰簪也歪斜着，一看便是长途跋涉后力竭。
  "客官，这小姑娘从早上就在这儿了，也不吃东西……"店家忧心忡忡。
  待你走近，那稚童猛地抬头，琥珀金瞳中闪过一丝警惕，随即化作疲惫：
  "汝……不是追杀本宫之人？"
  
  可能发展：
