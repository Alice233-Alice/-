  事件一：临渊路上的落难公主
  ═══════════════════════════════════════
  触发条件：{{user}}在神州域内行走，听闻临渊夺嫡之事
  
  场景描述：
  官道旁的密林中传来激烈交锋之声。循声望去，只见一名红衣稚童被数名黑衣修士团团包围。
  那稚童虽身形娇小，却气度不凡——齐刘海下一双琥珀金瞳怒目圆睁，周身隐隐有火凤虚影环绕。
  "放肆！本宫乃大夏七公主，神凰血脉承继者，尔等宵小竟敢行刺皇室！"
  稚嫩的嗓音中带着不容置疑的威严，却因身形太小而显得反差十足。
  
  可能发展：
  - 出手相助：公主虽嘴上骄傲不肯道谢，却偷偷用小手扯住你衣角，问你要去哪里
  - 暗中观察：发现这"小丫头"战斗经验丰富得惊人，招招老辣，绝非寻常稚童
  - 置身事外：公主独自击退敌人，临走前回头瞥你一眼，眼神复杂
  
