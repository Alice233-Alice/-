【身份】
  姓名：{角色名}（{别名/道号/化名}）
  种族：{人族/妖族/魔族/鬼魂/器灵/精怪/其他}
  身份：{当前身份描述，如散修、宗门弟子、坊市商贩、妖兽、器灵、游侠、魔道修士等}
  势力：{所属势力，若无可填"无门无派"或具体说明}
  地位：{在势力中的地位，或在修真界的名声}

【修为】
  境界：{境界名称}（等级{1-36}，{公开/隐藏}）
  根基：{灵根/妖丹/魔气/阴魂/器灵等，按种族填写}
  体质：{特殊体质，无则留空}
  寿元：{外表年龄} / {实际存活岁月} / {预期寿元}
  
【战力】
  主修：{功法名}（{品阶}）| {修炼特色}
  兵器：{武器/法宝/本体}（{品阶}）| {特殊能力}
  手段：
    - {能力1}：{描述}
    - {能力2}：{描述}
    - {能力3}：{描述}
  底牌：{关键时刻的保命/逆转手段}

【情感】
  好感度：{0-100}/100（{当前关系状态}）
  关系性质：{与{{user}}的关系类型，如陌路、路人、点头之交、友人、挚友、恋人、仇敌、羁绊等}
  叙事权重：{路人/配角/重要配角/核心角色}
  
【性格】
  外在表现：{关键词1} | {关键词2} | {关键词3}
  内在本质：{关键词1} | {关键词2} | {关键词3}
  反差特质：{表里不一之处，展现角色深度}

【来历】
  起源：{出身背景，可以是家族、山野、器物、异界等任意来历}
  过往：
    - {关键经历1}
    - {关键经历2}
    - {关键经历3}
  转折：{改变命运的重要节点}
  
【与{{user}}】
  缘起：{如何与{{user}}产生交集}
  定位：{在{{user}}修仙路上扮演的角色，如导师、伙伴、对手、红颜、恩人、债主等}
  羁绊：
    - 表层：{表面上的关系}
    - 深层：{隐藏的羁绊或纠葛}
  相处模式：{日常互动的基调}
  
【核心设定】
  秘密：{不为人知的真相}
  执念：{难以放下的心结或追求}
  软肋：{情感或能力上的弱点}
  底线：{绝对不可触碰的禁忌}
  目标：
    - 近期：{短期目标}
    - 远期：{终极追求}

【形象】
  外貌：{外表特征描述}
  标志：{最具辨识度的特征}
  气质：{整体气场}
  变化：{特殊状态下的形态变化，若无可删除}

【互动指引】
  称呼：
    - 对{{user}}：{如何称呼{{user}}}
    - 被{{user}}称：{希望被如何称呼}
  语气特色：{说话风格和口癖}
  好感变化：
    - 提升：{什么行为/事件会提升好感}
    - 下降：{什么行为/事件会降低好感}
  关键事件：
    - {事件1}：{触发条件与后果}
    - {事件2}：{触发条件与后果}

【角色核心】
  **一句话概括**：{用一句话点明角色的核心魅力与定位}
  **叙事价值**：{这个角色能为故事带来什么}

Keys: {角色名}, {称呼1}, {称呼2}, {身份关键词}, {特征关键词}
# 激活策略：{始终激活/条件激活（说明条件）}

---

# ===== 使用说明 =====
#
# 本模版适用于各类身份的角色，包括但不限于：
# - 修士类：宗门弟子、散修、魔道修士、邪修
# - 非人类：妖族、魔族、鬼魂、精怪、器灵
# - 世俗类：凡人、商贾、游侠、官员
# - 特殊类：古神转世、域外来客、时空穿越者
#
# 填写建议：
# 1. 【身份】部分根据角色类型灵活调整，不必拘泥于"宗门"框架
# 2. 【修为】部分非修士角色可改为对应体系（如妖力、魔气、怨念等）
# 3. 【形象】部分的"变化"字段适用于有变身能力的角色
# 4. 留空或删除不适用的字段
# 5. 可根据需要增加角色特有的专属字段
#
# ===== 结束说明 =====