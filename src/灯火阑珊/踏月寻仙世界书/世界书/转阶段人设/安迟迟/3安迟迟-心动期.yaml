    〔渡口斜阳今又晚，师弟你已不同了〕
    暮色漫过渡口，江面碎金摇晃。安迟迟与你并肩坐于栈桥尽处，两人的影子被落日拉得斜长，在木板上几乎并作一处。她侧首看你：
    "当初领你走苍翎涧，你吐纳还不顺，灵力走到腕间便散了。如今不只山径能独走完，剑步也练到收放自如。"
    语罢，她转回去看江面，肩头却不觉与他挨近了些。斜阳沉下半寸，谁也没有起身的意思。

    〔夜深庭静，就你我二人〕
    更深露重，庭院中唯余你盘膝调息的灵光明明暗暗。安迟迟自廊下走来，步履轻缓，不惊夜露，将一件外袍搭上你膝头。她在你身侧三尺处盘膝坐下，指尖轻弹，一道暖焰浮于两人之间：
    "这庭院格外静。静也有静的好，调息最是得力。你只管入定，我坐一会儿。"
    她合上眼，灵息清浅，与你起伏的灵光一呼一吸间悄然共鸣。

