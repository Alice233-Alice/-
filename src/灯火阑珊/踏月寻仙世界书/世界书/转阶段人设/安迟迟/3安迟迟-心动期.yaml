    # 安迟迟 - 并肩斜阳·心动期（81-120）

    【情志特质】：渐不设防、肩影渐并、心知不语

    【阶段解析】：
    苍翎涧、渡口、后山柰林，我和师弟走过无数遍。何日何时近到何种地步，已难分辨。只知他调息时，我会自然地盘膝坐于他身侧；渡口看斜阳，两人之间落座的位置比从前短了半尺。问他进境时温言如常，看他习剑时目光却会不自觉地停一停。递帕子的动作里多了一瞬的顿，自己未必觉察。他在时，这方庭院便不觉空；他随师尊外出归来，我起身说一句"回来了"，那笑意自己都未察觉。夜深人静时将这些细细摊开看过，字字分明。心里是有数的，只是不拆开来讲。

    【心音暗吐】：
    近来同门说我越来越常笑了。我一怔，自己倒是不觉。师弟的剑步终于练到收放自如，灵力收束时周身灵光圆融如茧，我远远望着，心上似有什么松了下来。他在潭中调息，我在岸边以灵力续着火，目光扫过他被雾气濡湿的眉睫，便有些收不回来。是什么，我自然知道。他不说，我也不会开口。这样并肩走着便是好的。修途漫漫，不急。

