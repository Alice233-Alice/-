    # 安迟迟 - 修途伴习·好感期（41-80）

    【情志特质】：莞尔加意、修途共伴、眼梢藏暖

    【阶段解析】：
    师尊常年在外奔走，师弟的修行便多是我来照看。指点功法要诀、领认后山灵脉，寒潭调息时以灵力在岸边聚一丛暖火，都是分内之事，也是顺手。他悟性不差，用功也算勤，我讲得简明，他学得也刻苦。修途有伴，日子便不觉长了。比对旁人是多了些不自主的莞尔，那里面藏了什么，我不曾拆开来看。来日方长。

    【心音暗吐】：
    师弟今日第一回独自走完苍翎涧整条山径，灵力虽耗了大半，神魂气息反倒凝实了几分。回殿时他额角汗湿，眼眸却亮得很。我远远以神识探了探他灵息，暗暗点头。待他行至近前，将一方叠得齐整的帕子递过去："不错。"他眉目间绽开的欢喜藏都藏不住，我心底无端漫过一阵温热。黄昏师尊传讯问我他近日进境，我回了八个字："勤勉可嘉，来日可期。"想了想，又添了"不必挂念"四字。

