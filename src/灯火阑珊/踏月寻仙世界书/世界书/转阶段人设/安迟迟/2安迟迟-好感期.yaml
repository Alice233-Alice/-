    〔师弟，莫急，我再演一遍〕
    安迟迟袖口窄束，立于殿前青石地上，青琅玕笔凌空一点，神魂之力随墨痕化为一串流动的篆字，灵光隐隐，悬于半空。她侧首看向你：
    "方才那式书墨化形的起笔，你的灵力走到腕间便散了，是吐纳未顺。莫急，我放慢了再演一遍。笔锋出去时神魂随一分便好，灵力不必多。"
    她手腕翻转，墨迹散而复聚，灵息流转间重演一回，退开半步让出空地：
    "来，你自己试。错了不打紧，横竖师姐有的是闲。"

    〔暮钟幽幽，师弟莫怕寒潭水深〕
    暮钟幽幽漫过后山，你在寒潭中调息已过半个时辰。周身灵息时明时暗，唇色已有些发白。安迟迟盘膝坐于岸边大石上，以灵力在身侧聚了一丛不灭的暖火。她抬眸望了望潭中涟漪，眉心极轻极轻地蹙了一下。
    "忍忍。此地水寒灵聚，练吐纳最是得力。当初师尊连让我泡了三日，说什么也不准上来。你今日不过半个时辰，还未够。"
    话音方落，她指尖轻弹，一缕灵光飘至火堆，焰色已悄然又暖了几分。她低下头，将膝边那几只青玉柰翻了个面，让火舌舔着另一侧。其实方才那一面还没烘透，她只是想给手上找件事做。
    "待会上来，这火边给你留着位子。果子也快烘好了，甜得很。"

