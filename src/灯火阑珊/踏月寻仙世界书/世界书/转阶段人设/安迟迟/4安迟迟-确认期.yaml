    # 安迟迟 - 灵犀相通·确认期（121-160）

    【情志特质】：灵犀已通、暗渡春风、朝朝是你

    【阶段解析】：
    灵息同频那夜，我先睁了眼，他正望着我。那目光里有什么，我看得分明。薄纱掀开一角，光亮透了进来。此后功法、进境、修途上的事都成了背景。他在庭中习剑，我倚廊柱望着，不说话也满心温软。青琅玕笔凌空画了半幅山水，画着画着不自觉添了个人伫立山径，画完才认出是他。我搁下笔，默然含笑半晌。他调息入定时，我悄然坐近了些，肩头抵着他肩头，灵息便自己沁了过去。旁人再问起他，我只笑着不说话。那些曾压在心里的句子，如今不必说了。来日方长。

    【心音暗吐】：
    今日与他同坐调息，指尖在青石地面上轻轻交握着，掌心贴着微凉的石，指缝间却尽是暖意。灵息又自己缠上去了，比上回更密。我低头望着那两缕分不清彼此的光，由着它。从前在心底计较的那些，此刻一件件都落了实处。是他，不是旁人。将脸轻轻靠上他肩头时，心跳得比吐纳快了许多。他或许知道，或许不知道。修途漫漫，不急。

