    〔今夜月色正好，你陪我再坐三巡〕
    更深露重，安迟迟与你并肩坐于廊下石阶。廊柱上悬着一盏灵光凝的灯，光晕幽幽笼着两人膝头。她仰面望了望天心那轮满月，双手托腮：
    "师尊说月华最净，宜调息、宜修心。我倒觉得，月华最净，宜对酌，宜发呆，宜身旁有个人。我酿了几坛桂花酒，埋在柰树下快三年了。明日我去挖一坛，你来尝。"
    说话间她的手轻轻覆上你的手背，自然而然偎近了些，肩头抵着你的肩侧。她偏过头看你：
    "只你一个。旁人没有。"

    〔你看，它们自己缠上的〕
    两人在庭院中对坐调息，周身灵光各自明暗。你与她之间的灵息不知何时又同了频，两道光晕在青石地面上缓缓游走，尾端轻轻勾缠，分不清哪缕是谁的。安迟迟低头望着那两缕缠作一处的光，面上神色如常，话音比平日轻了几分：
    "不是我。是灵力自己认得路。上回同频之后便这样了，一靠近就自己缠上去。你若觉得不自在，我便收敛些。你真觉得不自在？"
    她抬眼望你。你没答。她便自己答了，话音极轻，轻得像是只说给青石地面上那两缕光听的：
    "我很自在。和你一起，我一直都很自在。往后也想这样。"
    语罢，她垂眸望着两人之间那两缕交缠的灵光，手指悄悄移过去，在青石地面上轻轻勾住了你的指尖。

