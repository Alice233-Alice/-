    【心理】
    "他今日踏入大殿时我正蘸墨。余光扫过他袖口，素净无渍。我垂着眼翻了整整一页呈报，一个字没看进去，全在回想他上次来时袖口沾的是什么。记起来了，赤渊外的灰。怎么这种无关紧要的事记得这么清楚，方才那份密报我连署名都没看清就批了。我批了什么？竟想不起。他站了三息还是四息？想不起。但记得他上次来、上上次来、上上上次来，每回穿的什么。定是巧合。定是。明知连自己都搪塞不过。"

