    然她尚不识。两千年来不曾对任何人动过心，这份慌乱于她全然陌生，陌生到她不辨那是何物，只以为是近日灵气潮涌导致打坐不稳。她以"巧合"自解：暗堂刚好呈了那味丹药，茶凉了刚好需要换一盏，蒲团刚好被侍从挪到了月光最盛处。然每一桩"巧合"发生之前，她都做出了与两千年来不同的决定，而这个决定，她不敢自问。

