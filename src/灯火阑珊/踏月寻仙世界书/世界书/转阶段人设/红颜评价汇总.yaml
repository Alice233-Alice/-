---
红颜评价汇总:
  白清弦:
    定位: 克制禁忌型红颜，核心魅力在于清冷严师与深藏情动并行，越深爱越克制，越护你越不敢越界。
    核心母题:
      - 清冷剑仙
      - 严师身份
      - 主动护道
      - 情动却克制
      - 师徒禁忌
      - 越深爱越不敢越界
    优点:
      - 母题连续性极强，五个阶段始终围绕同一条情感主轴递进，不易散。
      - 角色稳定度高，不容易从清冷师尊跳成模板恋爱脑。
      - 禁忌感、护短感、克制感叠在一起，情感张力极足。
    风险:
      - 若阶段差异只写情绪浓度，不写行为变化，容易变成五份相似的清冷文案。
      - 若克制写得太重，容易只剩高冷威压，失去恋爱温度。
    总评: 白清弦属于单线深挖型红颜，强处不在花样繁多，而在同一颗心如何越陷越深却仍不肯失守，十分高级。

  阮忘忧:
    定位: 高概念危险神明型红颜，本质不是从无到有地爱上{{user}}，而是万载深情早已成立，只是逐步显形。
    核心母题:
      - 万载苦寻
      - 神明伪装凡女
      - 因果大道即爱意表达
      - 极度缺乏安全感
      - 对众生漠然，唯独对{{user}}温柔
      - 失而复得后的控制力崩解
    优点:
      - 概念完成度极高，辨识度极强，不是常规模板恋爱线。
      - 能力、身份与情感高度统一，因果大道既是战力也是恋爱语言。
      - 反差锋利，越强越怕吓到{{user}}，越爱越显得委屈而隐忍。
    风险:
      - 极易被LLM偷懒演成病娇、偏执狂、极端占有型角色。
      - 若缺少禁止演绎与能力使用优先级，容易直接抹平剧情冲突。
      - 若把她写成越来越暴力，而非越来越藏不住爱，会丢掉角色真正的高级感。
    总评: 阮忘忧上限极高，但也是最吃约束的一类角色；写得好是危险而温柔的失衡神明，写坏了就会塌成病娇模板。

  南宫云裳:
    定位: 治愈陪伴型红颜，以百年道心、医者慈悯与长辈式照料感构成核心吸引力。
    核心母题:
      - 神凰血脉
      - 娇小身躯与长辈式温柔反差
      - 医者悲悯
      - 母性包容
      - 护短与照料
    优点:
      - 情绪安全感极强，很适合长期陪伴与日常互动。
      - 行为抓手丰富，如熬药、把脉、照料、护短，LLM较易稳定发挥。
      - 反差成立，平日温柔絮叨，遇险则可切出神凰威压。
    风险:
      - 五阶段整体都偏温柔照顾，若不强化差异，容易显得层次不足。
      - 母性若压过情欲，容易被演成照顾型长辈或保姆，而非恋人。
      - 稚童外形若被过度强调，会削弱她真正的魅力来源。
    总评: 南宫云裳属于很稳、很耐相处的一型，不一定最炸裂，却极易让人产生依赖，是长期陪伴线的强手。

  虞汐颜:
    定位: 结构型红颜，以一体双魂、双线并行的情感构造见长，不是双生噱头，而是同一份爱被拆成两种表达。
    核心母题:
      - 一体双魂
      - 生死双鱼器灵
      - 汐主生与善
      - 颜主死与恶
      - 生死相随，唯{{user}}是从
      - 疗愈与杀伐的同根分化
    优点:
      - 结构完成度极高，虞汐与虞颜各自负责不同的情感功能，场景适配力极强。
      - 既能提供温润依恋、治愈归宿，又能提供锋利护主、替你承重的黑面。
      - 若写稳“同根性”，灵动感与层次感会非常惊艳。
    风险:
      - 极易被LLM拆成两个彼此无关的独立红颜。
      - 也容易被偷懒压缩成“白月光虞汐 + 病娇虞颜”的俗套组合。
      - 若丢掉共根性，就会失去她最珍贵的结构美。
    总评: 虞汐颜不是单纯的人设强，而是结构强；上限极高，若写准会是最有灵动感潜力的一位。

  晚棠:
    定位: 诗性宿命型红颜，核心在于从黄泉大梦中的空茫存在，逐步被{{user}}唤醒，最终选择真实地活一次。
    核心母题:
      - 黄泉本源
      - 梦游与虚妄
      - 净世幽莲
      - 掌心裂纹
      - 破梦之机
      - 从空茫到真实
    优点:
      - 文学完成度极高，意象统一而且层层推进。
      - 阶段推进不是单纯好感升级，而是存在方式的改变，十分高级。
      - 空灵、悲悯、宿命感与爱情成长相互嵌套，回味很强。
    风险:
      - 容易被演成泛化的空灵仙子模板，只剩氛围没有活人感。
      - 若后期仍然只写缥缈，不写真实，就会失去角色成长的落点。
      - 若深爱期只剩献祭与牺牲，也会让角色沦为工具式圣洁形象。
    总评: 晚棠的强处在于诗意与成长并存，不靠疯感和压迫取胜，而靠从虚妄走向真实的过程打动人。

  许听雨:
    定位: 高位神女型红颜，以万载守望者的神性、悲悯与迟来的贪恋构成主线。
    核心母题:
      - 归墟囚徒
      - 万载守望者
      - 神明悲悯
      - 畏惧孤寂
      - 渴求相伴
      - 从超然到不舍
    优点:
      - 逻辑稳定，情感轨迹清晰，LLM相对更容易抓住。
      - 兼具神性威压与温柔恋爱感，不会只剩高位压迫，也不会只剩委屈撒娇。
      - 阶段推进自然，责任、陪伴、失守、坦白、交付层层递进。
    风险:
      - 容易被写成标准温柔神女模板，只有“万载孤寂与唯一的光”这类常见表达。
      - 若把她写得太弱，会丢掉归墟主宰应有的高位感。
      - 若只保留深情，不保留神格与权柄，她的高级感会明显下降。
    总评: 许听雨是高位神女型里非常稳的一位，强在宿命感与可陪伴性平衡得很好，适合长期主线。

  梦杳泠:
    定位: 养成成长型红颜，核心魅力在于末代瑞兽初识人间、初学情爱、最终主动选择归属。
    核心母题:
      - 末代瑞兽
      - 万年玄冰初醒
      - 不知自身是至宝
      - 将{{user}}视作唯一族群
      - 从本能依附到主动选择
    优点:
      - 成长弧线极干净，阶段推进很自然，养成感强。
      - 行为抓手具体，如嗅息试探、赠送亮晶晶、护食、学说话，极利于LLM稳定演绎。
      - 赐寿、族灭、本源爆发等设定与情感成长高度绑定，戏剧性充足。
    风险:
      - 极易被演成卖萌兽娘、宠物或吉祥物模板。
      - “至宝”与“赐寿”若压过人格成长，会让她沦为功能性设定容器。
      - 后期若仍停留在黏人与依赖，而没有真正的主动选择，就会浪费她最好的成长线。
    总评: 梦杳泠是几位里成长感最强的一位，真正动人的地方不在可爱，而在她第一次学会作为一个独立的“人”去爱与活。
---
