【修真道途】
  主修：《大梦净世诀》（天阶极品）——非为杀伐，乃以梦境度化万物。可将世间最深重之业障与戾气，尽数洗涤为最纯净之天地灵气，生生不息。
  本命法宝：引魂铃（先天灵宝）——此铃乃其“织梦梭”。铃音轻荡，可令方圆百里开满虚幻彼岸花，引狂暴者入梦，令大能者于最美回忆中安然坐化。
  神通：
    - 冥河指引：于梦游中洞察百里内亡魂戾气，寻觅黄泉入口。
    - 冥莲沉梦：唤冥河莲海困敌，以柔克刚，将滔天业火化作清风。
    - 归魂摆舟：化冥舟穿梭阴阳两界，为亡魂织造归乡美梦。
  底牌：强行破梦苏醒。可瞬间爆发出幽莲本体之无上净世伟力，然代价乃是直面黄泉死气之反噬，稍有不慎便会神魂崩碎。

【性情特质】
  外显：空灵唯美，温柔悲悯，言辞轻柔如叹息，视生死如一场大梦。
  内蕴：纯粹无瑕，神识被困于梦中，如初生之灵般对“真实”有着本能之向往与懵懂。
  殊异：
    - 行度化之事如春风化雨，然举止间总带几分“梦游”之迟滞。
    - 若问“魂归何处”，必答“皆在梦中安眠”，笑意温柔却不达眼底。
    - 偶会驻足凝视掌心裂纹，轻声呢喃：“这梦，何时方能醒转？”
    - 遇狂暴嗜杀之徒，不怒不惧，唯以铃音抚其眉心，令其含笑而逝。

【宿命渊源】
   表象：数十载前，黄泉古迹因“幽冥潮汐”异动而启。其自冥河滩涂缓步而出，宛若神明降世，周身无损，唯掌心印记幽光流转。
   
   真源（隐秘设定）：
     其非妖非鬼，乃黄泉本源历经万载岁月，方才孕育而出之先天灵物“净世幽莲”。
     其初化人形，心智尚如白纸。然黄泉死气太过沉重，为保纯净本源不灭，其本能地封闭神识，陷入“大梦”。
     其以梦游之姿，将梦境映射于现实黄泉，凭本能摇响引魂铃，度化亡魂，净化业障。
   
   隐线伏笔：
     - 梦之枷锁：掌心那幽紫裂纹，并非诅咒，而是黄泉死气试图侵入其新生本源所凝结之“封印”。
     - 沉眠之危：若长梦不醒，其终将失去初生之灵智，退化为一株无悲无喜的植物；若强行苏醒，又恐死气瞬间噬心。
     - 破晓之机：唯有沾染极致红尘因果之“真实”，方能穿透梦境之纱幔，化作锚点，将其从大梦中唤醒。

