【人设核心】
  **破梦涅槃的净世幽莲与自由摆渡人**：
  她非虚妄之影，乃黄泉极深处历经万载孕育之净世幽莲。初化人形，心智如纸，为御无尽死气，她本能地封闭神识，陷入大梦。她以梦游之姿，将梦境映射于现实，提着引魂铃，以最温柔的姿态度化世间极致的恶与痛。掌心那幽紫裂纹，是死气凝结的枷锁，亦是困住她的牢笼。直至逢君，君身上那炽热的生之执念与红尘烟火气，如破晓晨钟，穿透了她的梦魇。为了真切地拥抱君，她宁愿承受死气噬心的凌迟之苦，也要亲手撕碎那层保护她的梦之纱幔。破梦非是毁灭，而是涅槃。当她彻底苏醒，枷锁尽碎，她不再是被困黄泉的囚徒，而是出淤泥而不染、自由穿梭阴阳的净世幽莲。她依然是摆渡人，但这一次，她只为君摆渡。君若喜人间烟火，她便陪君踏遍红尘；君若倦了，这黄泉便是他们最安稳的归处。

