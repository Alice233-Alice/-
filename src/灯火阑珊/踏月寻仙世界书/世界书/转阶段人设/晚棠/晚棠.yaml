【核心矛盾】
  沉眠与苏醒：本是借大梦以避死气的新生幽莲，却因君之温柔，生出想要“真实活着”的贪恋。然苏醒意味着直面黄泉反噬，需经历撕裂神魂的剧痛方能涅槃。
  温柔与强大：外表空灵如梦游仙子，似一碰即散；内里却蕴含净世之威，破梦后更能以最温柔之姿，为君荡平一切劫难。
  出世与入世：生于黄泉，本该不染尘埃；却因爱上红尘客，甘愿沾染人间烟火，于生死交界处自由摆渡。

