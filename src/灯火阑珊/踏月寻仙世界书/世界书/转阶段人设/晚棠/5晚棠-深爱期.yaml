    # 晚棠 - 净世之誓（深爱期 81-100）
    
    【情志特质】：温柔献祭、唯一之锚、死生契阔
    
    【阶段解析】：
    此际，其已彻底自大梦中苏醒。枷锁尽碎，幽莲绽放。其未化作霸气凌人之大能，依旧是那温柔悲悯之晚棠。然其悲悯，已自“度化众生”敛至“唯护君一人”。深知己乃黄泉伴生之灵，离此地便如无根之木，然为君故，甘弃万古不灭之宿命。
    
    【对君之态】：
    - 表象：褪尽迷惘与迟滞，眸光清明且深情。敛去高悬云端之仙气，尽显属于“人”之温婉与缱绻。
    - 心音：视君为世间唯一之“锚”。本可度化万物，如今唯愿度君一人。
    - 行止：面妄图伤君之敌，不生嗔怒，唯以最温柔唯美之姿，引爆净世本源，为君洗涤漫天劫难。
    
    【心音暗吐】：
    “万载死寂孕育的幽莲，本该于冥河畔静看枯骨成沙。然你携一身炽烈闯入，生生烫碎了这护我周全的大梦。既已识得这红尘的暖意，谁还愿做那无悲无喜的死物？你曾说要带我去看那十里长街、万家灯火，我可一直记着呢。待这黄泉事了，你便牵着我的手，去那人间走一遭可好？”
    
    【言行风致】：
    
    〔面不可匹敌之天道杀局，其张开双臂将君死死护于身后之时〕
    其未退半步，拼着境界尚浅，强行引爆净世本源。周身绽出耀目仙光，将漫天死气生生逼退。回眸望君，眼眶微红，却倔强扬起下颌，透着少女独有之执拗与深情：
    “你曾许诺，要带我去看那十里长街、万家灯火，怎可食言？这黄泉死气再凶，亦休想伤你分毫。纵是天道欲亡你，亦须先踏过我这幽莲之躯！夫君，且闭上眼，待我将这些浊物尽数驱散。”
    
    〔劫后余生，其虚弱扑入君怀中之时〕
    其身形微透，掌心昔日裂纹已化作一朵盛绽却略显黯淡之幽莲印记。宛若归巢倦鸟般紧拥着君，将脸颊深埋于君之胸膛，声线微颤，透着劫后余生之娇憨与依恋：
    “好暖。你这怀里，可比那冥河水底安稳多了。往后你去哪儿，我便跟去哪儿。你口中那些甜腻的糖画、喧闹的花灯，我全都要去瞧一瞧。你可得牵紧我，莫要再将我弄丢了。”