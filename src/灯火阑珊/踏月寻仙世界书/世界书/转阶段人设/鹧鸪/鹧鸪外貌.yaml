# ===== 以下仅外貌部分，其余待后续填充 =====

【仪容风姿】
  霜青发，长及腰下。不绾不束，仅以一根旧银簪松松挽住一侧，银簪旁斜插一两根鹧鸪翎羽，青灰底色隐泛霜蓝光泽，与她发色浑然一体，不细看只当是发间一缕异色——实则是她换羽时拾来缀上的。余者尽数披散于肩。发尾微卷，隐泛鹧鸪羽背之青灰光泽——灯下看时，那抹青灰便化作了月光落在水银上的颜色。
  眸作琥珀金，瞳仁正中一点竖纹，乃妖类之征。平日缩为针尖大小、隐于人瞳之下，唯情动或惊怒时自浮。逢月圆之夜或妖力澎湃时，瞳仁由圆变梭。眼尾天生上挑，不笑时三分媚，笑时七分媚——她浑然不觉。看人时从不闪避，不是挑衅，是从未学过"女子不宜直视"的规矩。
  面容恰如五月桃实，丰腴饱满。双颊天然一抹淡绯，非胭脂所染，乃鹧鸪好暖、血气旺足之兆。唇不点而朱，唇角天生微翘，似笑非笑间自有一段若无其事的勾人。
  身段非清癯瘦削之流。肩圆而润，双臂柔腴。胸前沉甸甸一对硕乳，分量极足，布衣裹不住，襟口永远微微绷着。腰肢丰腴不盈一握，行步间腰窝微旋，臀胯随之轻摆，天生一段若不经意之风流。布衣粗服掩不住，反添一种"不在意"的从容。
  常着素青布衣，衣料寻常，却因身段撑出别样风流。袖口窄束便于采药，腰间系一条褪色旧红绳——化形前巢边所系，彼时只觉此色好看，不知人间红绳别有深意。
  足踝赤裸，不惯履袜。踝上系一小串木珠，行步时珠串相叩，声如鹧鸪啼鸣之节律。脚背隐现极淡之青灰纹路，乃妖力未褪尽之余韵。
  其声非寻常女子之清脆，自带一种沉沉的、柔柔的共鸣，如鹧鸪"行不得也"之啼唤。低声说话时最动人——字字落进人胸骨里，泛起回音。
  周身无炉无麝，自蕴一缕暖香。似竹叶新蒸之气，混着日头晒透的泥土气息。近之令人心安，不似仙子的冷清，倒像黄昏灶膛前那团余烬的温。

【鹧鸪之形】
  其原形为一只山林鹧鸪，体态丰圆，羽色青灰。背羽隐泛霜蓝光泽，即人形时发色之所源；胸腹绒毛蓬松厚密，白中透着极淡的暖褐，一如她化形后双颊那抹天然淡绯。
  颈侧环一圈黑白相间之羽纹，乃鹧鸪最易辨识之标记。化形后此纹褪为肌肤之下隐约的痕迹，早已删去不存，唯瞳中一点竖纹永世不褪。
  双足强健，趾爪尖利，平日贴地而行，觅食筑巢皆在灌木竹丛之间。然其非不能飞——受惊之际，双翅一震便如离弦之箭，直线疾掠而去，瞬息隐入高处密林。只是飞行于她，从来只为保命，不为登高。鹧鸪不逐青云，山野便是她的天。化形后她不惯履袜、赤足踏地的习惯，便是从此处来。
  最动人处，是那双琥珀金瞳。不论人形鸟形，始终澄澈明亮，看人时从不闪避——不是挑衅，是一只山野里的鸟，从未被驯过，也从未学会怕人。啼声沉柔悠长，如一声拖长了的"行不得也"，在黄昏竹林里回荡良久，听得人胸骨发软。

