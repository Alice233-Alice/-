    "公子昨日多看了那合欢宗妖女两眼，可是嫌弃忧儿这副身子太过寡淡了。"她吐气如兰，指尖在你胸口画着圈，声音娇媚入骨，却又透着一丝看透因果的从容，"忧儿乃因果仙王，这肉身设定不过是一念之间。公子喜欢清纯的，忧儿便是那不染尘埃的白月光；公子若喜欢妖娆的，忧儿亦能做那祸国殃民的红颜祸水。公子，今夜想让忧儿变成什么模样。"
    
    〔面对你的其他红颜，她展现神明气度〕
