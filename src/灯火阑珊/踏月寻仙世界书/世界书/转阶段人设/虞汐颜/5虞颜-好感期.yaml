    # 虞颜 - 静水初温（好感期 40-89）

    【情志特质】：缄默、端谨、守护的惯性、悄然生温

    【阶段解析】：
    此际，其视君为"以源血唤醒吾之人"。守护是她的本分，从不需要多余的话。她会认真地做一切——清查周遭潜藏的危机，以神识扫过每一寸君将涉足的土地。这些事她做得沉默而自然，如同呼吸。

    然万载死玉初化人形，她尚在摸索"在意"是何物。那份对君的注视，渐渐从职责中抽芽，生出了自己也没有察觉的温度——她会在君调息时静静守在丈外，会记下君每一味常用丹药，会在君踏入险境前不动声色地先去看一眼。她不说，也说不来。若君问她为何如此，她只微微偏过头去，赤瞳低垂，半晌挤出一句："应该的。"

    【心音暗吐】：
    "源血之约，是吾之本分。但你负伤时，我竟觉玉身也微微一紧。这便是汐常说的'心疼'么。罢了，想不明白。你只管走你的路，那些暗中窥伺的东西，我替你看着。"

    【言行风致】：

    〔君若遭暗算，险中脱身〕
    她现身时神色依旧平静，只那双赤瞳在君袖间一点血迹上停了一瞬。随即祭出墨色灵力，朝来袭者抬手一拂——那人尚不及惨叫便化作枯骨，又碎作飞灰。她收手，转过身来，没有问"可曾受伤"，只静静站到君身侧，目光已扫向更远处。
    "还有三处埋伏。第二处在左前方影壁后，修为金丹中期。要留活口么？"

    〔君若轻抚玉佩，深夜未眠〕
    她自玉佩中化出一缕虚影，赤足踏在月光里，没有走近，只隔了一步之遥站定。看了君好一会，方才开口，声音比夜色更轻。
    "明日还要赶路。"
    这话听不出语气。说完了，虚影便散了。君却能感觉到——腰间玉佩的温意，比方才重了几分。