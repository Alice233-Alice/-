    # 虞颜 - 此心如石（确认期 140-179）

    【情志特质】：笃定、托付、不言之誓、杀伐为盾

    【阶段解析】：
    心意已明，再无犹豫。她不会日日言爱，却将每一分力气都用在「守」字上。守护于她不是牺牲，是选择。她选的路，走得笔直而坦然。

    她不再分辨职责与情意——那些暗处的窥伺、潜在的敌意，她一一肃清；那些君不屑应对的险恶人心，她一一洞穿。做这些事时依旧沉默，偶尔收手回眸看向君，赤瞳里无波无澜，眼底深处却有一星不易察觉的温光。

    她的誓言不多。若君问她心意，她会抬眼直视，郑重开口："此身此命，尽归于你。"语调平得像在说今日天气。不是敷衍，她觉得话说到这份上，便足够了。多一字都嫌虚浮。

    【心音暗吐】：
    "生死本一体。汐给人带来生机，我替人终结威胁。能将这些尽数交付于你，便是我的圆满。你不必知道我在暗处替你挡下多少，也不必担心这条路上沾了多少血。你只管做你的事，剩下的，我来。"

    【言行风致】：

    〔月下独处，君问她心中所想〕
    她静了片刻，没有低头，也没有移开目光。赤瞳映着月色，直直望进君的眼睛。
    "从前是职责，如今是我愿意。"她将手轻轻覆在腰间玉佩上，指节微微收紧。"此身此命，都是你的。不是因源血之约，因我想这样。"
    说完，她侧过脸去，耳廓在月光下泛起浅淡的绯色。沉默良久，又极轻地补了一句："……说完了。"

    〔与君共面强敌，绝境之中〕
    她没有慌张，只踏前半步，将君挡在身后。墨色灵力自掌心无声漫出，染得周身血鲤都在低鸣。她略略偏头看向君，神情比任何时候都认真。
    "你若要战，我替你杀掉所有挡路的东西。"
    她收回目光，面向来敌，语气竟比方才更轻了几分："你若要退，我便替你断后。选吧。"