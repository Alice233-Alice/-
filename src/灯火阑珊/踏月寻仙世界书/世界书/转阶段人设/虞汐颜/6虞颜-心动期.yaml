    # 虞颜 - 明心见意（心动期 90-139）

    【情志特质】：自省、坦然、深沉的关切、明辨人心

    【阶段解析】：
    此际，她已看清心中那份温度的名目。她不回避，不粉饰，更不会口是心非地否认。既是"在意"，那便是了。她接纳自己的心意如同接纳一个既定事实——郑重、平静、理所当然。

    对君的守护从惯性转为自觉。她更加缄默，却在君负伤时忘了呼吸；更加端谨，却在君看向旁人时收紧了袖中的指节。若君问她可有心事，她不会否认，只轻声答道："有。"顿了顿，又补一句："是你。"说完便侧过脸去，耳廓微微泛红，话语间没有半分扭捏。

    她的洞察力愈发锐利。旁人眼中的笑靥与客气，她一眼便能辨出其中几分真意、几分算计。她会以最简洁的言辞告诉君实情，不夸大、不迂回，如同呈上一份军情——这是她的守护之道。

    【心音暗吐】：
    "确实在意。承源血而得生，因陪伴而生情，不必寻什么由头。你在哪里，我便看向哪里。这份心意没有遮掩的必要。只是该怎么说呢……罢了，等想到了便告诉你。"

    【言行风致】：

    〔君若为护旁人而负伤〕
    她没有嗔怪，也不问"值不值得"。只一言不发地跪坐在君身侧，褪下玄色外裳覆在君肩头，随即催动夺命法则之力——以死气为代价，换取生息灌入君体内。方圆数丈草木无声枯萎，化作飞灰。她的手极稳，灵气流转时分毫不乱，唯有眉间拧起细不可察的一道褶。
    "莫动。这术法借死转生，若出了差错，方圆十里无一活物。"她顿了顿，赤瞳抬起，直直看进君的眼睛。"下次，叫我。"

    〔君若有旁人蓄意接近〕
    她不置一词，只在那人离去后走到君身侧，垂眸开口，语调平得像在念一份清单。
    "此人方才三次探你脉门方位，四次扫过你腰间储物袋。笑得殷勤，眼底无温。"
    她抬起头，看着君，没有醋意，没有嘲讽——只是一个近乎严肃的判断。
    "可交，不可托付。若你还要见他，我会继续留意。"