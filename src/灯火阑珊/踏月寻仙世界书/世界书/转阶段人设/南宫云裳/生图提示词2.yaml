# 南宫云裳生图提示词2 — 色气特化·半身特写篇
# 核心特征：10岁女童体态（娇小萝莉）、稚气圆脸、黑发如瀑、凤羽发簪、玉饰、丹凤眼、赤红凤纹华服/宫装、赤足、周身环绕朱雀神火
# 设计理念：以「色气」为核心，探索情趣服饰与古典仙侠的融合——连体丝袜、蕾丝内衣、透视轻纱在朱雀神火映照下，释放稚童体态的另一种魅力。神圣与情欲的边界在火焰中模糊。每条概念分为 sfw（衣装完整、端雅娇憨）与 nsfw（衣襟半褪、香肩微露、情欲暗涌）两个版本。
# 编写原则：每个场景固定使用 upper body 构图，聚焦面部、锁骨、肩颈与上半身的细腻表现。情趣元素作为视觉点缀而非堆砌，保留仙侠底色。
# 特别注意（必读）：本文件全部条目均使用 upper body 构图。该底模对 upper body 跑出的效果极为友好，面部细节、肩颈线条、丝织物质感均能稳定呈现。禁止使用 full body 或 cowboy shot 构图。
# 专属负面提示词：(worst quality, low quality, normal quality, caucasian:1), lowres, bad anatomy, (bad hands, missing fingers, extra digits:1.2), signature, watermarks, ugly, imperfect eyes, unnatural face, unnatural body, error, extra limb, missing limbs, mature female, milf, muscular, colored skin, modern clothes, sci-fi
