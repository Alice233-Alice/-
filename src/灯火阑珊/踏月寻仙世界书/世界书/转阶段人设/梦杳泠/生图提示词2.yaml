# 金瑞六式 · 上半身色气系列（Upper Body Sensual Series）
# 设计理念：梦杳泠的本质是上古瑞兽遗孤——色气不来自衣物的滑落与暴露，
#    而来自她作为小狐仙的兽性本能与少女纯真之间的微妙缝隙：
#    狐耳被触碰时的不自觉颤抖、狐尾卷住指尖的依恋、铃铛轻摇时的天真烂漫
# 核心锚点：狐耳狐尾的表达性、眉间金印的神秘感、白金发与暖金光的仙灵氛围
