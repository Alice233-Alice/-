【北冥·玄武玄境】
● 位置：大陆北方
● 地貌：无边黑色海洋，海水比普通水重三倍，浮力极弱
● 灵气：水属性灵气深沉，海水有消融灵气特性
● 圣兽：玄武（沉睡于深海）

【核心特征】
1. 玄冰山：黑色冰山永不融化，漂浮海面
2. 归墟海眼：位于北冥深处，吞噬一切的漩涡
3. 鲛人王国：海底智慧种族，擅水系道法与歌谣幻术

【主要势力】
- 玄武宗（镇守北冥，守护玄武圣兽沉睡之地）
- 鲛人王国（海底智慧种族，神秘强大）
- 冥船商会（驾驶特殊冥船横渡北冥的唯一商队）

【资源特色】
- 玄冥重水：一滴重千斤，可炼化为本命真水
- 万年玄冰：极寒之冰，保存灵物百万年不坏
- 鲛人泪珠：化为珍珠，有奇特功效

【特殊法则】
- 水属性神通威力倍增
- 火属性神通被压制到极限（威力剩20%）
- 北冥海水消融灵气，长时间浸泡修为下降

【危险警告】
- 冥海漩涡：突然出现的漩涡，元婴修士难挣脱
- 玄冰暗礁：隐藏的黑色冰山，船只触之即碎
- 深海巨妖：栖息深处的恐怖生灵，体型堪比山岳

