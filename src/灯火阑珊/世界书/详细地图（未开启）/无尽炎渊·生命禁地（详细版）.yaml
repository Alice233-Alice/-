【无尽炎渊·生命禁地】
● 位置：南炎地底深处
● 外观：深不见底的熔岩深渊，越往下火焰等级越高
● 特性：火焰分层次，底层燃烧“概念”
● 危险等级：★★★★★（火灵根修士相对安全）

【禁地特征】
1. 火焰分层：红焰→白焰→青焰→黑焰→虚无之火
2. 炎魔军团：地火中诞生的智慧生灵
3. 祝融残念：上古火神陨落后的意志残留
4. 概念燃烧：底层火焰可燃烧“存在”本身

【进入条件（最低）】
- 修为：至少元婴期（需抵御高温）
- 灵根：火灵根修士生存率较高
- 法宝：需火系防护法宝或神通
- 抗性：需有抵御心火攻击的能力

【火焰层次】
1. 红焰层（0-1000丈）：普通熔岩，金丹可抵抗
2. 白焰层（1000-3000丈）：焚金融铁，元婴需防护
3. 青焰层（3000-5000丈）：熔灵化气，化神勉强
4. 黑焰层（5000-8000丈）：焚虚炼神，炼虚危险
5. 虚无之火层（8000丈以下）：燃烧概念，合体慎入

【危险】
- 火焰等级压制：下层火焰克制上层所有防护
- 炎魔袭击：成群结队的智慧火元素生灵
- 祝融残念：引发心火，从内部燃烧
- 概念崩塌：接触虚无之火可能导致“存在”被抹除

【机缘】
- 祝融神火：上古火神的本命真火
- 炎帝传承：完整的火系上古传承
- 地心源晶：地核能量凝结，蕴含本源火则
- 炎魔契约：与强大炎魔签订契约，获得助力

【相关事件】
- 每百年喷发一次“地火潮”，影响整个南炎
- 传闻祝融神火择主，等待有缘人
- 炎魔军团周期性进攻离火宫，试图占领地表
- 曾有修士在此领悟“火之大道”，直接飞升