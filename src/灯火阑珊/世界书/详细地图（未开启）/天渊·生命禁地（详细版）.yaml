【天渊·生命禁地】
触发词：天渊,天之伤痕,虚空伤口,星穹深渊,苍穹裂痕,星辰坠落
● 位置：悬浮在苍穹之上的虚空裂痕（距地面三万丈）
● 外观：长三万里、宽百里的黑色裂隙，边缘闪烁七彩空间乱流
● 特性：星辰碎片从中坠落，内部时间流速混乱
● 危险等级：★★★★★（非元婴勿入）

【禁地特征】
1. 高空环境：需持续飞行，坠落必死
2. 星辰雨：大量星辰碎片集中坠落
3. 虚空生物：来自其他位面的诡异生灵
4. 空间迷宫：内部空间折叠，极易迷失

【进入条件（最低）】
- 修为：至少金丹期（掌握飞行）
- 能力：需持续御空，或拥有飞行法宝/坐骑
- 抗性：需抵御空间乱流的法宝或神通
- 时机：每月朔日（新月）空间最稳定

【分层结构】
1. 乱流带（3万-2.5万丈）：虚空罡风，金丹极限
2. 星辰坟场（2.5万-1.5万丈）：悬浮星辰碎片，形成陨石带
3. 龙凤战场（1.5万-0.5万丈）：祖龙凤凰决战遗址
4. 深渊核心（最深处）：空间断裂处，通往未知

【危险】
- 坠落风险：失重环境，法力不济即坠亡
- 星辰雨：覆盖范围极大的碎片坠落
- 虚空生物：攻击方式未知，难以防御
- 空间迷宫：可能永久困在其中

【机缘】
- 星辰核心：上古星辰内核，蕴含星辰法则
- 龙凤传承：祖龙或凤凰留下的完整传承
- 空间道纹：天然形成的空间法则具现化
- 天外奇物：从其他世界掉落的未知宝物

【相关事件】
- 星辰坠世：每年都有碎片坠落，引发争夺
- 天渊潮汐：每49年扩张一次，虚空能量喷发
- 龙凤幻影：月圆之夜投影上古大战幻象
- 深渊低语：靠近核心时听到虚空低语
