【东苍·青帝故土】
● 位置：大陆东方
● 地貌：无边原始森林，浮空岛屿悬浮于树冠之上
● 灵气：木属性灵气异常浓郁，呈青绿色
● 圣兽：青龙（守护圣兽）

【核心特征】
1. 浮空岛屿生态：立体城邦，悬空城联盟
2. 古木秘境：万年古木成精，形成独特生态系统
3. 青帝遗迹：传说青帝在此悟道，留有传承

【主要势力】
- 青龙殿（守护青龙遗脉，镇守青帝陵）
- 建木宗（崇拜建木神树，擅木系道法与灵植培育）
- 悬空城联盟（浮空岛屿城邦组成的商业同盟）

【资源特色】
- 青木灵液：万年古树分泌，延寿十年
- 飞天神木：炼制顶级飞行法宝的灵材
- 木灵精魄：古木成精后凝聚的精华

【特殊法则】
- 木属性功法修炼速度×2
- 火属性功法受压制（威力减半）
- 森林深处时间流速异常

【危险警告】
- 树海迷宫：极易迷失，古树会自行移动
- 食人妖藤：金丹以下难以察觉
- 木灵暴动：灵气潮汐时植物攻击非木系生灵