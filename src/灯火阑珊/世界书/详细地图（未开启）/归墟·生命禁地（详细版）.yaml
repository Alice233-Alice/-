【归墟·生命禁地】
 位置：北冥海眼深处
 外观：直径千里的黑色漩涡，吞噬一切光线
 特性：万物至此被分解为原始灵气，重归天地循环
 危险等级：★★★★★（大乘以下十死无生）

【禁地特征】
1. 绝对吞噬：连光线都无法逃逸
2. 法则崩解：五行法则紊乱，神通威力不可预测
3. 时空乱流：可能被抛到任意时间或空间
4. 归墟意志：若有灵智，会本能攻击一切“存在”

【进入条件（最低）】
- 修为：至少化神期（否则百里外灵气被抽干）
- 法宝：需携带“定海珠”或同等空间稳定至宝
- 时机：朔月之夜，归墟吸力最弱时

【内部结构】
- 外围（百里）：灵气剥离，修为持续流失
- 中层（五十里）：法则崩解，神通失效
- 内层（十里）：时空乱流，不可预测
- 核心：绝对的“无”，连时空概念都不存在

【危险】
- 灵气剥离：越靠近核心，自身灵气流失越快
- 法则崩解：神通威力随机，可能反噬
- 时空乱流：可能永久迷失
- 归墟意志：攻击一切闯入者

【机缘（极稀有）】
- 混沌之气：天地未分时的原始能量
- 轮回碎片：轮回法则的碎片
- 真仙遗骸：可能遗落仙骨或仙器

【相关事件】
- 每百年喷发“混沌潮汐”，席卷北冥
- 传闻底部连接“六道轮回”缺口
- 上古大能曾试图用归墟炼制“灭世法宝”