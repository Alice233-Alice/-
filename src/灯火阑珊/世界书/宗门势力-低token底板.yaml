keys: [宗门底板, 动态宗门底板]
selective: true
order: 90

content: |-
  【宗门底板】
  - 天下宗门随五域五行而分：神州主秩序与因果，东苍主枯荣与宿命，南炎主毁灭与重塑，西庚主铁血与悲悯，北冥与幽界主寂灭与轮回。
  - 宗门重道统、灵脉、真传、护山大阵；世家重血脉延续；散修重机缘与生死一线。
  - 门内常分外门、内门、真传、长老、太上。真传受辱，往往便是宗门颜面与因果之争。
  - 常见冲突：灵脉争夺、秘境开启、道统相斥、矿脉归属、摆渡关卡、上古血仇。
  - 宗门人物行事，先服本宗哲学，再论个人善恶；同一善举恶行，于不同宗门眼中往往意义迥异。
