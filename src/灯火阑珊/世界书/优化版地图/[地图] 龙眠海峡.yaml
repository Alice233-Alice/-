[地图] 龙眠海峡

【龙眠海峡·水族锁钥】中危·险度50
定位: 东苍东岸大陆架与龙眠海之间, 宽约200里、深千丈; 水族领地法定边界。
地貌: 西侧建木气根成红树林廊道, 东侧深海平静; 海底千计沉船为"叹喟坟场"。
法则: 中线以东归水族, 无潮音玉牌者受水压/暗流排斥; 持牌或苍木龙吟阁令可通行。
连通: 西接东苍红树林, 东至龙眠海水晶宫外围; 北端暗流通眠龙渊(许听雨祭祀圣地, 王族外禁)。
势力: 泣珠幻海庭巡海夜叉; 水族使节站由三千年老蛟审问来者"是谁/来做什么/带走什么"。
地标/钩子: 红树林廊道(母亲的血管); 眠龙拱门(睡龙睁眼即警判); 叹喟坟场(沉船遗宝, 缴一成海葬税); 眠龙低语可悟水道或溺入孤寂。
风险: 水族不嗜杀也不宽恕; 擅闯时水本身会杀人。

