[地图] 南炎

【南炎·朱雀圣域】低危·险度30
定位: 神州南方火域, 赤壤常夏; 休眠火山、琉璃城、地热灵泉繁盛, 朱雀曾浴火留生生不息之火。
法则: 火法+5成, 易悟生生不息; 水法-3成; 炼丹炼器成率/品质提升。
连通: 北接神州; 火眼封印下通无尽炎渊, 旁及雷暴海。
势力: 南明琉璃宫(法度/琉璃仙城); 神农丹苑(丹药/灵植); 大冶天工炉(炼器第一宗)。
地标/资源: 赤霞花海、汤谷灵泉、不灭火山口; 赤壤灵芝、琉璃火晶、朱雀遗羽。
风险: 寻常安居; 原始火山群/封印松动处有火毒瘴气和地火喷发。
市井: 汤谷疗养院供仙凡泡泉谢地火; 琥珀城工匠用火晶废料制首饰; 散修坊以残次辟谷丹和地火渣维生。

