[地图] 四海

【四海总览】地界环海与外海要点
- 潮音海: 神州以西/接西庚/远天泣洋; 近岸星陨海啸与陨铁打捞, 散修亡命、万象森罗坊捕队、太白剑修静听"天哭"; 极西永雨, 灵气向西抽离, 陨铁大陆产死星盐(毒杀元婴, 邪宗秘购), 留百里爪痕。
- 龙眠海: 神州以东/接东苍/远无尽洋; 近海为水族王庭、水晶宫与归墟之主许听雨信仰; 最东无海图处水如深蓝琉璃、倒影异常、罗盘神识失准, 称"母亲的后院", 传有甜水之海。
- 蓬莱幻海: 神州东南迷雾之海; 天然蜃气迷阵, 岛位变幻; 散修联盟、黑市商会、避世魔修汇聚, "海市蜃楼"拍卖见不得光的重宝与情报。
- 北冥冰海: 神州以北接北冥; 万载玄冰与极光, 渡厄幽帆垄断极寒商路; 通北冥灵境与归墟海眼, 产玄冥真水、极寒灵药。

