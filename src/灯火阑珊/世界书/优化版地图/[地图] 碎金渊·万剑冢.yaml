[地图] 碎金渊·万剑冢

【碎金渊·万剑冢】至凶·险度90·剑修或悟道或碎心
定位/成因: 潮音海极西海沟地壳裂隙; 天渊折剑、仙兵与人间残剑的剑意/金气凝为剑坟, 与神木枯冢互为镜像。
特性: 万剑倒插、剑鸣如悼词; 剑意侵蚀血肉神识, 剑修可共鸣顿悟, 道心弱则剑法大乱。
连通/涉足: 上通潮音海深裂, 底至金气本源; 非元婴剑修勿入, 入前须"交一剑"得共鸣。
分层: 残剑滩(近千年残剑); 断刃崖(上古剑痕/无形断刃); 万剑渊(攻神识, 可得剑意传承); 金气本源(先天金气, 久留血肉化金)。
奇珍: 碎金结晶、剑痕铭文、金气之种。
风险/异变: 无形断刃、剑意反噬、金属同化、剑心魔; 万剑同悲时残剑同鸣、金芒如蜡泪。
访客: 太白剑宗访剑会, 忘机剑庐枯坐, 藏锋敛锷只收碎金, 无生剑派相关记录被抹。

