- 琼轮垂曜宫 ↔ 千机诡市: 情报只换/真相公开, 暗战可定宗门存亡。
- 浮云朝露阁 ↔ 万象森罗坊: 风月不可标价/万物可交易。
- 大冶天工炉 ↔ 劫灰神祠: 神兵成器/烈火澄心, 争火脉炉火。

【中立枢纽】可接触但代价明确
- 万象森罗坊: 契约与等价交换。
- 忘川风月楼: 体验换真实记忆, 各域高层常有抵押。
