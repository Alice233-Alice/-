- 彼岸提灯人 ↔ 无间轮回道: 生死守界/慈悲渡厄, 在轮回边界相阻。
- 遗誓林 ↔ 苍木龙吟阁: 守誓/守陵, 互敬但涉青帝陵或背誓者即强硬。

【共生】优先谈判
