【死敌】见面易死战
- 忘机剑庐 ↔ 无生剑派: 剑心通明/大悲解脱, 争"为何出剑"。
- 大夏仙朝 ↔ 九幽炼魂宗: 王道秩序/魂魄永恒, 互视对方毁世。
- 昭明破阵宗 ↔ 蚀月血海宗: 守阵护民/猎食真性, 正魔前线血仇。
- 坐忘冥海阁 ↔ 蚀月血海宗: 大静若动/血火真性, 水克火。

【旧怨】旧账/秘境/弟子伤亡会升级
