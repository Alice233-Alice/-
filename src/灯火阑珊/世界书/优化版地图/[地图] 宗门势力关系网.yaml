- 大冶天工炉 ↔ 藏锋敛锷山庄: 炼器/矿材互需, 常争价格与优先供给。
- 泣珠幻海庭 ↔ 渡厄幽帆: 水族奇珍与避水宝/北冥幽冥航路互换。
- 太虚蜃楼 ↔ 万象森罗坊: 观测记录/资金航路互换。
- 遗誓林 ↔ 万象森罗坊: 誓约/契约互认, 真假与价码互补。

【竞争】不轻易撕破脸
