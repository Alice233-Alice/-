[地图] 黄泉古迹

【黄泉古迹·生死交界】高危·险度90·元婴可边缘试探
定位: 幽界之中、神州西南, 九曲天河之源; 灰雾废墟中彼岸花开落、引魂铃响, 是摆渡人晚棠梦境映世。
特性/涉足: 阴阳交汇, 死气沉重而含净世幽莲灵机; 非元婴须避, 入内需往生符或循铃音得梦境庇护。
连通: 神州天河为入幽冥门户。
诸景: 黄泉路、奈何桥/忘川虚影、望乡台、九口轮回井、冥河滩涂(晚棠梦游与净世幽莲)、亘古石门。
奇珍/风险: 孟婆汤原浆(破心魔但失记忆)、净世莲子; 迷失亡魂、黄泉死气、轮回幻境。
势力/异变: 彼岸提灯人镇陵, 无间轮回道图谋颠覆轮回; 幽冥潮汐逢甲子或晚棠强醒爆发, 天河化血、死气反噬。

