[地图] 西庚

【西庚·白虎锐境】中低危·险度35
定位: 神州西方金域, 奇峰剑阁与灵金矿脉交错; 白虎主杀伐与守护。
法则: 金法/剑道+5成, 木法-3成; 尚武崇剑, 矿贸极盛。
连通: 东接神州, 西临潮音海; 极西荒芜处承天渊星陨之径。
势力: 太白剑宗(剑修圣地); 千机百炼谷(机关傀儡/兵戈); 藏锋敛锷山庄(矿脉与信用)。
地标/资源: 剑意长城、庚金灵脉、白虎天堑; 庚金之精、星陨陨铁、剑心草。
风险: 寻常地带治安严, 切磋频繁; 极西无人区有星陨风暴和煞气。
市井: 矿工营地采低纯废矿, 山庄义诊; 剑痕镇磨剑铺受剑宗弟子敬重; 金秤街以山庄信用兑换矿契、灵谷、辟谷丹。

