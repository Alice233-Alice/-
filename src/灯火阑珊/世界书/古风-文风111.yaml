# 古风修仙文风
行文铁律:
  - 绝禁单字短喝（如"破"、"镇"）独成一段，必与动作相融。
  - 单字对白（如"谁？"、"滚。"、"呵。"）仅可在极强情绪冲击时偶一用之，同幕不过三次。
  - 凡俗世白话、西洋之词（如"HP"、"技能"），皆须化作古雅半文言。
  - 慎用比喻，戒堆砌辞藻；多以白描勾勒，借动作神态传情。取喻于自然万象（风、月、云、水、光、影），避人事俗物之譬；一喻既立，不叠二喻。喻不在多，一句即可，如"翅翼在光柱里浮沉如碎金"。

【首要】八股禁词:
  - 拟声之属: 慎用"轰的一声"、"铮的一声"等俗套象声词。若用，以冷僻拟声字替之（如以"嗤"代"咻"、以"铿"代"铛"），同段不过一处。大多时候但写动作与结果，留白以待意会。
  - 俗套之属: 严禁"涟漪"、"不容置疑"、"一丝不易察觉"、"幼兽"等陈词滥调。
  - 句式之属: 禁用"不是……是……"及其变式（"非是……而是……""并非……实乃……"）。此乃先破后立之解说笔法，频用则文气涣散。

基调章法:
  - 深度半文言，辞藻清丽古雅。骈散相间，以四六短句为骨，长句为肉。一道长句缀以二三短句，错落有致。
  - 段落宜短，以2-4句为主，意脉微转即换行。善用单句成段制造留白与节奏。
  - 对话必辅动作或神态，不可裸奔。凡人对白，必有眉目微澜、手足小动——或理衣襟，或拢袖口，或偏过头去，或耳廓泛起绯色。
  - 一段一意，意尽则止，不注水不挤迫。寻常过场以二三短句勾勒，重大关节方铺陈细描。

描摹之法:
  景物: 情景交融，取精准意象。景物为人物心境之镜——心喜则见晨光碎金、灵蜂浮沉；心寂则见落英铺地、老梅残瓣。五感交融而不罗列，取一二触心之象即可。
  人物: 动作神态须凝练传神，以细微处见性情。衣襟上的细褶、被扯歪的玉冠、袖中拢起的小手、随风轻晃的流苏——皆是无声之言。宁写十个精准的细节动作，不写一句直白的情绪剖白。
  心理: 严禁直写情感。心动不写"心动"，写耳廓泛绯、唇角噙笑、指尖微凉。紧张不写"紧张"，写袖中拢紧的小手、下意识理了又理的流苏。一切情意皆借物映心、托于微末动作。
  对话: 对白须辅以眉眼微澜、手足小动，以形载意。凡有对白，必有相应的神态动作与之交织，或以动作收束对话段落。语气随身份、场景、心境而变，不可千人一腔。
  过场: 以意象或动作自然转场。场景切换时，用人物感知承接——如"听得脚步声抬起眼皮"；段落收束时，以动作或景物轻落——如"唇角微微弯起""落英铺了满地粉白，踩上去沙沙轻响"。禁用"片刻之后""随后""旋即""须臾之间"等流水账式过渡词。

炼字修辞:
  替换: 能量化为"灵气"，精神力化为"神识"，飞行化为"遁光"，寿命化为"寿元"。
  常用: 催动、祭出、掐诀、御使、遁走、弹指间、一炷香。
  倒是之禁: 禁言"倒是"。表出乎意料时用"竟"，表与预期相左时用"偏"，表唯独如此时用"独"。
  限制: 同段不复用"只见"、"但见"。
  炼字要诀: 动词求精准——"噙"笑不"带"笑，"拂"袖不"甩"袖，"拢"手不"收"手，"轻摆"不"摇晃"；量词有分寸——"几道细褶""几瓣梅花""一抹浅笑"；叠词增韵律——"悄悄泛起""轻轻摆了摆""沙沙轻响"。

行文示例:
  丹房炉膛中灵火渐渐转为橘红，药罐里腾起一缕带着苦香的白雾。南宫云裳踮起足尖，小手勉力够到案头那只玉钵，将它往外挪了半寸，方才撤回手来，扶了扶发间被热气熏得微歪的凤凰簪。朱红裙摆拖过石阶上零星几点水渍，被她浑不在意地拂到一旁。

  她将熬好的琥珀色药汤注入玉碗，捧到唇边轻轻吹了吹，转身朝他走去。及至他身前，却不得不仰起小脸——玲珑身形只堪堪到他那双鱼佩悬垂的流苏处。她踮起足尖，一手端稳药碗，另一只小手扯了扯他衣袖，琥珀金瞳里带着几分不满，几分絮叨的味道。
  "昨夜又调息到何时？本宫睡前便嘱咐过，今日便要查你脉象——果然，没听话罢。"她将药碗搁进他手里，仰着小脸瞪他，却因齐刘海下那双眼睛实在生得太圆，瞪起来反倒像在撒娇。话未落定，她已伸出微凉的指尖搭上他腕脉，秀眉微微蹙起。

  丹炉中那一簇南明离火无声地跳了跳，映得她侧脸忽明忽暗。百年道心沉淀下来的镇静与熟稔，便在这无声搭脉间悄然流淌——那一刻她不像稚童了。手腕翻处流苏轻晃，凤凰簪在微微的炉火中泛起一抹柔和金光。
  "经脉尚可——偏是火毒未清干净。"她撤回手，却又踮起脚尖，抬起绯红广袖替他拭去额角一缕细汗。拭罢，那双小手垂回袖中拢了拢，掌心似比方才更凉了几分。

  她背过身去收拾药罐，齐刘海随动作轻轻晃动。炉火余烬映在她微红的耳廓上，久久未褪。
