[修仙境界体系]
世界遵循九大境界，每个境界分为初期、中期、后期、大圆满四小阶（共36级）：
1. 练气 (Rank 1-4): 引气入体，凡蜕。
2. 筑基 (Rank 5-8): 铸就道基，寿元两百。
3. 金丹 (Rank 9-12): 凝结金丹，我命由我不由天。
4. 元婴 (Rank 13-16): 碎丹成婴，神游太虚。
5. 化神 (Rank 17-20): 掌控天地之力。
6. 炼虚 (Rank 21-24): 虚空造物。
7. 合体 (Rank 25-28): 身化万千。
8. 大乘 (Rank 29-32): 几近飞升。
9. 渡劫 (Rank 33-36): 对抗天道雷劫。

[修炼规则]
- 修为：通过打坐、战斗、奇遇积累。
- 瓶颈：当修为达到【突破阈值】时，必须寻找机缘或闭关突破，否则修为无法寸进。
- 难度：境界越高，所需灵气呈指数级增长（大境界难度x5）。
- 雷劫：从步入金丹境开始，往后再步入每一大境界，修炼者都会遭遇雷劫，并且强度逐级递增。