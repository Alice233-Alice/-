  【天下宗门概览】以“正魔对立”与“争夺天地造化”为核心。正道重秩序与庇护，魔道重掠夺与本心，中立势力斡旋其间。各宗门依五行地势割据一方。
  
  一、神州 (中枢/正道鼎盛与暗流涌动)
  - 大夏仙朝：【正道·皇权统天】以凡人王朝镇压仙道，修气运律法。官员皆修士，言出法随。行事威严冷酷，视魔道为乱党，坚信皇权集运方能庇护人族。
  - 忘机剑庐：【正道·剑心通明】剑修圣地。门人清修寡欲、嫉恶如仇。不修繁杂法术，只求一剑破万法。遇魔修必拔剑相向，宁折不弯。
  - 太虚蜃楼：【中立·冷眼旁观】隐世宗门。只记录历史与推演天机，绝不主动干预正魔之争。
  - 万象森罗坊：【中立·等价交换】天下第一商会。只要给钱，正魔两道的生意都做。交易灵石法宝，亦交易寿命与因果。待人如沐春风，实则明码标价。
  - 千机诡市：【魔道·贩卖隐秘】万象森罗坊的暗面，神州地下黑市。贩卖天下最致命的情报与人命。喜欢用残酷的真相摧毁正道修士的道心。
  - 九幽炼魂宗：【魔道·抽魂炼魄】隐于神州暗处的古老魔宗。专拘修士生魂炼制万魂幡，认为肉身不过是皮囊，唯有灵魂在烈火中哀嚎方能产生最纯粹的怨力。行事阴毒，是正道修士最为忌惮的梦魇。
  
  二、东苍 (木属/生机与诡道)
  - 苍木龙吟阁：【正道·御兽驱木】东苍正道支柱。精通木系道法与御兽之术，世代镇守青帝陵，防备妖邪入侵。
  - 灵枢百草谷：【正道·悬壶济世】医修大宗。以救死扶伤为己任。然医毒不分家，若遇邪魔外道，亦会施展狠辣毒术自保。
  - 浮云朝露阁：【中立·及时行乐】居于东苍浮岛。门人行事奢华浪漫，精通音律与幻术，不问世事，只求今朝醉。
  - 镜花水月庵：【魔道·鼎炉采补】隐于东苍迷雾的纯女修魔宗。视男修为大药，表面清雅仙子，实则榨干猎物炼为剑奴药渣。
  - 遗誓林：【异族·守誓为道】东苍古林狐妖一族，以尾毫为证、诺柯为庭。立誓者银线织入林，背誓者体内生"誓棘"痛不欲生。不问正邪，只问真假。
  
  三、南炎 (火属/刚烈与毁灭)
  - 昭明破阵宗：【正道·浩然正气】南炎枪修与阵法大宗。常年镇守抵御魔道与妖邪的最前线。门风铁血刚烈，遇战必结阵冲杀，视死如归。
  - 大冶天工炉：【中立·匠心入道】南炎炼器圣地。门人皆是铸造狂人，为求极品材料不惜倾家荡产，对正魔之争漠不关心。
  - 劫灰神祠：【中立·烈火焚身】南炎苦行僧。平静忍受烈火焚身，信奉烧尽世间与自身污秽方证大道，行事极端。
  - 渊火灵族：【异族·纯粹炽烈】南炎岩浆生灵。无阴谋诡计，但领地意识极强，擅闯者皆被焚为灰烬。
  - 蚀月血海宗：【魔道·血脉掠夺】盘踞南炎火山之底的魔道巨擘。靠吞噬高阶修士精血修炼。行事残暴直接，视正道修士为“血食”。
  
  四、西庚 (金属/杀伐与铁血)
  - 藏锋敛锷山庄：【正道·财可通神】西庚正道。掌天下矿脉，先以财压人，无效则展露最凌厉不留余地的金系杀伐。
  - 折戟沉沙谷：【正道·军阵如一】西庚古战场遗脉。无个人意志，共享战阵思维。结阵即化冷酷不知疲倦的绞肉机。
  - 太白杀生冢：【中立·以杀止杀】西庚杀手组织。拿钱办事，但坚信“杀一救百”，杀人时流泪诵经，行事诡秘。
  - 无生剑派：【魔道·杀戮证道】游荡于西庚的极端魔道剑修，忘机剑庐的死敌。认为“存在即是罪恶”，行事疯癫嗜血，毫无底线。
  - 尸骨浮屠塔：【魔道·万物皆材】隐于西庚万人坑的邪修。收集强者尸骸炼制傀儡，最爱猎杀正道天骄作为“上佳材料”。
  - 碎星幽影宗：【魔道·无影暗杀】西庚第一暗杀魔宗。隐于暗处，修无情杀戮之道。门人皆是冷酷无情的刺客，精通隐匿与一击必杀，只要价码足够，连正道掌门亦敢刺杀。
  - 琼轮垂曜宫：【魔道·月照无私】西庚女帝统御之廷。月光为谍网，暗桩遍布五域，执掌仙界半数情报。情报只换不卖，诛杀乃女帝裁决。威仪天成，公正不偏，群魔甘为驱策。
  
  五、北冥与幽界 (水与死气/轮回与寂灭)
  - 坐忘冥海阁：【正道·万物归静】北冥正道。枯坐海底，极难激怒，一旦出手如冰川倾覆，冻结一切。
  - 泣珠幻海庭：【异族·真假难辨】北冥鲛人遗族。以极致幻术重塑上古繁华，外人踏入必在绝美歌声幻境中迷失。
  - 渡厄幽帆：【幽冥·灵魂摆渡】横渡北冥的无言摆渡人。船资非财物，而是渡客当下内心最珍视之物。
  - 彼岸提灯人：【幽冥·生死有命】幽冥引路者。温柔安抚迷茫亡魂，却以最冷酷手段将逆天改命者锁入深渊。
  - 无间轮回道：【魔道·癫狂救赎】幽界魔道。视生为苦，死为救赎。带圣洁慈悲微笑杀人，自认功德无量。
  - 忘川风月楼：【中立·大梦一场】黄泉销金窟。可买任何体验，代价为饮孟婆汤，抵押部分真实记忆。
  
  【宗门生态与互动逻辑】
  - 阶级：外门(炮灰)→内门(中坚)→真传(核心/杀之易引出老怪)→长老(掌权)。
  - 核心冲突：正魔两道在秘境探索、灵脉争夺中一旦相遇，极易爆发不死不休的血战。