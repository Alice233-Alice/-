[地图] 下层禁地

【归墟】(最高危, 危险度99)
- 位置：北冥海眼深处
- 特性：万物终结之地，吞噬一切
- 威胁：入者十死无生，连时空概念都不存在
- 资源：归墟感悟、混沌之力（需大乘以上）

【黄泉古迹】(高危, 危险度90)
- 位置：神州地底深处，九曲天河源头
- 特性：通往幽冥，阴气极重
- 威胁：鬼物横行，亡魂聚集
- 资源：黄泉水、幽冥宝物

【无尽炎渊】(最高危, 危险度95)
- 位置：南炎地心火狱
- 特性：火焰分层，越深越热，可焚尽苍穹
- 威胁：有太古火灵，化神以下必死
- 资源：地心火、炎魔材料

【雷暴海】(高危, 危险度85)
- 位置：地下暗河与地火交汇处
- 特性：雷暴无休，雷修渡劫之地
- 资源：雷霆精华、劫雷碎片

