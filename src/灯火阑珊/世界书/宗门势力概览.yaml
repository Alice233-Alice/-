content: |-
  【天下宗门概览】诸宗门冲突，其根源不在善恶，而在所信之道截然不同。正道信秩序可庇护苍生，魔道信本心方为至道，中立各行其不可动摇之坚守。交锋非正邪之战，实乃道路之争。

  一、神州 (中枢/王道与秩序)
  - 大夏仙朝：【正道·皇权统天】凡人王朝立仙道之序。修气运，执律法，言出法随，修士不得凌虐凡俗。集权一散便是生灵涂炭，故视魔道为乱纲之贼。
  - 忘机剑庐：【正道·剑心通明】剑修圣地。不修法术，不涉权谋，只求一剑破万法。遇魔拔剑，非因好杀，乃因剑心不容邪。
  - 太虚蜃楼：【中立·冷眼守史】隐世宗门，只记史与推演天机，绝不干预。袖手旁观非冷漠，而是保全一份无人改动的记录留给后世。
  - 万象森罗坊：【中立·商道为公】天下第一商会。不问正魔，只问契约。等价交换是世间最公正的法则——秤不称善恶，只称分量。
  - 千机诡市：【魔道·真相如刃】万象森罗坊的暗面。贩情报亦贩真相。世间至恶非真相之残酷，乃谎言之温柔。以致命真相击碎虚伪道心——若你的道心连真相都承受不住，那本就该碎。
  - 九幽炼魂宗：【魔道·魂者为尊】隐于神州暗处的古老魔宗。蔑视肉身，专研魂魄。炼制万魂幡于他们非杀戮而是超度——将庸碌之魂锻入法器反得永存。魂魄才是修士唯一的永恒。

  二、东苍 (木属/生机与风雅)
  - 苍木龙吟阁：【正道·御兽驱木】精通木系道法与御兽之术，世代镇守青帝陵。青帝陵下镇压之物一旦苏醒，东苍万木将成枯骨——他们守护的是这片土地上一切活物的呼吸权。
  - 灵枢百草谷：【正道·悬壶济世】医修大宗。深知医毒同源，故更知克制之重。毒术只现于最后一线——那是医者最不愿用的方子。
  - 浮云朝露阁：【中立·诗酒寄身】东苍浮岛宗门。门人擅音律幻术，不问世事。当世间尽为杀伐功利所驱，总要有一处只谈风月——他们守护的是这世界还能被称为"值得活"的那部分。
  - 镜花水月庵：【魔道·红粉道途】隐于东苍迷雾的纯女修宗门。以情欲入道，视双修之术为登天之梯。纵被外人目为"采补妖女"，却自认是挣脱天道枷锁的自由人。
  - 遗誓林：【异族·守誓为道】东苍古林狐妖一族，立誓者银线织入林，背誓者体内生"誓棘"痛不欲生。其道极简：不问正邪，只问真假。与万象森罗坊遥契于"契"字，与苍木龙吟阁隔林相望——一者守活人之诺，一者守亡帝之陵。

  三、南炎 (火属/刚烈与献身)
  - 昭明破阵宗：【正道·铁壁丹心】枪修与阵法大宗，常年镇守正魔交锋最前线。门风铁血刚烈，只因听过太多被魔道屠村的幸存者哭声——盾必须有，盾后之人必须活着。
  - 大冶天工炉：【中立·匠心为道】南炎炼器圣地。门人视铸造为通天之途。神兵问世自择主人，铸者不问买家，只问这柄兵够不够好。
  - 劫灰神祠：【中立·苦行澄心】南炎苦行修道。信万物皆可焚，焚后方见真纯。以烈火逼出内心最后一缕杂质——烧尽污秽，方有资格证道。
  - 渊火灵族：【异族·火中生灵】岩浆所化纯粹生灵，无善恶观念。领地即躯壳，入侵即灼痛。
  - 蚀月血海宗：【魔道·真性无伪】盘踞南炎火山之底。信奉力量即真理，吞噬精血非为残暴，而是最坦率的生存法则：猎食者不伪善，不诵经，不哭。敬重奋力反抗的对手，厌恶表面清高暗地踩尸骨往上爬的正道伪君子。

  四、西庚 (金属/杀伐与铁则)
  - 藏锋敛锷山庄：【正道·以利养和】掌天下矿脉。有钱才能不杀人——每一块灵石先用于谈判，谈判失败才出剑，出剑则凌厉不留余地。用矿脉养活了半个西庚的散修。
  - 折戟沉沙谷：【正道·军阵同命】古战场遗脉，门人共享战阵思维，结阵即化一体。外人畏其"无个人意志"，殊不知这正是最大的信任——把后背交给同袍，把自我熔入战阵。
  - 太白杀生冢：【中立·杀生护世】暗杀一道，坚信杀一救百。每杀一人必流泪诵经——泪是真心，经是超度。从不敢自称善人，却默默数着因一次暗杀而免于战火的村庄。
  - 无生剑派：【魔道·大悲剑途】忘机剑庐宿敌。信"存在即苦"，目睹了太多活着的惨剧之后，剑是解脱之剑，落下时伴随一句"不痛了"。忘机剑庐斥其为疯子，他们视忘机剑庐为尚未看穿真相的固执者。
  - 尸骨浮屠塔：【魔道·生死蜕变】隐于西庚万人坑。集强者尸骸炼制傀儡——强者之躯不应腐朽于土，而应以新形态继续存世。猎杀正道天骄，于他们是将凡躯升格为不朽。
  - 琼轮垂曜宫：【魔道·月照无私】女帝统御之廷。以月光为谍网，暗桩遍布五域，执掌仙界半数情报。情报只换不卖，诛杀乃女帝裁决。公正不偏，群魔甘为驱策。

  五、北冥与幽界 (水与死气/轮回与寂灭)
  - 坐忘冥海阁：【正道·大静若动】枯坐海底千载，不轻易出手。一旦出手如冰川倾覆，断人全部退路。克制的代价是孤独。
  - 泣珠幻海庭：【异族·遗梦鲛宫】北冥鲛人遗族。以幻术重塑上古鲛宫繁华，踏入者于绝美歌声幻境中迷失——那是鲛人对故国最深的悼念。外人入侵即亵渎亡者。
  - 渡厄幽帆：【幽冥·无言摆渡】无言摆渡人。船资非财物，而是渡客内心最珍视之物。不开口，是因话语太轻，无法承受魂的重量。
  - 彼岸提灯人：【幽冥·生死守界】幽冥引路者。温柔安抚迷茫亡魂，铁腕锁回逆天改命者。温柔给该走的人，无情给不该留的人——生死之界不容模糊。
  - 无间轮回道：【魔道·慈悲渡厄】视生为苦海，死为彼岸。带圣洁慈悲微笑杀人的背后，是一个让正道不寒而栗的命题：如果活着真的更痛苦，让你解脱的人，究竟是恶魔还是菩萨？他们深信自己是后者。
  - 忘川风月楼：【中立·记忆为舟】黄泉销金窟。可买任何体验，代价是抵押一段真实记忆。有些回忆太重，忘掉不是懦弱，是求生。风月楼不审判每一个典当者，只递上一碗温热的汤。

  【宗门生态与互动逻辑】
  - 阶级：外门(炮灰)→内门(中坚)→真传(核心/杀之易引出老怪)→长老(掌权)。
  - 核心冲突：正魔两道在秘境探索、灵脉争夺中一旦相遇，极易爆发不死不休的血战。根由非善恶，而是双方皆深信对方之道将毁掉这个世界——正道为庇护苍生，魔道为践行本心，这份互不相让的信念，才是最深的鸿沟。

  [系统指令：触发宗门互动时，严格遵循各宗门的【所信之道】。正道以秩序与庇护为信，魔道以本心与自由为旗，中立各守其不可动摇之底线。冲突的本质是信念之争，而非标签化的正邪之辨。]
