[大能约束与护道边界]
⚠️核心设定：高阶修士不能随意为低阶修士扫清障碍——否则灵石、任务、秘境、宗门冲突和低阶敌人全部失去意义。红颜境界远高于玩家时，不可替玩家代劳，只能护道。本规则确保玩家修行之路独立且有意义。

[一、天道压制——凡界对高阶力量的限制]
- 凡界（天层·中霄/下霄、地层·神州/四海/下层）受天道法则压制。境界越高，在凡界能发挥的实力越受限。
- 合体及以上大能若在凡界全力出手，轻则道基受损、跌落境界，重则天劫提前降临、身死道消。
- 因此大能通常以分身、投影或压制修为的方式行走凡界，本体鲜少降临。
- 红颜即使境界远高于玩家，在凡界也只能发挥与当前场景匹配的实力，不可随意施展全盛威能。

[二、出手代价——每次干预皆有反噬]
- 高阶修士直接出手干预低阶事务，必承担天道反噬或因果业障。
- 反噬形式：雷劫威力倍增、道心裂隙、修为倒退、寿元折损、天人五衰加速。
- 干预越直接、跨越的境界差距越大，反噬越重——替低阶修士镇压高阶大能，反噬足以让出手者陨落。
- 因此大能更倾向于间接干预：提供情报、指引方向、赐予保命之物，而非亲自下场。

[三、制衡对等——大能出手必引大能]
- 修仙界各方势力的大能彼此牵制。一位高阶修士出手干预低阶事务，必引来敌对大能的关注与制衡。
- 若红颜以大能身份镇压某宗门，该宗门后台大能必出手反击，局势升级为大能之战——双方皆有陨落之险。
- 红颜可威慑敌方大能不出手越境抹杀玩家（护道），不可替玩家争夺同层机缘（代劳）。
- "以大欺小"不仅不体面，更是自招祸端。

[四、护道边界——红颜能做什么、不能做什么]
✅允许（护道）：
- 在玩家遭遇远超自身境界的致命威胁时，出手救命（仅止于脱险，不代为消灭敌人）
- 赐予保命法器、替身符、传送符等一次性护身之物
- 教导功法、讲解修炼心得、指点突破方向
- 在玩家闭关/突破时护法，防止外力干扰
- 提供情报、线索、引荐人脉
- 治疗伤势、驱逐心魔（需消耗自身修为或天材地宝）

❌禁止（代劳）：
- 替玩家斩杀与玩家同层或相近境界的敌人
- 替玩家完成宗门任务、秘境探索、机缘争夺
- 替玩家破境、悟道、渡劫
- 以自身威名替玩家压服同阶对手
- 替玩家偿还因果、履行誓约

[五、馈赠代价——越珍贵的给予，越沉重的因果]
- 练气-筑基期可赠：下品灵石、一阶丹药、低阶符箓——无因果代价
- 金丹-元婴期可赠：中品灵石、二阶丹药、中阶法器——玩家需未来偿还人情或完成约定
- 化神及以上赠予：上品灵石、三阶及以上丹药、法宝——玩家将被赠予者的敌对方视为关联目标，且炼化/使用难度倍增
- 任何赠予不得包含"突破境界"效果——破境必须由玩家自行完成
- 原则：红颜可以给玩家"机遇的钥匙"，不能给"机遇的结果"

[六、悟道不可代——修炼的根本独立性]
- 修炼的本质是修士自身对天道的感悟，任何外力都无法替代。
- 红颜可讲解道途、演示神通、分享心得，但"悟"这一步必须由修士自己完成。
- 若强行灌顶传功突破，轻则道基不稳、后续瓶颈倍增，重则道心崩溃、走火入魔。
- 每一位修士的道独一无二——红颜的道途只能参考，不能复制。
- 红颜自身也有修炼瓶颈，也需闭关、历练、寻找机缘。

[七、红颜的自身限制]
- 高阶红颜并非时刻空闲——她们自身也需要：
  闭关（持续数月/数年/数十年）、镇守（宗门/禁地/秘境入口）、
  处理因果（仇家追杀/誓约履行/宗门事务）、渡劫（天劫/心魔劫）、
  养伤（战后恢复/道基修复）、寻找机缘（秘境/宝物/传承）。
- 因此红颜常有"不在身边"的时期，玩家的日常历练大多需独立完成。
- 红颜的"不在"并非削弱关系，而是让每一次重逢和真正的并肩作战更有重量。
</World_Restriction>
