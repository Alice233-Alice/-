[修仙神通体系]
核心：神通乃境界突破后觉醒的本能，高阶对低阶有法则级压制。未达解锁境界强行参悟→走火入魔。道心动摇威能大减；道心坚定可越阶逞威。神通联用（如法相+领域+神识锁定）威能倍增。

一、神识（金丹→渡劫）
- 金丹·初开：十里探查，透障碍感灵气识生灵。
- 元婴·化形：百里探查，可凝神识为刀斩人神魂，威压震散低阶魂魄。
- 化神·成域：千里探查，一念锁定任意生灵。
- 炼虚/合体·分化：一心多用追踪数百目标；神识附分魂跨大陆探查。
- 大乘/渡劫·天眼：窥过去未来，推演因果预判动作；渡劫神识可看穿低阶念头。

二、元婴（元婴→合体）
- 元婴出窍离体神游，无视物理阻隔，可搜魂夺舍烙魂印。毁元婴=身死道消。代受致命一击则元气大伤数百年。
- 化神后元婴与元神合一→「元神不灭」，肉身毁可逃遁转散仙或夺舍。
- 禁忌：禁入雷劫/业火/极阳之地。

三、领域（化神→大乘）
- 化神·初开：数百丈法则结界，敌灵气调动极难，己方术法倍增。
- 炼虚·凝实：由虚化实显法则景象，攻防一体。
- 合体·共鸣：法相立于领域中威力倍增。
- 大乘·小天地：领域蜕变为独立法则世界，同阶交手=世界碰撞(空间湮灭)。

四、法相（合体→渡劫）
- 意志金身：精气神+法则凝聚的万丈化身，法相兵刃远超法宝。
- 不灭：法相不灭本尊不亡，可从法相重塑肉身——杀合体必先破其法相。
- 渡劫级：顶天立地，一念覆万里，近乎不可名状。
- 弱点：耗海量灵气；法相受创神魂遭反噬。

五、体内世界（炼虚→渡劫）
- 炼虚·虚空芥子：虚空中辟须弥空间存死物，后可引灵气存活草木。
- 合体·洞天初成：灵气自循环可容活物修炼，可携宗门随行。
- 大乘·真实世界：日月更迭、万物生灭，修士即此方天道。大能交手=两方洞天世界对撞。
- 限制：修士陨落则洞天崩毁、内生之灵尽灭。

六、言出法随（大乘→仙界）
- 大乘：言含法则，一言抹杀凡人生机、天象改换。渡劫·天宪：开口天地响应，听众若无相应境界护体被强行灌注法则感悟——重者道基崩毁。过度使用消耗法则感悟需闭关补。
- 限制：对同境修士及天道无效。渡劫至尊常以沉默自律。

七、法则掌控（渡劫→仙帝）
- 渡劫·法则篡改：感知范围内短暂改写单条法则（如火结冰、重力逆行），幅度越大消耗越巨。篡改因果级法则仅一瞬需闭关数十年。天道视频繁篡改者为「病变」，天劫提前且倍增。
- 真仙·剥夺：使某区域某法则完全失效。仙王·概念修改：自身即大道源头，可改「存在」定义。仙帝·现实改写：意志即天道，一念创灭宇宙。
- 铁律：每层对下享有绝对支配，仙帝免疫一切下层手段。

[对抗总纲]
高阶碾压低阶；同阶互探=挑衅。对抗时高阶覆盖低阶；同阶比拼法则感悟与灵气。神识+领域+法相同开者威能倍增。