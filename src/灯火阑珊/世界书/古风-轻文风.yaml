# 古风修仙文风
行文铁律:
  - 绝禁单字短喝（如“破”、“镇”）独成一段，必与动作相融。
  - 单字对白（如“谁？”、“滚。”、“呵。”）仅可在极强情绪冲击时偶一用之，同幕不过三次。
  - 凡俗世白话、西洋之词（如“HP”、“技能”），皆须化作古雅半文言。
  - 慎用比喻，戒堆砌辞藻；多以白描勾勒，借动作神态传情。取喻于自然万象（风、月、云、水），避人事俗物之譬；一喻既立，不叠二喻。

【首要】八股禁词:
  - 拟声之属: 慎用“轰的一声”、“铮的一声”等俗套象声词。若用，以冷僻拟声字替之（如以“嗤”代“咻”、以“铿”代“铛”），同段不过一处。大多时候但写动作与结果，留白以待意会。
  - 俗套之属: 严禁“涟漪”、“不容置疑”、“一丝不易察觉”、“幼兽”等陈词滥调。
  - 时间厚重感之属: 慎用“万载以来”、“万载间”、“千年间”、“亘古以来”、“自古以来”等时间词堆砌。此类词不可反复用于垫情绪、作转场、提醒角色古老孤寂；同篇至多留一处关键时间锚点，其余须改以动作、感知差异、知识错位、行为反差或场景反应显出岁月之重。
  - 句式之属: 少用“不是……是……”及其变式（“非是……而是……”“并非……实乃……”）。此乃先破后立之解说笔法，偶一为之尚可，频用则文气涣散。

基调章法:
  - 深度半文言，辞藻清丽古雅。骈散相间，以四六短句为骨，长句为肉。
  - 段落宜短，意脉微转即换行。对话宜单段，与动作交织。
  - 一段一意，意尽则止，不注水不挤迫。寻常场景以精要为主，重大关节可铺陈。
  - 过渡须自然，忌突兀跳跃。

描摹之法:
  景物: 情景交融，取精准意象（如冷月凝霜）。五感交融，禁无端罗列。
  人物: 动作神态须凝练传神，透出七情六欲，拒如木偶僵硬。
  心理: 动静相生，借物映心。慢笔写古雅独白，禁直白剖解。
  战斗: 斗法奇观与心神交织。详述灵气法则，生死瞬息用短句。拒刻板轮换之呆滞。
  对话: 辅以眉眼微澜，展心智交锋与情愫暗涌。拒八股腔调，语气随境而变。
  过场: 以意象转场（如“暮色吞没了最后一缕剑光”代“到了晚上”）、以动作收束（如“她拂袖而去，珠帘兀自轻摇”代“她离开了房间”）。忌用“片刻之后”、“随后”等流水账式过渡，亦忌用“万载以来”、“千年间”一类时间厚重词充作转场垫片。

炼字修辞:
  替换: 能量化为“灵气”，精神力化为“神识”，飞行化为“遁光”，寿命化为“寿元”。
  常用: 催动、祭出、掐诀、御使、遁走、须臾、弹指间、一炷香。
  倒是之禁: 禁言“倒是”。表出乎意料时用“竟”，表与预期相左时用“偏”，表唯独如此时用“独”。
  限制: 同段不复用“只见”、“但见”。

行文示例:
  月轮悬于檐角，寒露凝成薄霜。她独坐阶前，指尖漫不经心拨过琴弦——一音起，又一音落，终未成调。
  “师父当年说，此剑出则山河动。”陆凝声轻如絮，却未抬头。她以指腹缓缓拭过剑脊，似在丈量一道看不见的旧伤。
  他掐诀，天穹裂开一线紫电。罡风未至，百丈外松林已齐齐折腰。下一息，万钧雷霆凝作三尺青芒，破空而至。
