洞府内室，禁制层层封锁，将外界一切窥探隔绝。

烛火摇曳，昏黄的光影在石壁上晃动不休。白清弦跪坐在玉榻之畔，一袭白衣已被鲜血浸透了大半，却没有一滴是她的。她左手按在{{user}}胸口，灵力源源不断地渡入他体内，右手掐诀催动着聚灵法阵，将洞府中所有灵气汇聚于此。

她的徒儿，正在死去。

经脉寸断，丹田碎裂，元神如风中残烛，随时都会熄灭。那头上古凶兽的一爪，几乎将他整个人撕碎。她赶到时，他已倒在血泊之中，手中仍死死握着那柄镇渊剑，剑身上雷光明灭不定，与他的生机一同消散。

"徒儿……你听到为师说话了没有。"她声音平稳，手却在发抖。

灵力灌注了整整两个时辰，他体内被凶兽蛮力绞碎的经脉勉强接续了三成，可丹田的裂缝仍在扩大。寻常疗伤手段已然无用——她试遍了所有丹药，用尽了一身七成灵力，那道裂缝仍在她灵力笼罩之下顽固地蔓延，像一条吞噬生机的深渊。

她闭上眼，指尖微颤。

脑海中浮现出《天音剑诀》附录中那一页她从未翻阅第二遍的秘法——阴阳交泰术。以双修之法将自身精元渡入对方丹田，以阴阳相济之力修补根基。条件只有一个：肌肤相贴，气血交融，不着寸缕。

她睁开眼，目光落在{{user}}苍白得近乎透明的脸上。他眉头紧锁，冷汗涔涔，胸口起伏微弱得几乎看不出来。

千载修行，道心如铁。她曾在万剑之中岿然不动，曾在天劫雷海中一剑破天，曾在化神大能围攻下从容退去。可此刻，她的手在发抖，她的道心在崩裂。

"不可以。"她低声说，像是在说服自己，"你我是师徒……本座不能……"

话音未落，他体内传来一声沉闷的碎裂声——丹田裂缝再度扩大了一分。他喉间溢出一缕鲜血，面色从苍白转为灰败。

白清弦浑身一震，瞳孔骤缩。

她伸手探向他脉门，灵力扫过，丹田裂隙已蔓延至三成——若再不设法弥合，不出半个时辰，他的丹田将彻底碎裂，修为尽废且元神溃散，纵是大乘修士也无力回天。

手指攥紧了他的衣襟，指节泛白。

"你……你这蠢徒儿。"她声音沙哑，千载未曾动摇的清冷嗓音此刻带着难以遏制的颤抖，"明知不敌，为何不退？为何不传讯为师？你若死了……你若死了，本座……"

她说不下去了。

烛火忽明忽暗，映着她眼底翻涌的情绪——不是清冷，不是矜持，不是那副维持了三百年的冰雪面具，而是赤裸裸的恐惧、心疼，以及压抑了太久太久、此刻再也藏不住的深情。

她闭上眼，长长地吐出一口气。

再睁开时，眸中已只剩决绝。

"罢了。"

她解开了自己的衣带。

白衣自肩头滑落，露出其下莹白如玉的肌肤。三百余载岁月不曾在这具身体上留下半分痕迹，锁骨纤细精致，胸前雪乳饱满挺翘却从未被人触碰过，在昏黄烛光下泛着温润的光泽，粉色乳尖因洞府内的凉意而微微挺立。她腰身纤细，小腹平坦，肌肤细腻得不见一丝瑕疵，长腿修长笔直，隐秘之处覆着一层薄薄的青丝。

她面色微红，却不曾犹豫，俯身将{{user}}染血的衣袍一件件解开。他身上伤痕累累，最深的一道从左肩斜劈至腰际，皮肉翻卷，触目惊心。她指尖拂过那些伤口，灵力温柔地抚平翻卷的皮肉，眼眶却红了。

将他衣物尽数褪去后，她深吸一口气，俯下身去，将自己整个人覆在他身上。肌肤相贴的刹那，她浑身一颤——他的体温低得吓人，像一块冰冷的玉石。而她的身体是热的，灵力在肌肤相触之处自发流转，暖意顺着每一寸接触的肌肤渡入他体内。

她双手按在他胸口，开始运转阴阳交泰术。灵力化作精纯的阴柔之气，顺着她掌心缓缓渡入他的经脉，与他体内残存的阳刚雷息相合。两股灵力在他丹田处交汇时，她清晰地感受到那道裂隙的边缘开始收拢——有效。

可随着灵力交融愈深，她的身体开始起了变化。阴阳交泰术的本质是以情欲催动精元流转，灵力渡入越多，术法反噬越强。一股酥麻的热意从小腹深处蔓延开来，窜过脊椎，直达四肢百骸，她的呼吸不由自主地急促起来，面颊潮红，双腿不自觉地夹紧。

"唔……"她咬住下唇，强行压下体内翻涌的欲潮，将更多灵力注入他体内。

就在这时，{{user}}的手指微微动了一下。

"师……尊……？"

他的声音沙哑微弱，意识在混沌中挣扎着浮出水面。先是感受到胸口温热的掌心与流转的灵力，然后是覆在身上的柔软躯体——光滑的肌肤紧贴着他，两团柔软温热的东西压在他胸膛上，有什么硬挺的小点蹭过他的皮肤。

他艰难地睁开眼，映入眼帘的是白清弦近在咫尺的脸。

她满面潮红，额角沁着细密汗珠，咬着下唇，那双向来清冷的眸子此刻蒙着一层水雾，却依旧倔强地维持着最后一丝冷静。然而她的身体出卖了她——胸口的雪乳紧贴在他身上，随着她急促的呼吸而微微起伏，乳尖硬挺着蹭过他的肌肤；她的腰肢在轻颤，大腿内侧湿润滑腻，那处隐秘之地紧贴着他的腿根，已然湿透了。

"别……别动。"她声音发颤，竭力维持平稳的语调，"阴阳交泰术，需肌肤相贴方可渡入精元……你丹田将碎，这是唯一……唯一的法子。"

她垂下眼帘，不敢与他对视："是为师无能，没有别的办法了。你且……忍一忍，待丹田修复便好。你莫要想多了，本座只是……只是在救你。"

话说得冠冕堂皇，可她的身体在发抖。灵力渡入的同时，术法的反噬令她浑身酥软，那股从小腹深处涌出的空虚感愈发强烈，像有千万只蚁虫在啃噬她的理智。她的呼吸已经控制不住了，急促的喘息拂过他颈侧，带着淡淡的梅花香气。

{{user}}能感觉到，她的灵力正在修复他体内的伤势，温柔却坚定。可同时他也能感觉到——她紧贴着他的身体在发烫，那处湿润的柔软随着她每一次灵力渡入而微微研磨着他的腿根，温热的液体顺着肌肤缓缓淌下。

她注意到了他的反应——那处抵着她大腿内侧的炽热正在逐渐硬挺，她的脸烫得几乎要烧起来，身子却不敢移开半分，否则灵力渡入便会中断。

"本座说了……莫要想多了……"她的声音已经碎成了片段，"这是……术法反噬……本座没有……没有别的意思……"

她的眼眶红了，声音带着近乎委屈的颤抖："你是我徒儿……我白清弦的徒儿……我不该……"

一滴泪落在他胸口上，滚烫的。

三百二十八年。她活了三百二十八年，从未为谁流过泪。百岁化神，剑压当世，世人称她"清弦剑仙"，以为她当真是那太上忘情、心如止水的仙人。

只有她自己知道，这颗心，早就在这个蠢徒儿身上沦陷了。

"我只是在救你……"她低声重复着，像是在说服自己，泪珠却一颗接一颗地落下，"我只是……"

她的声音最终湮没在一声压抑的呜咽中。
