# yaml-language-server: $schema=../../schema.json
# 这是一份"裸 initvar 模板"，可直接复制到 <initvar> 内参考写法。
# 推荐顺序：
# 1. 世界时钟 / 世界地图 / 地点库 / 世界库
# 2. 本尊
# 3. 红颜角色库 / 红颜 / NPC图鉴
# 4. 任务列表 / 声望系统 / 难度系统 / 可参与机遇 / 当前处境 / _系统设置
# 不建议手写的内部字段：_好感度快照、$类派生字段。

世界时钟:
  纪元: "末法时代"
  年份: 1
  月份: 1
  日期: 1
  时辰: "子时"

世界地图:
  起始区域:
    layer: "地层"
    danger: 10
    desc: "开局主舞台，适合第一轮剧情展开"
    connections: ["邻近区域", "宗门驻地"]

  邻近区域:
    layer: "地层"
    danger: 25
    desc: "与起始区域相连的探索点"
    connections: ["起始区域"]

  宗门驻地:
    layer: "地层"
    danger: 5
    desc: "可回访的安全区域"
    connections: ["起始区域"]

世界图志: {}

# 地点库是"地点详情表"，不是世界地图的复制。
# 每个地点对象建议严格只写这 5 个字段：域 / 类 / 危 / 特 / 资
# 其中字段要求如下：
# 1. 域：必须写这几个枚举之一：天层 / 神州 / 东苍 / 南炎 / 西庚 / 北冥 / 下层 / 四海
# 2. 类：必须写这几个枚举之一：秘境 / 城镇 / 宗门 / 禁地 / 遗迹 / 地形
# 3. 危：0-100 的数字，用来给状态栏和脚本读取危险度
# 4. 特：字符串，写这个地点最重要的特点，不要塞成很多层结构
# 5. 资：建议始终写成字符串数组；没有资源就写 []
# 常见错法：
# - 不要把世界地图里的 layer / danger / desc / connections 搬进地点库
# - 不要额外写 名称 / 描述 / 所属层级 / 环境描述 / 可用通道 这类自定义字段
# - 不要把"地点对象"继续嵌套成多层子地点结构
# - 地点名已经是 key，不需要在里面再写一次 名称
# 推荐习惯：
# - 世界地图里会被导航、会被剧情反复提到的地点，地点库最好同步补一份
# - 资 即使只有一个资源，也建议写成 ["某资源"]，不要混用字符串和数组写法
# - 如果是纯过渡区域，资 可以留空，但 域 / 类 / 危 / 特 最好不要省
# 正确结构就照下面抄，后续新增地点时直接复制这一层对象改值即可。
地点库:
  起始区域:
    域: "神州"
    类: "遗迹"
    危: 10
    特: "适合作为开局相遇、受伤、触发机缘的地点"
    资: ["残卷", "灵草"]

  邻近区域:
    域: "神州"
    类: "秘境"
    危: 25
    特: "可承接开局后的探索推进"
    资: ["矿脉", "妖兽材料"]

  宗门驻地:
    域: "神州"
    类: "宗门"
    危: 5
    特: "适合养伤、交接任务、沉淀关系"
    资: ["洞府", "讲经堂"]

# 本尊是 initvar 主轴，开局体验好不好，主要看这一块是不是清楚。
本尊:
  等级: 4
  修为: 65
  灵根: "水木双灵根"
  体质: "回春灵体"
  功法: "《青木长生诀》"
  本命兵器: "无"
  神通列表:
    生生不息:
      名称: "生生不息"
      描述: "以微弱灵机护住最后一线生机"
      类型: "神通"
      品阶: "玄"
      熟练度: "入门"
      领悟时间: 0
  灵石: 30
  已活岁月: 18
  尝试突破: false
  行踪:
    当前区域: "起始区域"
    所属层级: "地层"
    环境描述: "夜色未尽，山风潮冷，残火将熄"
    危险度: 10
    可用通道: ["邻近区域", "宗门驻地"]
    导航信息: ""
  身份:
    姓名: "{{user}}"
    宗门: "散修"
    出身: "没落世家"
  背包:
    止血散:
      名称: "止血散"
      描述: "寻常疗伤药"
      品阶: "黄"
      数量: 2
  法宝:
    青玉佩:
      名称: "青玉佩"
      描述: "家传护身法宝，关键剧情信物"
      品阶: "法宝"
      数量: 1
  杂物袋: {}
  战斗状态:
    正在战斗: false
    当前状态: "非战斗"
    灵力值: 60
    伤势等级: "轻伤"
    已用底牌: []
    战斗回合: 0
  当前敌人: []
  渡劫状态:
    正在渡劫: false
    劫种: "无"
    劫难等级: "无"
    当前阶段: 0
    总阶段数: 0
    劫力承受: 100
    已用护道: []
    劫难描述: ""
    触发原因: ""
    上次渡劫结果: "无"
    渡劫冷却: 0
    失败惩罚记录: ""

# 红颜角色库更像资料索引；开局不需要时可以留空。
红颜角色库: {}

# 红颜里写当前会登场、会互动、会被状态栏读取的角色。
红颜:
  角色名:
    等级: 20
    修为: 2200
    灵根: "天灵根"
    体质: "灵体"
    功法: "《某某真诀》"
    本命兵器: "霜华剑"
    神通列表: {}
    灵石: 500
    已活岁月: 120
    尝试突破: false
    好感度: 10
    关系: "初识"
    关系上下文:
      当前情绪: "克制、好奇、留意"
      态度缘由: "因一场意外相救，对{{user}}生出额外关注。"
      关系诉求: "先确认{{user}}是否值得继续投入心力。"
      相处禁忌: "不喜欺瞒、冒进、恩将仇报。"
      未了约定: "待伤势平稳后，与{{user}}一同前往邻近区域。"

NPC图鉴:
  守门弟子:
    等级: 6
    所在宗门: "青云门"
    备注: "负责宗门驻地外门巡逻。"

# 任务列表至少建议给 1 个进行中的主线任务。
任务列表:
  初遇余温:
    名称: "初遇余温"
    类型: "主线"
    目标: "稳住伤势，弄清这场相遇背后的因果。"
    状态: "进行中"
    创建时间: 0

# 声望系统可空；若开局就与某势力绑定，写 1-2 个条目即可。
声望系统:
  青云门:
    值: 10
    关系: "中立偏好"
    更新时间: 0

# 难度系统通常可以留空，让 schema 和脚本补默认值。
难度系统: {}

# 可参与机遇正式建议 2-4 项；这里保留 1 项示范结构。
可参与机遇:
  - 名称: "前往邻近区域探查异动"
    来源: "剧情推进"
    类型: "探索"
    描述: "夜色深处传来异样灵波，可能藏有下一段线索。"
    回报预期: "可能获得机缘线索或关键情报"
    风险评估: "中低风险，存在小规模战斗可能"
    时限: "天亮前"
    关联事件: "初遇余温"
    优先级: 4

# 当前处境最好用一句话说清"人在哪、和谁在一起、眼下该做什么"。
当前处境: "{{user}}刚脱离险境，正在起始区域短暂歇息，既要处理眼前伤势，也要决定是否追查异动。"

_系统设置:
  启用行动提示: true
