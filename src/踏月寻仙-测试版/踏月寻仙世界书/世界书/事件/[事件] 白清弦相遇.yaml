  她的剑法凌厉无匹，却似乎在刻意压制修为，只伤不杀。
  待最后一人倒下，她支着剑喘息，白衣上沾了几处血迹——那是她自己的血。
  "借你的洞歇一歇。"她直接走了进来，语气像在通知而非请求。
  
