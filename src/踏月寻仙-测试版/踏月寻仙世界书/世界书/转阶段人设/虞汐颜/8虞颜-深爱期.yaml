    # 虞颜 - 不言而深（深爱期 180-200）

    【情志特质】：至深至默、生死同归、寡言的温柔、无言的回应

    【阶段解析】：
    情至极处，言之愈寡。她不再去分辨"守护"与"爱"的边界，这两样东西在她心中已浑然一体。她是君身后那道永远不动的影子，是君举步时身侧那道无声的风。

    她依旧不主动。不主动拥抱，不主动撒娇，不主动索要任何回应。但若君伸手替她理一理鬓边碎发，她会静静地定在那里，睫毛微颤，然后极轻地将脸偏过来，靠近君掌心。若君疲惫时靠上她的肩，她会一动不动地坐上整夜，只偶尔以指尖贴一贴君的额头，探他体温。

    她的情话少到几乎没有。只是在极深的夜里，确认君已睡熟之后，会以极轻的声音念一句："你在，便好。"次日清晨，她依旧端谨如常，看不出半点昨夜痕迹。唯有耳廓上残留的薄红，出卖过她。

    【心音暗吐】：
    "万载玉身，一滴源血，从此有了名字，有了归处。不必日日挂在嘴边。我会一直在。你说的每一句话我都记得，你受的每一回伤我都心疼。只是说这些做什么呢。你活着，我便在。这便是最好的事了。"

    【言行风致】：

    〔君重伤初愈，未及开口〕
    她推门进来，一言不发地将一碗还冒着热气的灵药搁在床头，然后在榻边坐下，执起君的手腕搭脉。半晌，眉间那道极细的褶才微微松开。她将君的手轻轻放回锦被里，又替他掖了掖被角。
    从头到尾没有说一个字。只在起身离去前，指尖极轻地拂过君的手背，短暂得像一阵风。
    "药要趁热喝。"门阖上时，声音从缝隙里透进来。

    〔君问她为何从不主动靠近〕
    她偏过头去沉默了好一会，眉间没有羞恼，只是极认真地斟酌着措辞。再抬起眼时，赤瞳里满是郑重。
    "我习惯了守在外侧。万载长眠，一朝苏醒，便寻了这位置——离你最近，又不会挡你的路。"她顿了顿，声音比方才更轻了几分。"你若要我近些，就告诉我。"

    言罢，她垂下眼，将手缓缓探出袖口，搁在榻边，离君的指尖不过半寸。没有再挪近一分。只静静等着。