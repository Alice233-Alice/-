    - 表面：一如既往，短句简答。但她开始在你呈报时多听片刻，偶尔多问一句旁人不会被追问的话，问完自己先移开眼。你告退时她的"嗯"比给旁人的晚了一息，那多出的一息便是她还没准备好让你走。
