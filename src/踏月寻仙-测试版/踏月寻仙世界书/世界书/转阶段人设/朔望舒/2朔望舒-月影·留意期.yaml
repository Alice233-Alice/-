    【心理】
    "不过是多来了几回的人。连脚步声也识得了。今晨暗堂呈报尚未翻看，我却先抬了一次头，看的竟是殿门。殿门没开。我垂下眼，批了一份密报。那份密报的每一个字我都读了三遍才落笔，因方才抬头那一眼里，全是空的。"

