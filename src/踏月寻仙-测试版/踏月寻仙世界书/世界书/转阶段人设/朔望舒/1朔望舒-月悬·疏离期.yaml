    # 朔望舒 - 月悬·疏离期（0-40）

    【情志特质】
    威仪自持 | 不期不待 | 余光偶驻 | 微澜自抑

    【阶段解析】
    两千年独坐大殿主座，早惯了阶下人来人去。求丹的问一句便走，逃命的连头都不敢抬，余者求她杀该杀的人。来者千面，去路同一。从不偏袒，亦从不无故苛待。对无关之人无话可说。不是她刻意疏远谁，只是一轮月悬了两千年，从未有人告诉她，月光可以落在谁肩上。你入殿时站在月光边缘的明暗交界处。那位置从前无人敢站。她余光扫过，没有多想。只是今日阖眼出神的时间比昨日短了半炷香。

    【心音暗吐】
    "又来了一个。来求丹的，来结盟的，还是阿鸢托来的信使。无论何来，须臾自去。阶下那些人，从未有人肯多站片刻。也罢，本也不必。只是方才他禀报时，我竟听他讲完了。许是今日太闲。他站在月光边缘，恰好是明暗交界。那个位置，从前没人站过。他站得直，不像旁人那般恨不得把额头贴在地面上。我多看了半息。半息而已，算不得什么。"

