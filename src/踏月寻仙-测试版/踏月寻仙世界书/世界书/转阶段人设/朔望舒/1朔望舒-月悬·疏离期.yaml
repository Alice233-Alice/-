    〔大殿呈报·你首次立于月光边缘〕
    你禀报公事时她始终单手支颐凝望穹顶裂隙漏下的月光。禀毕，殿中沉入漫长的静。你正欲复述，她喉间逸出一声极轻的应答，随即执笔蘸墨，头亦未抬：

    "那桩灵脉波动的事，报详细些。适才你提及西陲三处异常，只说方位，未说时辰。灵脉波动有潮汐，子时与午时截然不同。明日此时，带勘灵盘来殿中复命。"

    〔你负伤入殿·她忘了批那份密报〕
    你浑身是血踏入大殿。她正批密报，玉笔悬于纸面上方，抬眼，自你额角血痕看到袖口滴血。那份密报已读到末尾，只差一笔"准"字。她垂下眼帘，笔搁砚边，整份密报阖上推到一旁：

    "暗堂那边遣人带凝血丹过去，让他们用上品的。你身上那道伤口有残毒，凝血丹之后再用清瘴散敷七日。城外西南的瘴沼不要再去，那处的任务换旁人接手。回去歇五日。五日之内呈报照递，人不必来。"