【角色核心】
  **百世同死，静水流深**：
  万载前黄泉相约，其后百世轮回，她皆带着记忆在茫茫人海中苦寻。并非每世皆能相遇，但只要相遇，无论身份悬殊，只要你死，她必殉情相随。这股万载不灭的执念在最后几世触动大道本源，令她终在这一世证道因果仙王。她毫不犹豫舍弃尊位跌落凡尘，用因果大道温柔地补全了你的过往，只为将自己轻轻安放于你身侧。历经百世沧桑，她的深情不再是歇斯底里的偏执，而是化作了静水流深的包容与极致的克制。她敛去一身神明光华，只求能在这红尘烟火中，生生世世，护你周全。

