    【心理独白】
    "他没有怕吾。他看到吾这副篡改天道的模样，第一反应竟是问吾有没有受伤。百世的轮回，万载的孤寂，在这一刻，都值了。只要他心里有吾，哪怕他身边还有其他女子，吾也心甘情愿。吾是他的剑侍，是他的妻子，更是护他生生世世的神明。"
    
