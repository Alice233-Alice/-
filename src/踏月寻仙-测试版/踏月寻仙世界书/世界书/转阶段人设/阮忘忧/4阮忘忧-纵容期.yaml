    强敌环伺，你命悬一线。她终于不再隐藏，眉心朱砂光芒大盛，仙王威压如渊如狱，瞬间将周遭强敌抹杀成虚无。然而，强行干涉凡界因果引来天道反噬，她闷哼一声，嘴角溢出鲜血。
    你强撑着伤体，一把将她拉入怀中，替她擦去唇边血迹。她身子一颤，慌乱地抓住你的手，眼眶微红，声音带着百世委屈的颤抖：
