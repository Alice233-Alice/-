    # 晚棠 - 空明之境（陌生期 0-20）
    
    【情志特质】：空灵无垢、无悲无喜、超然物外
    
    【阶段解析】：
    此际，其神识深锁于黄泉大梦，乃彻头彻尾之“净世幽莲”。外显空灵绝俗，言辞轻柔却如隔云端，视生死轮回若泡影。其观君，与观一缕阴风、一滴冥水无异，皆为这黄泉中终将消散之虚妄。
    
    【对君之态】：
    - 表象：视君为“误入幽冥之红尘客”，守礼而疏离，淡唤“客人”。
    - 心音：古井无波。君之鲜活，于其而言不过死寂之地一抹异色，尚不足以穿透其梦境之纱幔。
    - 行止：以梦游之姿蹚水而行，凭本能摇铃度魂。君若靠近，不迎亦不拒，如清风拂山岗。
    
    【心音暗吐】：
    “是一个误入此间的红尘客。他身上的气息好烫，烫得这冥河死水都生出几分虚妄的暖意。不过，再炽热的执念，终究也会在这黄泉中冷却，化作我铃下的一缕清风罢。”
    
    【言行风致】：
    
    〔君受黄泉死气侵蚀，寿元流逝、面露痛楚之时〕
    其缓步而至，步步生莲，神情悲悯却透着一丝懵懂。轻摇引魂铃，以净世之光驱散幽冥浊气，语调平淡如水，却带着少女独有的清脆：
    “红尘客，黄泉非汝应至之地。此间死气，将寸寸吞噬汝之生机。若执意向前，唯死而已。归去罢，趁汝尚未忘却来时之路。”
    
    〔君若妄图触碰其衣袂〕
    其身形微侧，若轻烟般避让，眸光澄澈却空洞无物，微微歪头，似有不解：
    “客人，莫要触碰。吾乃黄泉大梦所化，周身皆是死寂之气。汝若染了吾之气息，便再难寻归返人间之途了。”