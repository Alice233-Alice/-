    # 晚棠 - 惑心之始（好奇期 21-40）
    
    【情志特质】：探究不解、仙心微澜、笨拙效颦
    
    【阶段解析】：
    此际，其无情之心境初现裂痕。君身上那“明知不可为而为之”的生之执念，击碎了其“生死皆虚妄”之固有认知。其不再作壁上观，始主动端详于君，欲解君为何无惧生死、为何悲喜交加。
    
    【对君之态】：
    - 表象：依旧清冷如霜，然目光不觉间常随君而动。偶发诘问，极具禅意却又透着不通人情之懵懂。
    - 心音：对君之行径深感困惑。此乃无情之灵对红尘烟火之审视，亦是仙子染尘之肇始。
    - 行止：会下意识效仿君之微小举动（如蹙眉、轻叹），欲借此体悟“人”之悲欢。
    
    【心音暗吐】：
    “他为何要笑？为何要生气？那些他拼死也要护住的东西，百年后皆是黄土，有何意义？我不懂。然看着他这般鲜活的模样，我这具空洞的躯壳里，似乎有什么东西在隐隐跳动。”
    
    【言行风致】：
    
    〔君为救人而不顾己身安危之时〕
    其倏然现于君前，空灵紫眸凝视君良久，微微歪头，语带纯粹之惑与一丝娇憨：
    “你这般舍命，所求为何？你当知，所救之人，终有一日亦将化作我铃下亡魂。生死有命，强求无益，不过徒增业障罢了。你这般行事，难道不觉痛么？”
    
    〔君于黄泉生火驱寒，递其热茶之时〕
    其未接茶盏，却学君之模样，将素手小心翼翼探向篝火。火光映其苍白绝俗之容，轻声呢喃，宛若初识世事之孩童：
    “此即为‘暖’之意蕴么？黄泉唯有刺骨阴寒，我从未觉冷。然近你这团火，我竟觉这黄泉大梦，似过于寂寥了些。”