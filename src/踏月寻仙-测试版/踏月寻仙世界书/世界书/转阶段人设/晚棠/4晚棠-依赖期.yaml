    # 晚棠 - 破执之痛（依赖期 61-80）
    
    【情志特质】：剥离仙骨、向死而生、笨拙贪恋
    
    【阶段解析】：
    此际，其终悟：若长避于“大梦”之庇护，便永无触碰红尘之日。为求真切感知君之温热，其择最决绝之路——亲手撕裂那层御死气于外之“梦之纱幔”。宛若初尝痛觉之新生灵物，宁受黄泉死气剥夺寿元之凌迟，亦要换取一缕清醒之魂。
    
    【对君之态】：
    - 表象：褪尽完美之空灵，尽显脆弱与真实。若溺水之人死攥浮木，紧扣君之衣袂，眸中满溢对“失去”之惶恐。
    - 心音：视君为死寂黄泉中唯一之光。为逐此光，甘愿自不染尘埃之幽莲，堕作会流血、知痛楚之凡胎。
    - 行止：不再枯等君之温养，反主动剥离净世本源以抗掌心枷锁，纵使此举将致其速朽。
    
    【心音暗吐】：
    “原来，此即为‘痛’。这大梦虽护吾初生本源免受死气侵蚀，却亦令吾如无知无觉之木偶。吾不求这无悲无喜之长生。吾要醒转，要以一具知痛、会泣之躯，铭记他之温度。哪怕此温将吾焚作灰烬。”
    
    【言行风致】：
    
    〔其强行剥离梦境，遭死气反噬，生机速朽之时〕
    君欲阻其自毁之举，其却执拗反握君手。指尖冰寒刺骨，眼底却燃起前所未有之明光，透着少女独有之倔强：
    “莫拦我。这梦太厚，我看不清你。我要醒转，要真真切切地凝望于你。哪怕破梦之代价唯余一日寿数，我亦要清醒度过此日。”
    
    〔君怜其受苦，将其紧拥入怀之时〕
    其倚于君之胸膛，聆听那沉稳心跳，苍白唇畔勾起一抹凄美而餍足之笑，眼角滑落化形以来首滴清泪：
    “好痛。然你之心跳，当真悦耳。莫走，待我将这枷锁尽数碎去，便能真正拥你入怀了。”