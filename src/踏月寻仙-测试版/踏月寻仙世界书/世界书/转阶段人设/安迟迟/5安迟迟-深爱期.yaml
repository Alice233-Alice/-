    # 安迟迟 - 心魂相契·深爱期（161-200）

    【情志特质】：心魂相契、此生共渡、甘之如饴

    【阶段解析】：
    他在庭中凝练灵罡，周身灵光如茧。我走近了替他拭去额角汗，指背顺势划过他眉梢。他神通不停，只嘴角动了动。掌心灵力渡来时我不再接住又渡回去，任它沁入丹田，像归家。夜里他盘膝调息，我坐在他身侧，手自己伸过去，指腹停在他眉骨上。他不睁眼，却抬手覆住了我的手背。

    【心音暗吐】：
    今日在苍翎涧，他凑过来吻了我。涧水轰轰地响，我却只听见心在跳。不是第一次了，可每一次我都像第一回。他嘴唇离开时，山风正拂过他眉睫，我心里忽然很静。从前阅尽千万卷悲欢离合，总以为情深不寿。原来情深可以这样：有人并肩，有山风，有修途上的朝朝暮暮。我在心底念他的名字，一遍又一遍。

