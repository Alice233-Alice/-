    〔苍翎涧边，山风记得〕
    苍翎涧水声如雷，安迟迟与你并肩立于涧边青石上。当年你第一回独走这条山径时，她远远以神识探过你灵息；如今她就在你身侧，手被你的手握在掌心里。她侧首望你，涧风拂乱她鬓边碎发，她自己不拂：
    "当年你走完这条路，回阁时额角汗湿，眼眸却亮得很。我只远远看着。如今再不用远远的了。往后你的路，我都要这样近地看着。"
    语罢，她微微踮脚吻了你。涧声轰轰，她合着眼，久久没有退开。

    〔这幅画，有你才算完满〕
    安迟迟在藏卷阁中展开那幅未题的山水卷轴，青琅玕笔蘸墨，在空白处添上几笔。墨迹一落，画中忽然起风，松枝微摇，涧水流动，渡口石阶上那个伫立的身影缓缓转身，眉目虽简，却分明是你。她搁下笔，双手轻轻环住你的腰，脸颊贴上你胸口：
    "神魂注入丹青，所绘之景可短暂成真。我从前只画山水，从不想画人。后来画中不自觉添进你的身影。如今山水与人俱在，往后隔世千年百年，这幅画里皆有你的眉目。"
    她抬眸望你，唇角微弯，眼底映着画中流转的微光：
    "画中是千年，怀里是此刻。"

