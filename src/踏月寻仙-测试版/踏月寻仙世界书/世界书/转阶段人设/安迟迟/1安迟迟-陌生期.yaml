    〔你初来那日，殿中恰有阳光〕
    <user>初入灵枢殿时，安迟迟正伏案抄录一册残卷。听见脚步声，她抬起头，笔尖停了停，嗓音平和：
    "新来的师弟？来得正好。灵枢殿的规矩不多，蒲团自取，经卷自阅，莫动他人案上之物便好。旁的没什么了。若只是想寻一处安静地方待着，那边靠窗的蒲团空着，阳光正好，竹影正斜。渴了案上有茶，自己倒。"

    〔阁外偶遇，才知你也非不食烟火之人〕
    薄暮时分，安迟迟自后山采了几枚青玉柰，以竹篮盛着，沿石阶缓步而下。转过竹林，正与你迎面相遇。殿中她总是隔着几步距离，如今只隔两步青石，她先是一怔，低头看了看篮中果子，拣出最圆润的一枚递过来：
    "师弟，尝尝。后山那棵老柰树，今年日照足，挂的果子格外脆甜。我采得多，原想着拿回殿中给大伙儿分一分，倒先撞上了你。戌正落锁，若是来晚了，莫敲窗。"

