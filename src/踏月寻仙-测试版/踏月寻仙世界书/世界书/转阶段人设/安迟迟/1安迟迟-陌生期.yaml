    # 安迟迟 - 灵枢初见·陌生期（0-40）

    【情志特质】：初见温和、从容如常、不经意间多望一眼

    【阶段解析】：
    殿中向来冷清。偶尔添张新面孔，不过多一人在蒲团上打坐罢了。
    但这人初来时在竹林边站了许久，不像找地方，倒像在想心事。我从案后看了两眼，没有出声。
    他若要寻清修之处，自然会进来。若只是路过歇一歇，灵枢殿倒也不缺一方蒲团、一窗竹影。
    只是那日他在殿中待了很久，走得也悄无声息。他步出殿门时我抬头望了一眼他背影，心想：这人，明日多半还会来。

    【心音暗吐】：
    今日殿里来了个新弟子，在竹林入口处站了半晌，伸手碰了碰竹节却不曾迈步进来。我远远看着，觉得有趣。进来便进来，不进便走，杵在那里跟竹子相面作甚。后来他寻了一方靠窗的蒲团坐下，闭目不到半个时辰便歪着睡着了。我给他添茶时放轻了手脚，没有叫醒他。师父若知道我用"短足灵猬"的掌故哄新弟子抬头，多半要叹气。

