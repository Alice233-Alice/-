# ============================================================================
# 重要规则总结：
# ============================================================================
# 1. 当前区域名必须与世界地图中的key完全一致
# 2. 所属层级应该与世界地图中该区域的 layer 对应
# 3. 状态栏会优先从地点库读取域信息，如果地点库中没有该地点，才使用所属层级判断
# 4. 层级映射关系：
#    - layer: "天层" → 所属层级: "天层" → 状态栏显示: "天层"
#    - layer: "地层" → 所属层级: "地层" → 状态栏显示根据地点库的域字段
#    - layer: "下层" → 所属层级: "下层" → 状态栏显示: "下层"
# 5. 如果地点在地点库中有定义，状态栏的上级地域会显示地点库中的"域"字段
# 6. 如果地点在地点库中没有定义，状态栏会根据所属层级判断：
#    - 天层 → "天层"
#    - 下层 → "下层"  
#    - 地层 → "神州"（默认）

# ============================================================================
# 针对你当前问题的修正方案：
# ============================================================================
# 问题：古殿深处明明在东苍，为什么状态栏显示在神州？
# 
# 原因分析：
# 1. 地点库中"古殿深处"未定义（或域字段不正确）
# 2. 世界地图中"古殿深处"的 layer 设置为 "地层"
# 3. 状态栏计算逻辑：地点库无此地点 → 使用世界地图的 layer → "地层"默认映射到"神州"
#
# 解决方案：在地点库中添加古殿深处的定义

地点库:
  古殿深处:
    域: "东苍"  # 明确指定该地点属于东苍
    类: "秘境"
    危: 50
    特: "幽暗秘境核心，守护妖兽盘踞"
    资: ["机缘", "妖丹"]

# 或者，如果古殿深处已经在地点库中定义，检查其"域"字段是否正确