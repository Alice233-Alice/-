# 地图初始化模板 - 用于正确设置角色位置
# yaml-language-server: $schema=../../schema.json

# 使用说明：
# 1. 复制本文件内容到 initvar.yaml 的对应位置
# 2. 根据实际情况修改 当前区域、所属层级、环境描述、危险度
# 3. 确保 当前区域 与 世界地图 中的区域名一致
# 4. 确保 所属层级 与该区域在 地点库 中的 域 字段对应

# ============================================================================
# 方案一：使用地点库中已定义的地点（推荐）
# ============================================================================

# 示例1：在东苍的古殿深处
本尊:
  行踪:
    当前区域: "古殿深处"
    所属层级: "地层"  # 注意：这里应该与地点库中"古殿深处"的域对应
    环境描述: "幽暗秘境核心区域，守护妖兽盘踞之地"
    危险度: 50
    可用通道: ["幽暗秘境"]  # 根据世界地图的 connections 设置
    导航信息: "击杀守护妖兽盘踞之地"

# 正确的配置：古殿深处在东苍，所以状态栏应显示"东苍"
# 需要在世界地图中添加对应配置：
世界地图:
  古殿深处:
    layer: "地层"
    danger: 50
    desc: "幽暗秘境核心区域，守护妖兽盘踞之地"
    connections: ["幽暗秘境"]

