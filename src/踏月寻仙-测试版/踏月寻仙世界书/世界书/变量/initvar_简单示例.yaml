# 简单的地图初始化示例 - 实现 "东苍 · 古殿深处" 显示
# yaml-language-server: $schema=../../schema.json

# ============================================================================
# 方案：直接在世界地图中设置 layer 为 "东苍"
# ============================================================================

世界地图:
  东苍:
    layer: "东苍"  
    danger: 15
    desc: "神州东域，多有上古遗迹散落其间"
    connections: ["神州", "幽暗秘境"]
  
  
  幽暗秘境:
    layer: "东苍"  
    danger: 40
    desc: "东苍域中的上古遗迹，内藏机缘与凶险"
    connections: ["东苍", "古殿深处"]
  
  
  古殿深处:
    layer: "东苍"  
    danger: 50
    desc: "幽暗秘境核心区域，守护妖兽盘踞之地"
    connections: ["幽暗秘境"]

# 角色初始位置
本尊:
  行踪:
    当前区域: "古殿深处"
    所属层级: "地层"  # 这个字段现在不影响顶部显示了
    环境描述: "幽暗秘境核心区域，守护妖兽盘踞之地"
    危险度: 50
    可用通道: ["幽暗秘境"]

# ============================================================================
# 结果：状态栏顶部将显示 "东苍 · 古殿深处" ✅
# ============================================================================

