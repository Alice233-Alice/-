# yaml-language-server: $schema=../../schema.json

# ==================== 开局变量设计模板 ====================
#
# 重要提示：
# 1. 由于 schema 使用 .prefault() 而非 .optional()，某些字段必须完整提供
# 2. 必需的完整对象：世界时钟、本尊.行踪、本尊.身份
# 3. 可选的对象：世界地图、红颜、任务列表等
# 4. 只填写与默认值不同的部分，但必须保持对象完整性
#
# 使用方法:
# 1. 复制此模板到第一条消息文件中
# 2. 用 <UpdateVariable><initvar>...</initvar></UpdateVariable> 包裹
# 3. 填写你需要修改的字段值
# 4. 未修改的字段保持默认值或删除对应的顶层键
#
# ==================== 模板开始 ====================

# ===== 必需字段：世界时钟 =====
# 如果要设置时间，必须提供完整的世界时钟对象
世界时钟:
  纪元: "末法时代"      # 填写时代背景
  年份: 1               # 填写年份
  月份: 1               # 1-12
  日期: 1               # 1-30
  时辰: "子时"          # 如"子时"、"午时"等

# ===== 可选字段：世界地图 =====
# 如果不需要设置地图，可以删除整个 世界地图 键
# 世界地图的作用：
# 1. 定义各区域的所属层级(layer)，用于状态栏显示"上级地域·下级地域"
# 2. 定义危险度(danger)，用于显示危险徽章颜色
# 3. 定义区域描述(desc)，用于地图面板展示
# 4. 定义可通往的区域(connections)，用于显示"可通往"列表
#
# 示例：设置神州大陆及其下属区域
# 世界地图:
#   # 一级区域：神州（整个大陆）
#   神州:
#     layer: "地层"              # 所属层级
#     danger: 10                 # 危险度 0-100
#     desc: "修仙界的中心大陆"
#     connections: ["大夏皇都", "问道峰", "剑门关", "东苍", "南炎", "西庚", "北冥"]
#
#   # 二级区域：神州下的各个子区域
#   大夏皇都:
#     layer: "地层"              # 继承神州的地层
#     danger: 5                  # 皇都很安全
#     desc: "大夏王朝的都城，修仙界最繁华的世俗之地"
#     connections: ["皇宫", "天街", "演武场", "外城"]
#
#   问道峰:
#     layer: "地层"
#     danger: 10
#     desc: "万法宗山门所在，修仙圣地之一"
#     connections: ["山门", "藏经阁", "演武场", "炼丹房"]
#
#   剑门关:
#     layer: "地层"
#     danger: 15
#     desc: "剑阁山门，剑道源头"
#     connections: ["剑冢", "演武场", "藏剑阁"]
#
#   # 三级区域：更细分的地点
#   藏经阁:
#     layer: "地层"
#     danger: 5
#     desc: "万法宗藏书之地，功法典籍浩如烟海"
#     connections: ["问道峰", "一层", "二层", "三层"]
#
#   # 天层区域示例
#   天渊:
#     layer: "天层"
#     danger: 95
#     desc: "星辰裂隙，渡劫修士才敢涉足的禁地"
#     connections: ["罡风带"]
#
#   # 下层区域示例
#   黄泉迹:
#     layer: "下层"
#     danger: 90
#     desc: "幽冥之地，充满死亡与诡异"
#     connections: ["炎渊"]

# ===== 可选字段：世界图志 =====
# 如果不需要，可以删除或保持为空
# 世界图志: {}

# ===== 必需字段：本尊 =====
# 如果要修改主角属性，必须提供完整的 本尊 对象
本尊:
  等级: 1
  修为: 0
  灵根: "五行杂灵根"
  体质: "凡体"
  功法: "无"
  本命兵器: "无"
  神通列表: {}          # 如有神通：{ 御剑术: "剑道入门" }
  灵石: 0
  已活岁月: 16
  尝试突破: false
  
  # 行踪是必需的完整对象
  行踪:
    当前区域: "神州"
    所属层级: "地层"
    环境描述: "修仙界的中心大陆"
    危险度: 10
    可用通道: []        # 如 ["演武场", "藏经阁"]
    导航信息: ""
  
  # 身份是必需的完整对象
  身份:
    姓名: "{{user}}"
    宗门: "散修"         # 如"剑阁"、"万法宗"等
    出身: "凡人"         # 如"世家子弟"、"寒门"等
  
  # 以下三个可以为空对象
  背包: {}
  #   下品灵石:
  #     名称: "下品灵石"
  #     描述: "最基础的修炼资源"
  #     品阶: "下品"
  #     数量: 100
  
  法宝: {}
  #   青锋剑:
  #     名称: "青锋剑"
  #     描述: "制式法剑"
  #     品阶: "下品法器"
  #     数量: 1
  
  杂物袋: {}
  #   宗门令牌:
  #     名称: "宗门令牌"
  #     描述: "身份证明"
  #     品阶: "凡品"
  #     数量: 1

# ===== 可选字段：红颜角色库 =====
# 如果不需要，可以删除
# 红颜角色库: {}

# ===== 可选字段：红颜 =====
# 如果不需要设置红颜，可以删除整个 红颜 键
# 如果要设置，每个红颜都需要完整的属性
# 红颜:
#   凌寒镜:
#     等级: 11
#     修为: 50
#     灵根: "变异冰灵根(极品)"
#     体质: "玄冰灵体"
#     功法: "玄冰诀"
#     本命兵器: "寒镜剑"
#     神通列表: {}
#     灵石: 1000
#     已活岁月: 24
#     尝试突破: false
#     好感度: 0         # -100 到 100
#     关系: "陌生人"
#     重要性: "路人"

# ===== 可选字段：NPC图鉴 =====
# 如果不需要，可以删除
# NPC图鉴: {}

# ===== 可选字段：任务列表 =====
# 如果不需要设置任务，可以删除整个 任务列表 键
# 任务列表:
#   新手试炼:
#     类型: "主线"       # "主线"、"支线"、"每日"、"临危受命"
#     说明: "完成宗门的入门试炼"
#     目标: "击杀一只灵兽"
#     奖励: "成为正式弟子"
#     惩罚: "被逐出宗门"
#     状态: "进行中"     # "进行中"、"已完成"、"已失败"

# ===== 可选字段：声望系统 =====
# 如果不需要设置声望，可以删除整个 声望系统 键
# 声望系统:
#   剑阁:
#     声望值: 10         # -100 到 100
#     称号: "外门弟子"   # 可选
#     关系描述: "宗门新人"