# ============================================================================
# 踏月寻仙 - initvar 参考模板（带详细注释）
# 
# 注意：YAML 中 # 开头的行是注释，不会被读入数据
# 请根据你的开局修改下面的值，然后复制到世界书的 [initvar] 条目中
# ============================================================================

# yaml-language-server: $schema=../../schema.json

# 世界时钟 - 设置当前的纪元和年份
世界时钟:
  纪元: 末法时代          # 可修改为：上古时期、黄金时代等
  年份: 1                 # 当前年份

# 世界地图 - 定义可探索的区域
世界地图:
  神州:                   # 区域名，可自定义
    layer: 地层           # 天层/地层/下层
    danger: 10            # 危险度 0-100
    desc: 修仙界的中心大陆
    connections: []       # 可通往的其他区域，如：[东海, 西域]

# 世界图志 - 记录重要事件（初始为空）
世界图志: {}

# 本尊（主角）- 这是最重要的部分
本尊:
  # === 修炼基础数据 ===
  等级: 1                 # 1-36 对应练气初期到渡劫大圆满
  修为: 0                 # 当前修为值
  灵根: 五行杂灵根        # 🔥 根据开局修改！如：变异雷灵根、太虚龙剑体
  体质: 凡体              # 🔥 根据开局修改！如：太虚龙剑体、先天道体
  功法: 无                # 如：万象衍天诀
  本命兵器: 无            # 如：青锋剑
  神通列表: {}            # 示例：{御剑术: 控制飞剑攻击敌人}
  灵石: 0                 # 初始灵石数量
  已活岁月: 16            # 主角年龄
  尝试突破: false         # 是否正在尝试突破
  
  # === 行踪信息 ===
  行踪:
    当前区域: 神州
    所属层级: 地层
    环境描述: 修仙界的中心大陆
    危险度: 10
    可用通道: []
    导航信息: ''
  
  # === 身份信息 ===
  身份:
    姓名: {{user}}        # 🔥 主角名字（使用酒馆宏）
    宗门: 万法宗          # 🔥 所属宗门
    出身: 凡人            # 如：世家子弟、散修、魔修
  
  # === 物品栏（初始为空，可根据开局添加）===
  背包: {}
  # 添加物品示例：
  # 背包:
  #   灵石袋:
  #     名称: 灵石袋
  #     描述: 装有少量灵石的袋子
  #     品阶: 凡品
  #     数量: 1
  
  法宝: {}
  # 添加法宝示例：
  # 法宝:
  #   青锋剑:
  #     名称: 青锋剑
  #     描述: 一柄普通的飞剑
  #     品阶: 下品法器
  #     数量: 1
  
  杂物袋: {}

# === 红颜列表（初始为空，可根据开局添加）===
红颜: {}
# 添加红颜示例：
# 红颜:
#   孟十七:
#     等级: 1
#     修为: 0
#     灵根: 冰灵根
#     体质: 玄冰体
#     功法: 无
#     本命兵器: 无
#     神通列表: {}
#     灵石: 0
#     已活岁月: 17
#     尝试突破: false
#     好感度: 0          # -100 到 100
#     关系: 陌生人
#     重要性: 路人

# === NPC 图鉴（初始为空，可根据开局添加）===
NPC图鉴: {}
# 添加 NPC 示例：
# NPC图鉴:
#   掌门:
#     等级: 20            # 对应金丹初期
#     修为: 3200
#     灵根: 五行灵根
#     体质: 先天道体
#     功法: 万象衍天诀
#     本命兵器: 太虚剑
#     神通列表:
#       御剑术: 控制飞剑攻击敌人
#     灵石: 100000
#     已活岁月: 2000
#     尝试突破: false
#     所在宗门: 万法宗

# ============================================================================
# 使用提示：
# 
# 1. 🔥 标记的字段是最常需要修改的
# 2. 其他字段保持默认值即可，不会影响游戏
# 3. 所有空的集合（{}）会在需要时自动填充
# 4. 复制到世界书时，可以删除所有注释行（# 开头的行）
# ============================================================================