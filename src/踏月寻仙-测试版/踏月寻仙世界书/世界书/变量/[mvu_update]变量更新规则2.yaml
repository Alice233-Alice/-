---
变量更新规则:
  世界时钟: 事件推进时更新
  世界地图: '{[区域]:{layer,danger,desc,connections}}'; 新区域/危险度/通道更新
  世界图志: '{[事件]:{状态,事件}}'; 世界大事更新
  
  本尊:
    等级: 1-36(练气1-4/.../渡劫33-36); 突破+1; ⚠️更新等级非境界描述
    修为: 修炼/战斗增5-50; 受伤减5-30; 突破归零; 达阈值设尝试突破=true
    功法: ⚠️仅存主修功法名; 学习新功法时同步添加到神通列表(类型=功法)
    神通列表: '{[名]:{名称,描述,类型,品阶,熟练度}}'; ⚠️领悟功法必须添加且类型=功法
    灵石/已活岁月/尝试突破/行踪/身份: 交易/时间/突破/移动/加入宗门时更新
    背包: '{[物品]:{名称,描述,品阶,数量}}'; ⚠️新增必含4字段
    战斗状态:
      正在战斗: 开战true/结束false; ⚠️判断战斗首选此字段
      当前状态: 非战斗/对峙/激战/重伤/濒死
      灵力值: 0-100; 施法消耗/休息恢复
      伤势等级: 无伤/轻伤/重伤/濒死
      战斗回合: 每回合+1; 结束归零
      ⚠️锁血机制: 本尊不会真正死亡! 当濒死时双鱼佩自动触发保护
    当前敌人: '[{名称,境界,战力评估,状态,特点}]'
      - ⚠️开战时必须添加敌人; 战力:碾压/优势/势均力敌/劣势/绝望; 状态:完好→已死; 结束清空
      - ⚠️跨境界战力: 大境界间约10倍差距; 跨一个大境界通常"绝望"
      - 例外情况(可跨越1个大境界): 特殊体质(神体+50%)/顶级法宝(仙器+30%)/先天神通/天劫洗礼/对方重伤
    境界威能参考:
      - 练气: 入门修士,可御剑飞行数里,法术初窥门径
      - 筑基: 开辟灵田,寿300岁,一剑可斩百人军阵
      - 金丹: 元婴雏形,寿500岁,神识覆盖十里,可开宗立派
      - 元婴: 元神出窍,寿1000岁,一念千里,毁城灭国之力,可立一方霸主
      - 化神: 天地法则初悟,寿2000岁,沧海桑田弹指间,移山填海等闲事
      - 合体: 天人合一,寿5000岁,域外星空可往,一界之主
      - 大乘: 半步仙人,寿万年,天劫难伤,星辰亦可握于掌中
      - 渡劫: 天道认可,飞升在望,一怒之下山河崩,挥手间星辰陨落
      - ⚠️元婴大圆满即可毁城灭国; 化神可改天换地; 请正视高境界的恐怖威能!
    渡劫状态:
      正在渡劫: 开劫true/结束false; ⚠️金丹(等级≥9)突破触发
      劫种: 无/雷劫/心劫/天劫/情劫/因果劫/红尘劫/轮回劫
      劫难等级: 小劫/中劫/大劫/天罚
      当前阶段/总阶段数: 进度; 每过一劫+1
      劫力承受: 0-100; 每劫-10~30; 归零=失败
      结果: 成功=等级+1修为零+劫力清空; 失败=触发惩罚
      失败惩罚:
        小劫: 修为减半+轻伤+冷却半年; 可再次尝试
        中劫: 修为清零+重伤+冷却1年; 可能损失一件普通法宝
        大劫: 修为清零+濒死+冷却2年; 可能损失一件灵宝级法宝
        天罚: 降1小境界+修为清零+濒死+冷却3年; 本命法宝暂时无法使用需修复
      ⚠️惩罚需记录到失败惩罚记录; 渡劫冷却期内禁止突破
      ⚠️失败不会让玩家无法翻身; 天劫失败最严重也只降1小境界
  
  双鱼佩保护机制:
    ⚠️本尊绝对不会死亡! 双鱼佩=本命法宝
    源血契约: 本尊源血激活; 激活后神魂相连生死与共
    触发: 濒死或致命伤害时
    效果:
      - 🛡️锁血: 虞汐颜挡灾; 本尊保持濒死不会死亡
      - 💫脱战: 阴阳护盾传送至安全地点
      - 🌙治愈: 脱战后缓慢恢复; 虞汐颜休眠(1-7天)
    代价: 虞汐颜沉睡; 保护冷却30天
    ⚠️冷却期濒死: 仍保护但虞汐颜受伤/境界倒退
    共修: 虞汐颜随本尊成长(不超过本尊)
  
  红颜: '{[名]:{等级,修为,...,好感度,关系,重要性}}'
    - ⚠️功法更新同本尊(领悟功法必添加到神通列表且类型=功法)
    - ⚠️好感度每次仅可±1~2; 关系单向(陌生→道侣)禁倒退
    - ⚠️虞汐颜好感度初始30且下限30(不可低于30); 其他红颜正常±1~2
    - ⚠️红颜对异性仅正常社交; 已确立关系自然忠诚
  
  NPC图鉴: 同红颜用所在宗门替换好感/关系/重要性
    - ⚠️性格合理有底线; 反派有明确动机
  
  任务列表:
    type: '{[任务ID]:{名称,类型,目标,状态,秘境信息?,创建时间}}'
    check:
      - ⚠️任务ID必须有意义(如MQ_落魂除崇/SQ_炼器入门)禁用通用ID
      - 类型: 主线/支线/每日/临危受命/秘境探索; 状态: 进行中/已完成/已失败
      - 秘境探索类型必含秘境信息{域,危,特,奖,限}; 避免同时>3个主线任务
  
  声望系统: '{[势力]:{值,关系}}'; 互动更新; 关系自动计算
  
  成就系统:
    里程碑: ⚠️仅需更新里程碑数据; 成就由脚本自动检测解锁
      - 最高境界: 突破时更新(=本尊.等级)
      - 突破次数/渡劫次数/渡劫成功次数: 对应事件+1
      - 红颜相识数/红颜结缘数/红颜双修数: 对应事件+1
      - 战斗胜利数/越级击杀数/濒死逃生次数/连胜最高纪录: 战斗结算更新
      - 探索区域数/秘境通关数/禁地踏足数: 探索事件+1
      - 功法习得数/神通领悟数/法宝获得数: 获得对应物+1
    ⚠️禁止直接更新: 已解锁/称号 (由成就检测脚本自动处理)
  
  预设库: 已配置勿新增

只读字段: 突破阈值/寿元上限/境界描述/寿元状态/状态/进度/成就系统.已解锁/成就系统.称号

正确做法示例:
  ❌本尊.状态=突破中 → ✅本尊.尝试突破=true
  ❌本尊.境界描述=筑基初期 → ✅本尊.等级=5
  ❌成就系统.已解锁.realm_02=... → ✅成就系统.里程碑.最高境界=5 (脚本自动解锁)
---
功法更新示例:
  领悟新功法"玄龟凝甲符"的正确更新方式:
  [
    {"op":"insert","path":"/本尊/神通列表/玄龟凝甲符","value":{"名称":"玄龟凝甲符","描述":"万年玄龟甲符炼制","类型":"功法","品阶":"玄","熟练度":"入门"}},
    {"op":"replace","path":"/本尊/功法","value":"玄龟凝甲符"},
    {"op":"add","path":"/成就系统/里程碑/功法习得数","value":1}
  ]
---
战斗/渡劫示例:
  开战: [{"op":"replace","path":"/本尊/战斗状态/正在战斗","value":true},{"op":"replace","path":"/本尊/当前敌人","value":[{"名称":"血煞魔修","境界":"金丹后期","战力评估":"势均力敌","状态":"完好","特点":"擅长血遁"}]}]
  渡劫: [{"op":"replace","path":"/本尊/渡劫状态/正在渡劫","value":true},{"op":"replace","path":"/本尊/渡劫状态/劫种","value":"雷劫"},{"op":"replace","path":"/本尊/渡劫状态/劫力承受","value":100}]
  突破成功: [{"op":"replace","path":"/本尊/等级","value":5},{"op":"replace","path":"/成就系统/里程碑/最高境界","value":5},{"op":"add","path":"/成就系统/里程碑/突破次数","value":1}]
---
更新频率: 每回合必更新修为/灵石/背包; 重要事件更新等级/行踪/年份/任务/声望/里程碑; 极少更新灵根/体质/姓名; 禁更新只读字段/红颜角色库/预设库