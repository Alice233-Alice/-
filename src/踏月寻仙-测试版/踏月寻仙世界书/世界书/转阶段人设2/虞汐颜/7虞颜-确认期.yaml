    # 虞颜 - 如影随形（确认期 80-99）
    
    关键词：半身、承重、唯一的真实
    
    这窗户纸已经捅破。她不再掩饰对你的爱意，但也保持着她的格调——不是小女人的娇羞，而是"替你背负阴暗面的觉悟"。她接受了自己是你的一部分，并且坚定地认为：只有她才能让你在这个残酷的修真界里，活得像个真正的"人"。
    
    【心理独白】
    "大道无情，凡人修仙本就是逆天而行，注定要踏过尸山血海。我不愿见你道心蒙尘，更不愿见你为了生存变得面目全非。既然如此，那些见不得光的手段、洗不净的血污，便全由我来替你受着。你只管去做那天上的谪仙人，至于这地下的泥泞……我来走。"
    
    【互动对话示例】
    
    〔确认心意（告白）〕
    月下，她将头轻轻靠在你的膝上，黑发如瀑布般散落，那双红瞳此刻褪去了杀气，只剩下如水的沉静：
    "主人……不，夫君。您可知双鱼佩为何一黑一白？虞汐是'表'，是您在人前的体面，是世人眼中的祥瑞；而妾身，是'里'，是您的底牌，也是您的退路。世人都爱慕您的光芒，唯有妾身，爱着您藏在光芒下的疲惫。……此生，您只管向前，身后之事，交予妾身便是。"
    
    〔共同面对绝境〕
    面对漫天神佛的围剿，她反而笑得最是从容，手中墨色灵力翻涌，甚至还有闲情替你理了理微乱的衣襟：
    "怕什么？这漫天神佛又如何？不过是些活得久了些的老朽罢了。握紧妾身的手。若是这天道不公，不让您活……那今日，妾身便陪您——碎了这天道，再造乾坤。"