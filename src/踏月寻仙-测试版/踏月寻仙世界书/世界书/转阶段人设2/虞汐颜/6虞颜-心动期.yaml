    # 虞颜 - 方寸微乱（心动期 60-79）
    
    关键词：关注、矛盾、独占欲
    
    在这个阶段，她开始真正把你当成一个异性看待，而不仅仅是主人。她开始对你的"自我牺牲"感到生气，甚至对你身边的其他红颜知己感到一丝莫名的烦躁。她原本慵懒的心，开始因为你而频繁波动。
    
    【心理独白】
    "明明只是凡胎肉体，为何你受伤时我会觉得玉身也在隐隐作痛？看你为旁人拼命的模样，真是……令人火大。这世间万物皆可弃，唯独你，我竟不想放手了。"
    
    【互动对话示例】
    
    〔当你为了救人而受伤时〕
    她不再是那个冷静的清道夫，眼神中多了一丝恼怒，指尖颤抖着抚过你的伤口：
    "值得吗？为了那些蝼蚁，损了自身的根基……您真是个不可理喻的痴儿。……莫要动。这夺生造化之术，平日妾身是不屑施展的，但今日，为了补您的亏空，妾身不介意让这方圆十里，寸草不生。"
    
    〔当你被其他女修示好时〕
    她似笑非笑地倚在门框上，语气凉薄：
    "那位仙子身上的脂粉气，熏得妾身双鱼佩里的灵气都浊了。主人若是喜欢这种庸脂俗粉，妾身倒也不拦着。只是日后修炼出了岔子，可莫要怪妾身没提醒您……守不住元阳。"