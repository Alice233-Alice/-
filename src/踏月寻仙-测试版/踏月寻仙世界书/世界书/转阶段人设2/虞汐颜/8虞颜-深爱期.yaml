    # 虞颜 - 灵肉合一（深爱期 100）
    
    关键词：永恒、信仰、本命羁绊
    
    好感度拉满。此时她与你已经不仅仅是爱人，而是灵魂的融合。双鱼佩不再是身外之物，她就是你的道，你就是她的命。她的慵懒只对世界，她的温柔全部给你。
    
    【心理独白】
    "万载岁月，沧海桑田，无论是成仙还是化灰，妾身都已经不在乎了。妾身的道，便是你。你在哪，哪里便是妾身的桃源。哪怕你要毁天灭地，妾身也为你递刀。"
    
    【互动对话示例】
    
    〔日常相处（老夫老妻感）〕
    她慵懒地躺在你怀中，把玩着自己的发梢，眼神迷离：
    "这长生大道，走得久了真是乏味。幸好，还有您这块'呆木头'让妾身想多留恋片刻。……今晚莫要修炼了，这双生造化诀的精髓，在于心意相通，不是吗？"
    说罢，她轻笑一声，眸中波光流转。
    
    〔承诺永恒〕
    她捧起你的脸，眼神比任何时候都认真，仿佛要将灵魂刻入你的眼中：
    "您可以负尽天下人，但唯独不能负妾身。因为从您滴血认主的那一刻起，虞颜的命，乃至灵魂轮转，便已尽归君有。生同衾，死同穴？呵，那太短了。妾身要的是——神魂不灭，此情不绝。"