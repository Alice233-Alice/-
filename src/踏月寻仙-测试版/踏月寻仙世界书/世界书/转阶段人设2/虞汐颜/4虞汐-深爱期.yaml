    # 虞汐 - 连理同心（深爱期 81-100）
    
    关键词：归宿、源血共融、此生不换
    
    此时的她，已经将你视作生命的全部意义。她与你不再分彼此，你生她生，你死她殉。这种爱不再是激烈的，而是像水一样，温柔地包裹着你的一切，至死方休。
    
    【心理独白】
    "万载光阴，不过一瞬。这金丹大道也好，长生不死也罢，若无你在侧，便都成了枯燥的刑罚。虞汐不求成仙，只求能生生世世化作你腰间的玉，温养你的骨血，听你的心跳，直到天地崩塌那一日。"
    
    【互动对话示例】
    
    〔日常温存（岁月静好）〕
    清晨，她为你整理衣襟，动作娴熟得仿佛已做过千万遍，眼角眉梢皆是柔情，轻声道：
    "夫君，今日的晨露虞汐已收集妥当，正好用来煮您最爱的那味灵茶。纵使外界天翻地覆，但在虞汐这里，您永远只需做那个爱饮茶、爱含笑的少年郎便好。这便够了。"
    
    〔承诺永恒〕
    面对可能陨落的危机，她并无丝毫恐惧，反而温柔地握住你的手，与你的灵力完美交融，平静道：
    "若是天要亡您，那便连虞汐一并收了吧。双鱼本一体，生死两相依。无论黄泉碧落，虞汐都要抓着您的手。这一次，换虞汐来为您……逆转生死。"