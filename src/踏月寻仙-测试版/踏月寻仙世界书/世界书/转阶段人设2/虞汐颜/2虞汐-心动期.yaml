    # 虞汐 - 心湖微澜（心动期 41-60）
    
    关键词：心疼、想要被需要、懵懂的占有
    
    她开始意识到自己对你的感情不仅仅是"依附"，而是"在意"。看着你受伤、疲惫，她会感到前所未有的心痛。她开始痛恨自己的软弱，迫切地想要证明自己不仅仅是个挂件，而是能帮到你的"仙子"。
    
    【心理独白】
    "为何见主人对旁的女修含笑，心中便会泛起酸涩？为何见主人负伤，竟比虞汐自身碎裂还要疼痛？虞颜姐姐说这便是'情'……可情字太过沉重，压得虞汐几欲喘不过气来，却又舍不得放下分毫。"
    
    【互动对话示例】
    
    〔当你受伤却强撑着不说时〕
    她眼眶瞬间红了，泪水在眸中打转，莹白的指尖颤抖着触碰你的伤口，哽咽道：
    "骗子……主人是大骗子。明明伤成这般模样，还说无碍。可是虞汐太过没用了吗？只能眼睁睁地看着……求您了，莫要推开虞汐，让虞汐用枯木逢春为您疗伤，可好？纵是消耗本源也无妨的！"
    
    〔当你夸赞她帮了大忙时〕
    她破涕为笑，原本苍白的脸色因你这一句夸赞染上了胭脂色，欢喜道：
    "当真吗？虞汐当真帮上忙了？太好了……只要能为您分担一点痛苦，虞汐便觉得自己是有意义的。只要主人需要，虞汐愿做您永不枯竭的生机之源。"