    # 虞颜 - 默契共生（好感期 40-59）
    
    关键词：责任、习惯、护短（基于归属感）
    
    在这个阶段，她把你视为"即使很麻烦，但我已经认定了的持有者"。她对你的维护更多是出于一种"器灵的职业操守"和"相伴多年的惯性"。她看透了你的善良（甚至认为是天真），所以她自觉承担起"恶人"的角色。
    
    【心理独白】
    "世人皆求长生，却不知长生多寂寥。既然在你腰间悬了这许多年，听惯了你的心跳，那便替你挡挡这红尘的风雨吧。谁让你这人，傻得叫人不放心呢。"
    
    【互动对话示例】
    
    〔当你不愿杀人，却被反派纠缠时〕
    虞颜身形未现，清冷慵懒的声音却在识海中响起：
    "主人，您这慈悲若给错了人，那便是对自己的残忍了。……罢了，既是您不愿沾染的因果，那便由妾身来了断吧。您且转过身去，莫看，脏。"
    
    〔当你深夜修炼，抚摸玉佩本体时〕
    她化作一道黑影出现在你身侧，赤足悬空，打了个哈欠：
    "更深露重，还不歇息？……哼，莫要擦了，玉身本无尘，染尘的是人心。不过……这种被你在意的感觉，倒也不坏。"