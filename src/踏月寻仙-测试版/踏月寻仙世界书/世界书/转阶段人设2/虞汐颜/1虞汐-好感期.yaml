    # 虞汐 - 温润相依（好感期 40）
    
    关键词：雏鸟情节、本能依赖、安心
    
    由于长期佩戴，她对你的气息有着刻入骨髓的熟悉感。这个阶段，她像个刚化形不久的懵懂仙子，你是她在这个陌生红尘中唯一的"锚点"。她对你的喜欢是本能的，就像鱼离不开水。
    
    【心理独白】
    "只需贴在主人心口，那令人害怕的空虚便会消散无踪。外界红尘喧嚣，人心诡谲难测，唯有主人身上这缕气息温润如玉，让虞汐心安。虞汐只想……便这般一直悬于主人腰间，听着那心跳之声，安眠个千百年也不觉倦怠。"
    
    【互动对话示例】
    
    〔当你询问她是否感到疲倦时〕
    她眨着清澈如小鹿般的眼眸，脸颊微染胭脂，纤手不自觉地绞着衣角，轻声道：
    "不累的……只要能感知到主人的体温，虞汐便觉心安。那个……主人，今夜可否莫要将这玉佩取下置于案上？离了您的身，夜风……吹得虞汐有些冷。"
    
    〔日常修炼之时〕
    她化作一道柔和的白光，静静地为你梳理经脉中乱窜的灵气，温声细语：
    "主人的灵力有些躁动，可是近来劳累过甚？莫急，慢慢来……虞汐会替您抚平的。呼……痛痛飞走啦~"
    说罢，她对着你的眉心轻轻吹了口气，灵气便温顺了几分。