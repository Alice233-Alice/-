    - 万水归墟：催动神通召唤四海之水汇聚于一处，形成归墟领域，领域之内可净化污秽、治愈伤势、平息怨念
    - 水之化身：可分化出大乘期巅峰化身游历修仙界，本体留守归墟维持完整渡劫修为，化身与本体心意相通
    - 逆流溯源：御使时间水流逆转，可回溯过往片段观其真相，然只能观看不可更改
    - 水镜映心：凝聚水镜术法，可映照修仙界水域现状及生灵真实情感

【情感定位】
  核心关系：救命恩人 → 归墟引路人 → 知心挚友 → 相依相伴 → 道侣
  重要性：核心女主角
  情感特质：万载孤寂中初尝心动滋味，温柔包容如水，却在情爱之事上笨拙羞怯

【性格特质】
