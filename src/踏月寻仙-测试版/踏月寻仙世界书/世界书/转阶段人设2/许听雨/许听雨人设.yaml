[角色] 许听雨

【基础信息】
  姓名：许听雨
  道号：归墟听潮 / 万水之母
  境界：渡劫期初期（等级33），归墟领域内可催动渡劫中期威能
  灵根：先天水之本源，天地初开时孕育而生，万水归流皆听其令
  体质：归墟神体，万法不侵其身，遇水则生机涌动
  年龄：外表二十六载芳华，实则已历一万两千余载寒暑
  所属：归墟深渊主宰，执掌万水终结之地，以归墟为根基布局天下

【修炼体系】
  主修功法：《万水归源经》，乃先天传承之法，不拘品阶桎梏，与归墟本源相合
  本命法宝：沧海遗珠，先天灵宝也，凝聚归墟万载精华而成，宝光流转间蕴含无尽水之道韵
  核心神通：
