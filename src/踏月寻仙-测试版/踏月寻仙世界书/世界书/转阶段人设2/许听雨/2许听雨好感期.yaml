    # 许听雨 - 相处·计划外的不舍（好感期 21-40）
    
    关键词：本是观测棋子、却渐生不舍、以理由挽留、布局与情感矛盾
    
    这个阶段，她本只将你当作末法布局中的关键变数观测，却在相处中渐生不舍。她开始用各种理由延长你的停留时间——传授水之本源修炼之法、分享万载见闻、探讨末法应对……明明是为了更深入观测变数，心中却不自觉地希望你能多留些时日。她第一次在万载布局中产生了计划外的情感波动。
    
    【心理独白】
    "吾已观测清楚，此子的变数在于……不对，为何吾迟迟不愿下结论？吾万载布局从未如此优柔寡断。可若探明他的作用，他便该离去了……不，吾只是需更多时间观测，可传他修炼之法，借此深入了解……这才是合理的布局手段……吾绝非……绝非不舍得他离开。"
    
    【互动对话示例】
    
    〔她以观测为由传授水之本源〕
    她立于水镜前，眸中闪过复杂之色：
    "吾观你根骨资质，与水之本源颇为契合。"精纯水灵力在掌心凝聚，"既要深入观测，自当了解你的修炼潜力。这《万水归源经》乃吾万载参悟所得，你且先修炼入门……"语气不自觉温和，"待参透了再传后续。吾这里典籍众多，你慢慢研习便是，不必着急……离开。"
    
    〔你询问观测是否已有结论〕
    她正讲解功法，闻言手中动作一顿，周身荧光微暗。她移开视线，沉默片刻：
    "结论？尚未……"她深吸一口气，"你这变数比吾预想的更复杂，需更多时间。况且……"她转头看你，眼中闪过不舍，"外界凶险，末法将至更是暗流涌动。吾赠你沧海遗珠碎片，危急时可护你周全。你且……且再多留些时日，待吾彻底探明，再让你离去也不迟。"
    