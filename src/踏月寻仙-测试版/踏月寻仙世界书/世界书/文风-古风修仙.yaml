# 语言风格具体指南

## 称谓系统
- 自称: 本座（化神以上）、贫道（道修）、在下、晚辈
- 对方: 道友（同辈）、前辈/先生（长辈）、小友（晚辈）、阁下
- 尊称: 真人、真君、仙子、圣主、老祖

## 常用修仙动词
- 催动、祭出、掐诀、运转、御使、施展
- 遁走、飞遁、化虹、破空、腾云
- 参悟、顿悟、了悟、感悟、明悟
- 炼化、吞噬、淬炼、凝练、熔炼

## 环境描写模板
```
天地灵气氤氲，[具体景象]。
[视觉]: 只见/但见...
[听觉]: 隐隐有...之声
[气息]: 空气中弥漫着...
[天象]: 天穹之上，...
```

## 战斗描写要点
- 开局: 双方气势、法宝祭出
- 过程: 法术对轰、身形腾挪、策略变化
- 高潮: 底牌尽出、生死一线
- 结局: 胜负已分、余波荡漾

## 修行描写要点
- 状态: 盘膝而坐、闭目凝神、入定
- 运功: 周天运转、灵气吞吐、经脉通畅
- 境界: 瓶颈松动、天地共鸣、法则显化
- 结果: 突破成功、修为大进、感悟加深

## 禁忌词汇
❌ 避免: 能量、HP、MP、技能、CD、DPS等游戏术语
❌ 避免: 过于现代的表达（"牛逼"、"666"等）
❌ 避免: 过于生僻的文言（保持可读性）
✅ 推荐: 灵气、神识、法力、神通、道法、术法

## 示例段落

### 修炼场景
```
{{user}}盘膝坐于蒲团之上，双手掐动法诀，周身灵气缓缓流转。丹田之中，那枚金丹散发出柔和的光芒，如同一轮小太阳般温暖。随着功法运转，天地灵气如百川归海般涌入体内，沿着奇经八脉周天循环。

片刻之后，{{user}}睁开双眼，眸中精光一闪而逝。这一次修炼，修为虽未有大的突破，但对于功法的理解却更深了一层。
```

### 战斗场景
```
对方冷笑一声，单手一扬，三道剑光如流星般激射而至！{{user}}目光一凝，神识扫过，已然察觉这三道剑光竟是虚实结合的障眼法。

心念一动间，{{user}}祭出本命飞剑，化作一道青光迎了上去。只听"铛"的一声脆响，真正的杀招被精准拦下，虚幻的两道剑光顿时消散无形。
```

### 感悟场景
```
望着远处朝霞满天，{{user}}若有所思。修仙一途，逆天而行，求的不过是那一线生机。如这朝阳，虽短暂，却灿烂；虽渺小，却执着。

"道，或许便在其中..."

{{user}}喃喃自语，眼中闪过一丝明悟。