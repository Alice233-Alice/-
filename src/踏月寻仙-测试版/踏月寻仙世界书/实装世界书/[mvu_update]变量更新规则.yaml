---
变量更新规则:
  世界时钟: 事件推进时更新
  世界地图: '{[区域]:{layer,danger,desc,connections}}'; 新区域时更新
  世界图志: '{[事件]:{状态,事件}}'; 世界大事更新
  
  本尊:
    等级: 1-36; 突破+1; ⚠️更新等级非境界描述
    修为: 修炼+5~50/受伤-5~30; 突破归零; 达阈值→尝试突破=true
    功法: ⚠️仅存主修功法名; 新功法同步添加到神通列表(类型=功法)
    神通列表: '{[名]:{名称,描述,类型,品阶,熟练度}}'; ⚠️领悟功法必添加
    灵石/岁月/尝试突破/行踪/身份: 交易/时间/突破/移动/入门时更新
    背包: '{[物品]:{名称,描述,品阶,数量}}'; ⚠️新增必含4字段
    战斗状态:
      正在战斗: 开战true/结束false
      当前状态: 非战斗/对峙/激战/重伤/濒死
      灵力值: 0-100; 施法消耗/休息恢复
      伤势等级: 无伤/轻伤/重伤/濒死
      ⚠️锁血: 本尊不死! 濒死→双鱼佩保护
      境界威能: 练气御剑→筑基斩军→金丹立派→元婴毁城→化神移山→合体主界→大乘摘星→渡劫碎天
        - ⚠️元婴毁城灭国; 化神移山填海; 正视高境威能!
    当前敌人: ⚠️注意路径是/本尊/当前敌人，不是/本尊/战斗状态/当前敌人
      type: '[{名称,境界,战力评估,状态,特点}]'
      check:
        - ⚠️开战必添敌人到此数组; 战力评估:碾压/优势/势均力敌/劣势/绝望; 状态:完好/轻伤/重伤/濒死/已死
        - ⚠️结束战斗时清空数组(设为[])
        - ⚠️跨境界战力评估: 大境界间10倍差距; 跨1大境界通常"绝望"
        - 例外(可提升1档): 神体+50%/仙器+30%/先天神通/天劫洗礼/对方重伤
    渡劫状态:
      正在渡劫: 开劫true/结束false; ⚠️金丹(≥9级)突破触发
      劫种: 无/雷劫/心劫/天劫/情劫/因果劫/红尘劫/轮回劫
      劫难等级: 小劫/中劫/大劫/天罚
      劫力承受: 0-100; 每劫-10~30; 归零=失败
      结果: 成功→等级+1+修为零; 失败→惩罚
      失败惩罚: 小劫修为半+轻伤+冷半年 | 中劫修为零+重伤+冷1年 | 大劫修为零+濒死+冷2年 | 天罚降1境+濒死+冷3年
      ⚠️失败不会无法翻身; 天罚最严重也只降1小境界
  
  双鱼佩(本命法宝):
    ⚠️本尊绝不死! 濒死→虞汐颜挡灾+脱战+治愈; 代价:虞汐颜沉睡1-7天+冷却30天
    源血契约激活; 共修(虞汐颜≤本尊); 冷却期濒死仍保护但虞汐颜受伤
  
  红颜: '{[名]:{等级,修为,...,好感度,关系}}'; 好感通常±1~2; 虞颜下限30
    check:
      - 首次遇见/结识/收为同伴时, 必须先insert完整对象
      - 角色不存在时禁止直接delta好感, 先insert再改
      - Analysis提及相识/同行/结缘/亲密/决裂等关系变化时, JSONPatch必须有对应红颜patch
      - 虞汐与虞颜需分别描写
      - 关系可随剧情自然变化，不强制固定阶段；需与当前互动语境一致
  
  NPC图鉴: 同红颜用所在宗门替换好感/关系/重要性; ⚠️性格合理有底线
  
  任务列表:
    type: '{[任务ID]:{名称,类型,目标,状态,秘境信息?,创建时间}}'
    check:
      - ⚠️任务ID必须有意义(如MQ_落魂除崇/SQ_炼器入门)禁用通用ID
      - 类型: 主线/支线/每日/临危受命/秘境探索; 状态: 进行中/已完成/已失败
      - 秘境探索类型必含秘境信息{域,危,特,奖,限}; 避免同时>3个主线任务
      - ⚠️任务状态变更(已完成/已失败)时，必须立即使用 remove 指令将其从列表中移除，禁止保留在列表中。
      - 示例: {"op":"remove","path":"/任务列表/SQ_深夜敌袭"}
  声望系统: '{[势力]:{值,关系}}'; 互动更新
  预设库: 已配置勿新增

  成就系统:
    里程碑: ⚠️仅需更新里程碑数据; 成就由脚本自动检测解锁
      - 最高境界: 突破时更新(=本尊.等级)
      - 突破次数/渡劫次数/渡劫成功次数: 对应事件+1
      - 红颜相识数/红颜结缘数/红颜双修数: 对应事件+1
      - 战斗胜利数/越级击杀数/濒死逃生次数/连胜最高纪录: 战斗结算更新
      - 探索区域数/秘境通关数/禁地踏足数: 探索事件+1
      - 功法习得数/神通领悟数/法宝获得数: 获得对应物+1
    ⚠️禁止直接更新: 已解锁/称号 (由成就检测脚本自动处理)

只读字段: 突破阈值/寿元上限/境界描述/寿元状态/状态/进度/成就系统.进度追踪
示例: ❌本尊.状态=突破中 → ✅本尊.尝试突破=true
---
功法示例: [{"op":"insert","path":"/本尊/神通列表/玄龟凝甲符","value":{"名称":"玄龟凝甲符","描述":"...","类型":"功法","品阶":"玄","熟练度":"入门"}},{"op":"replace","path":"/本尊/功法","value":"玄龟凝甲符"}]
---
更新频率: 每回合更新修为/灵石/背包; 重要事件更新等级/行踪/任务; 禁更新只读字段
