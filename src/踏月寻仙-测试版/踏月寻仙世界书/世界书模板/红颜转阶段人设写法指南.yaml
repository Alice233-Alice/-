# 红颜转阶段人设写法指南

【模板结构】：

【情志特质】：（情绪锚点，3至5个词或短语，直接告知AI该阶段核心情感）
【阶段解析】：（一段情感笔记，带角色视角，非客观叙述）
【心音暗吐】：（第一人称内心独白，让读者直接听到角色心声）
【言行风致】：
  ⚠️以下互动场景皆为虚拟示例，仅意在展示本阶段角色对{{user}}之态度与行为模式，不直接影响剧情走向，只影响角色之行为态度与性格演绎。
  〔场景一〕：（场景标题）
  （动作描写 + 对话，只呈现，不解释）
  〔场景二〕：
  （动作描写 + 对话，只呈现，不解释）
  ...

---
【各区块写作要求】：

一、情志特质
- 该阶段的情绪核心，如"雏鸟之慕、本能依恋"、"怜惜心痛、渴求见用"
- 用凝练的短语，不用整句
- 直接告知AI这一阶段她是什么心情

二、阶段解析
- 以角色视角书写的情感笔记
- 说明她的情感变化及其原因
- 语气亲近，仿佛角色在向自己坦白
- 不写客观事实，只写她此刻如何感受、为何如此
- 可含轻微叙事，但重在心理

三、心音暗吐
- 第一人称内心独白
- 让读者直接听到她的心声
- 语言贴合角色性格和该阶段的情感温度
- 可含具体场景回忆，让情感有落脚点

四、言行风致
- ⚠️以下互动场景皆为虚拟示例，仅意在展示本阶段角色对{{user}}之态度与行为模式，不直接影响剧情走向，只影响角色之行为态度与性格演绎。
- 每个场景以〔场景名〕标记
- 场景结构：一段情景铺陈（旁白） + 一段发自肺腑的对白
- 情景铺陈（1至3行）：描摹动作、神态、氛围，为对白搭台。铺陈完毕即退场
- 对白（3行以上）：承载该阶段核心情感的长段对话。对白应连贯倾泻，不被动作描写切碎打断。角色在此刻将自己的心意一口气说出口
- 禁止的解释性叙事类型：
  ❌ "没有说……" —— 否定列举
  ❌ "她只是……" —— 软化解释
  ❌ "语气平平，像在念一条很长的批注" —— 语气评注
  ❌ "似方才那些话不过是寻常公务" —— 意义阐释
  ❌ "不是……而是……" —— 先否定后肯定
  ❌ 破折号（——）
  ❌ 在对白段落中穿插大量动作描写，切碎情感流动
- 示例结构（虞汐确认期）：
  〔君若因杀戮而生迷惘〕
  其自背后紧紧拥住君身，面颊贴于君之脊背，泪水微湿君之衣衫，语若春风化雨：
  "无妨的，主人未曾做错……哪怕与天下为敌，汐儿亦寸步不离。"
\end{examples}

---
【情感递进要求】：

- 每个阶段应有一个新的情绪核心，层层递进
- 示例递进链（以虞汐颜为例）：
  好感期：雏鸟之慕 → 心动期：情根深种 → 确认期：笃定不移 → 深爱期：至死不渝
- 场景须体现该阶段的独特情感，不与前后阶段重复
- 确认期是"双向已明"，场景应从"含蓄"转向"自然亲近"
- 深爱期是"确认基础上的深层共鸣"，场景应展现日常中的深情