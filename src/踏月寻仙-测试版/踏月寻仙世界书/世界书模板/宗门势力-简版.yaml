content: |-
  # 修仙界宗门势力分布
  
  ## 地理布局
  
  ### 神州（中央大陆）
  - **剑阁**：神州·剑门关，悬空于万仞天堑，正道剑修圣地
  - **万法宗**：神州·问道峰，高九千丈，正道理论中心
  - **金刚寺**：神州·西天佛山，佛修圣地
  - **药王谷**：神农架深处，医修圣地
  - **儒门**：神州·文圣山，儒修圣地
  - **大夏王朝**：神州·中州皇城，世俗统治
  - **九州商会**：神州九大主城，商业联盟
  - **酆都城**：神州阴阳交界，引魂司总部
  
  ### 东苍（东部）
  - **青龙殿**：东苍·青龙山脉，守护青帝陵
  - **建木宗**：东苍·建木神树，木系道法
  - **百花谷**：百花秘境，女修门派
  
  ### 南炎（南部）
  - **离火宫**：南炎·不灭火山，朱雀圣地
  - **铸剑山庄**：南炎·地火熔炉，炼器第一
  
  ### 西庚（西部）
  - 主要为散修和古战场遗址，无大宗门
  
  ### 北冥（北部）
  - **玄武宗**：北冥·玄冰山，镇守归墟
  - **龙宫**：北冥深海，妖族势力
  
  ### 其他区域
  - **血神教**：血魔渊（位置隐秘），魔道总部
  - **天魔宗**：天魔山（位置游离），魔道大宗
  - **妖盟**：万妖森林（东苍边缘），妖族联盟
  
  ## 阵营划分
  
  ### 正道阵营
  - 超大宗门：剑阁、万法宗
  - 大宗门：金刚寺、药王谷、儒门、青龙殿、玄武宗
  - 小宗门：建木宗、百花谷
  
  ### 魔道阵营
  - 超大宗门：血神教
  - 大宗门：天魔宗
  
  ### 中立阵营
  - 超大宗门：妖盟
  - 大宗门：大夏王朝、九州商会
  - 小宗门：离火宫、铸剑山庄
  
  ## 宗门机制（通用）
  
  ### 入门条件
  - **灵根检测**：需有灵根（五行杂灵根可入小宗门，三灵根以上可入大宗门）
  - **品行考核**：正道宗门重品行，魔道宗门看实力
  - **推荐信**：有内门弟子或长老推荐更易入门
  
  ### 弟子等级
  1. **外门弟子**：刚入门，练气期
  2. **内门弟子**：通过考核，筑基期以上
  3. **真传弟子**：宗门精英，金丹期以上
  4. **长老**：元婴期以上，管理宗门事务
  5. **太上长老**：化神期以上，镇守宗门
  6. **宗主/掌门**：宗门最高领导
  
  ### 宗门资源
  - **功法阁**：存放各阶功法，按弟子等级开放
  - **藏书阁**：记录宗门典籍和秘术
  - **炼器堂**：炼制法宝兵器
  - **炼丹房**：炼制丹药
  - **任务堂**：发布宗门任务，奖励贡献点
  - **藏宝库**：存放珍贵资源和法宝
  
  ### 贡献点制度
  - 完成宗门任务获得贡献点
  - 用贡献点兑换功法、丹药、法宝等资源
  - 贡献点可提升弟子地位
  
  ### 宗门规矩
  - **正道宗门**：禁止滥杀无辜、禁止修炼邪功、禁止背叛师门
  - **魔道宗门**：弱肉强食，实力为尊
  - **中立宗门**：各有各的规矩
  
  ### 宗门关系
  - **正魔对立**：剑阁 vs 血神教（死敌）
  - **同盟关系**：剑阁 ⟷ 万法宗（交好）
  - **商业合作**：各宗门 ⟷ 九州商会
  - **医疗合作**：各宗门 ⟷ 药王谷
  
  ### 宗门庇护
  - 弟子在外可报宗门名号求助或震慑
  - 宗门会为弟子报仇（视弟子地位而定）
  - 杀害大宗门真传弟子会引发宗门追杀
  
  ---
  
  **注意**：详细的宗门信息（核心特点、最高战力等）存储在 MVU 变量的 `宗门势力库` 中，AI 可通过变量系统查询。