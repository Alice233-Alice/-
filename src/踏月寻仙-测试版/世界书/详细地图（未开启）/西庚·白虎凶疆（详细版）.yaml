【西庚·白虎凶疆】
● 位置：大陆西方
● 地貌：无尽戈壁与金属矿山交错，地表覆盖金属砂砾
● 灵气：金属性灵气锐利，天空悬浮金属尘埃
● 圣兽：白虎（主杀伐）

【核心特征】
1. 万剑冢：上古战场遗址，剑意经年不散
2. 金属风暴：狂风卷起金属砂砾形成绞杀风暴
3. 煞气领域：上古战场残留杀气实质化

【主要势力】
- 白虎圣殿（崇拜白虎圣兽，主张杀伐证道）
- 兵家（专修炼体与兵器之道，肉身如法宝）
- 慕容世家（西庚最大修仙世家，控制矿脉）

【资源特色】
- 庚金之精：金属矿脉核心，炼制飞剑最佳材料
- 战魂晶：上古战魂凝结，吸收可感悟战斗经验
- 煞气结晶：战场杀气实质化，可修炼杀伐神通

【特殊法则】
- 金属性功法威力×1.5
- 木属性功法被克制（威力减半）
- 战斗突破几率增加，生死搏杀中易顿悟

【危险警告】
- 煞气侵蚀：长期停留会沦为杀戮怪物
- 金属风暴：金丹以下无法抵抗
- 古战魂袭击：夜间游荡的强大战魂，不死不灭
