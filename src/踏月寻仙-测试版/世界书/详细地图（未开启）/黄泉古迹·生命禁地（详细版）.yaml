【黄泉古迹·生命禁地】
触发词：黄泉古迹,生死交界,轮回遗址,幽冥入口,后土治所,鬼国
● 位置：神州西南，九曲天河源头
● 外观：灰雾笼罩的古老废墟，建筑风格非今非古
● 特性：连接阴间与阳世，时间流速混乱
● 危险等级：★★★★☆（元婴可边缘探索）

【禁地特征】
1. 九口黄泉井：据说通往不同轮回
2. 白色骨沙：地面铺满骨粉，踩之有声
3. 血色残月：天空永远悬挂血色月亮
4. 亡魂游荡：无法转世的亡魂在此徘徊

【进入条件（最低）】
- 修为：至少元婴期（否则被黄泉死气侵蚀）
- 物品：需携带“往生符”或“孟婆汤”
- 时机：“阴阳交替”的黄昏时分进入
- 心志：心志不坚者靠近即被拉入轮回幻境

【内部区域】
1. 黄泉路：青石小路，踏上后无法回头
2. 奈何桥：断裂石桥，下方是“忘川河”虚影
3. 望乡台：残破高台，可眺望故乡但会迷失
4. 轮回井区：九口井对应不同轮回道

【危险】
- 黄泉死气：侵蚀生机，加速寿元流逝
- 轮回幻境：自动生成前世今生幻象，沉溺则魂飞魄散
- 迷失亡魂：被困上万年的强大亡魂，怨气冲天
- 轮回乱流：靠近黄泉井时被卷入随机轮回
- 守墓石像：后土留下的守护石像，攻击一切闯入者

【机缘】
- 轮回感悟：直面轮回法则，领悟“轮回之道”
- 孟婆汤原浆：饮下可忘却烦恼，洗涤心魔
- 三生石碎片：记录三生三世，可观过去未来
- 判官笔残骸：幽冥至宝残片，一笔定生死
- 黄泉圣水：洗去业力，纯净灵魂

【相关势力】
- 引魂司（官方守墓人）：监视异动，接引亡魂
- 往生教（邪教）：试图打破轮回，让亡者重归
- 孟婆客栈（中立）：黄泉边缘的神秘据点

【相关事件】
- 每甲子（60年）灰雾散去三日，最佳进入时机
- 九曲天河七月半变血色，黄泉与阳间界限模糊
- 曾有修士在此获得前世记忆，也有人被残念附体