【南炎·朱雀圣域】
● 位置：大陆南方
● 地貌：连绵火山群，熔岩河流纵横，地火永不熄灭
● 灵气：火属性灵气狂暴，天空漂浮火云
● 圣兽：朱雀（在此涅槃）

【核心特征】
1. 不灭火山：中央火山永不熄灭，传说朱雀涅槃处
2. 地火网络：地下熔岩河形成复杂网络
3. 炎魔领域：地火中诞生的特殊种族

【主要势力】
- 离火宫（供奉朱雀圣兽，执掌南炎秩序）
- 炎魔族（地火中诞生的种族，天生控火）
- 铸剑山庄（天下第一炼器宗门，借地火炼宝）

【资源特色】
- 地心火晶：熔岩深处孕育，蕴含精纯火元
- 涅槃灰烬：不灭火山喷发物，有重生之效
- 朱雀翎羽：圣兽脱落神羽，可炼化为本命法宝

【特殊法则】
- 火属性修士实力提升50%
- 水属性修士实力减半
- 正午时分地火喷发频繁，灵脉易现

【危险警告】
- 熔岩陷阱：看似坚固地面突然塌陷
- 火毒瘴气：无色无味，吸入后五脏如焚
- 火灵暴走：狂暴火元素生灵，元婴期难抵挡
