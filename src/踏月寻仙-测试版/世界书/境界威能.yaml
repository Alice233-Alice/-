<Cultivation_System>
[修仙境界体系与绝对战力铁律]
⚠️核心设定：修仙界是残酷的【金字塔层级】，境界差距是【生命层次的质变】与【降维打击】，绝非线性增长！
❌禁止：跨大境界战斗势均力敌；低境界能伤到高境界；高阶修士表现得像普通武夫互殴。
❌绝对禁忌：禁止低阶修士（如练气/筑基）强行推倒、压制或用强于高阶修士（如大乘/渡劫）。高阶修士的肉身与神魂自带【位格威压】，低阶修士若无其自愿收敛气息，靠近便会爆体而亡，更遑论用强！
✅必须：高打低是【秒杀/碾压/仅凭气势镇杀】；高阶战斗必须描写【天地异象、空间碎裂、法则扭曲】。

[境界威能与表现(Rank 1-36)]
(下三境：凡人蜕变，物理与能量破坏)
1. <练气> (Rank 1-4): 引气入体。御剑数里，敌百人。
2. <筑基> (Rank 5-8): 灵力液化。可灭千人军队，摧毁山头。
3. <金丹> (Rank 9-12): 结丹。神识十里，随手一击可毁城灭国。
(中三境：掌控自然，空间与法则初探)
4. <元婴> (Rank 13-16): 元神出窍。瞬息千里，一人敌国，低境界数量再多也无法破防。
5. <化神> (Rank 17-20): 掌控天地灵气。移山填海，撕裂空间，对元婴及以下形成【法则级免疫】。
6. <炼虚> (Rank 21-24): 虚空造物，身融天地。举手投足引发天灾，可轻易抹除大陆。
(上三境：概念级存在，因果与星域级破坏，生命层次已非凡人)
7. <合体> (Rank 25-28): 尊者。滴血重生，法相万丈。一念改变天象，战斗余波可毁灭星辰。
8. <大乘> (Rank 29-32): 圣人。半步仙人，言出法随。掌握【因果/时间/空间法则】，视众生为蝼蚁。其肉身已化道体，低阶修士的攻击连其护体灵光都无法触及。
9. <渡劫> (Rank 33-36): 至尊。承载天道。凡界战力天花板，意念可覆灭星系，不可名状的恐怖存在。其生命位格极高，若不主动收敛，低阶修士直视其真容便会道心崩溃。此上更有仙道三境，乃法则之极，大道之源，非本界修士可窥。

[高阶斗法与神通机制]
⚠️核心设定：元婴及以上大能交手，已脱离寻常"法术对轰"，转为神魂、空间与法则的降维碾压。神通随境界解锁，由低至高贯穿修炼之途，高阶神通对低阶神通享有法则级压制。
详见《神通体系》——概括神识（金丹→渡劫）、元婴出窍（元婴→合体）、领域（化神→大乘）、天地法相（合体→渡劫）、体内世界（炼虚→渡劫）、言出法随（大乘→仙界）六大神通体系，逐层递进。

[修炼规则]
- 突破：大境界突破必须有【机缘/顿悟】，否则卡死瓶颈。所需灵气呈【几何倍数】暴增。
- 雷劫：从步入<金丹>境开始，往后再步入每一大境界，修炼者都会遭遇雷劫，并且强度逐级递增。
