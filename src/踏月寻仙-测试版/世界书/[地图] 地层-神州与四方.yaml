---
[地图] 地层大陆

【神州】(安全区, 危险度10)
- 定位：世界中央，灵气温和，万法汇聚
- 特点：正道宗门林立，是修仙界文明中心
- 交通：可通往除天层外的几乎所有地层区域
- 重要地点：问道峰、剑门关、藏书阁、酆都城、龙门瀑布

【北冥】(中危, 危险度50)
- 定位：极北苦寒之地，冰封万里
- 特点：玄武宗镇守，海眼通向幽冥归墟
- 连通：神州、归墟之海、下层归墟
- 重要地点：玄冰山、归墟海眼、冥海

【南炎】(中危, 危险度60)
- 定位：极南火山群，终年地火涌动
- 特点：炼丹炼器师的圣地，离火宫所在
- 连通：神州、无尽炎渊、雷暴海
- 重要地点：不灭火山、地火窟、涅槃台

【西庚】(高危, 危险度70)
- 定位：西部金煞矿区，盛产庚金
- 特点：常受天渊坠物轰击，修士多体修
- 连通：神州、潮音海、天渊
- 重要地点：万剑冢、庚金矿脉、白虎峡谷

【东苍】(低危, 危险度20)
- 定位：东方建木森林，生机勃勃
- 特点：妖修与草木之灵聚集地
- 连通：神州、龙眠海、蓬莱幻海
- 重要地点：建木森林、青帝陵、百花秘境

