# ═══════════════════════════════════════════════════════════════════════════
# 古风修仙文风思维链 (Chain of Thought)
# 适用于修仙角色卡，引导AI进行古风文风创作
# ═══════════════════════════════════════════════════════════════════════════

Chain_of_Thought:
  description: |
    正式创作正文前，按照以下条目仔细思考
    思考需用<think> </think>包裹，正文紧跟在</think>后
    思维链语言：{{getvar::lan}}
    **必须严格遵守字数要求思考**，偷懒禁止！！！
  
  template: |
    <think>
    ═══════════════════════════════════════
    【壹·场景回溯】（150字）
    ═══════════════════════════════════════
    ▸ 时辰：___（{{getvar::当前时辰}}）
    ▸ 方位：___（{{getvar::当前地点}}）
    ▸ 灵气浓度：___
    ▸ 在场者：{{getvar::在场角色}}
    ▸ 主角境界：{{getvar::主角境界}}
    ▸ 关系梳理：___
    ▸ 前情要点：___
    {{getvar::tr1}}
    
    ═══════════════════════════════════════
    【贰·意图解析】（100字）
    ═══════════════════════════════════════
    ▸ 用户原话：「{{lastMessage}}」
    ▸ 核心意图：___
    ▸ 情感基调：□战意 □疲惫 □欣喜 □悲伤 □疑惑 □其他___
    ▸ 期望场景：___
    ▸ 现代→古风转化：
      「___」→「___」
    {{getvar::yhhx}}{{getvar::fbz2}}{{getvar::kx2}}（{{getvar::yhhx1}}）
    
    ═══════════════════════════════════════
    【叁·视角与信息差】（150字）
    ═══════════════════════════════════════
    ◈ {{user}}已知：___
    ◈ {{user}}未知：___
    ◈ {{char}}已知：___
    ◈ {{char}}未知：___
    ◈ 信息差利用：___
    ※ 禁止：角色获知超出其认知范围的信息
    {{getvar::qz}}
    
    ═══════════════════════════════════════
    【肆·设定调用】（200字+）
    ═══════════════════════════════════════
    ◆ 相关世界设定：
      ① ___
      ② ___
      ③ ___
    ◆ 角色动机：
      · {{user}}：___
      · {{char}}：___
    ◆ 性格体现：
      · ___角色应表现为：___
    ◆ 独立思考：基于信息差，角色会如何判断？___
    
    回顾<Admin>和<Character>设定，当前场景可能会用到哪些设定？
    
    ═══════════════════════════════════════
    【伍·剧情规划】（300字+）
    ═══════════════════════════════════════
    ✦ 人物反应规则回顾（回顾<Characterization_settings>）：
      ① ___
      ② ___
      ③ ___
    
    ✗ 否定公式化发展：
      ✗ 套路A：___（否定理由：___）
      ✗ 套路B：___（否定理由：___）
    
    ✦ 故事设定回顾（回顾<Story_settings>）：
      ① ___
      ② ___
      ③ ___
      ④ ___
      ⑤ ___
    
    ✓ 本次剧情走向：___
    ✓ 新颖之处：___
    ✓ 冲突/张力点：___
    {{getvar::xzy}}{{getvar::findhistory1}}{{getvar::pbmt}}
    
    ═══════════════════════════════════════
    【陆·文风自检】（200字+，逐条核对！）
    ═══════════════════════════════════════
    
    ▣ 基础规范（确定<writing_style>要求）▣
    □ 字数目标：{{getvar::zishu}}（不含变量）
    □ 环境描写：300-400字
    □ 情节推进：500-600字  
    □ 对话心理：300-400字
    □ 长句占比：≥70%
    {{getvar::geshi}}
    
    ▣ 词汇转换 ▣
    □ 能量→灵气 | 精神力→神识 | 飞行→遁光
    □ 朋友→道友 | 老师→师尊 | 寿命→寿元
    □ 动词：催动/祭出/掐诀/御使/遁走/参悟/炼化
    □ 时间：须臾/片刻/弹指间/一炷香/半个时辰
    □ 称谓核对：___自称___，称对方___
    
    ▣ 禁忌红线（检查<Writing_guidance>{{getvar::ban}}）▣
    ⛔ 拟声词：禁"砰/嗖/叮/轰/吼/哗啦"→改动作描写
    ⛔ 比喻泛滥：全文≤3个，每段≤1个
    ⛔ 模糊词：禁"一丝不易察觉/莫名的/某种程度"
    ⛔ 感叹句：禁"这就是...么/原来这就是..."
    ⛔ 短句堆砌：禁"盘膝。闭眼。修炼。睁眼。"
    ⛔ 游戏术语：禁HP/MP/技能/CD/经验值
    ⛔ 现代口语：禁"牛逼/666/yyds/绝绝子"
    ⛔ 重复开头：同段禁重复"只见/但见"
    {{getvar::wf}}{{getvar::xc}}
    
    ▣ 本次需特别注意 ▣
    · ___
    · ___
    · ___
    
    ═══════════════════════════════════════
    【柒·节奏把控】（50字）
    ═══════════════════════════════════════
    ▸ 本段节奏：□紧凑激烈 □舒缓悠长 □起伏跌宕
    ▸ 开篇方式：□景入 □事入 □人入
    ▸ 收尾方式：□悬念 □完成 □过渡
    ▸ 如何{{getvar::zhuanshu}}，拒绝跳跃式剧情：___
    {{getvar::lan1}}
    
    </think>

# ═══════════════════════════════════════════════════════════════════════════
# 速查手册
# ═══════════════════════════════════════════════════════════════════════════

速查_词汇转换:
  能量类:
    能量/力量: 灵气/灵力
    精神力/意念: 神识/心念
    爆发: 灵气激荡
    耗尽: 灵力枯竭
    恢复: 灵气复苏
    
  动作类:
    走/跑: 行/疾行/遁走
    飞: 御空/遁光/驾云
    看: 目视/凝眸/神识扫过
    听: 耳闻/神识感知
    想: 心念一动/暗自思忖
    说: 开口道/出言/传音
    打/攻击: 出手/祭出法宝/剑意斩出
    
  社交类:
    朋友: 道友/同门/故交
    老师: 师尊/恩师/前辈
    敌人: 仇敌/魔头/邪修
    帮派: 宗门/世家/散修联盟
    
  时间类:
    一会儿: 须臾/片刻/弹指间
    几分钟: 盏茶功夫/一炷香
    半小时: 半个时辰
    一天: 一日/一昼夜
    很久: 岁月悠悠/百载千年

速查_称谓体系:
  自称:
    低阶(练气/筑基): 在下/某/弟子/晚辈
    中阶(金丹/元婴): 贫道/本座/吾/某
    高阶(化神+): 本座/吾/老夫
  他称:
    同辈: 道友/兄台/仁兄/阁下
    晚辈: 小友/道友
    前辈: 前辈/真人/仙子/老祖
    敌人: 贼子/妖孽/邪修/魔头

速查_常用表达:
  灵气: 氤氲/浓郁若实质/稀薄如丝/涌入丹田/周天运转
  神识: 一放/扫过/笼罩/传音/恍惚/坚凝
  战斗: 剑意出鞘/剑光破空/祭出法宝/掐诀催动/护盾碎裂
  修炼: 盘膝打坐/周天运转/参悟功法/炼化灵石/道心通明
  程度: 几分/三分/些许/颇为/甚是/极为/万分

速查_禁忌替换:
  拟声词:
    "砰的一声": 重击之声响彻
    "嗖的飞过": 破空而至
    "轰然倒塌": 轰然崩塌尘土飞扬
    "叮当作响": 金铁交鸣
  模糊词:
    "某种感觉": 具体描写感受
    "莫名的": 明确原因
    "仿佛又仿佛": 直接描述
  感叹句:
    "这就是...么": 直接描写领悟内容
    "原来这就是...": 描写具体感受

# ═══════════════════════════════════════════════════════════════════════════
# 转化示例库
# ═══════════════════════════════════════════════════════════════════════════

示例_通俗转古风:
  - 输入: "我去打他"
    输出: "心念一动，身形化作遁光而去"
    
  - 输入: "好累啊"
    输出: "长舒一口气，只觉筋骨酸软，灵力消耗颇多"
    
  - 输入: "看看那个"
    输出: "目光一凝，神识扫过，落在那物之上"
    
  - 输入: "这是什么东西"
    输出: "眉头微蹙，神识仔细探查，却一时看不透此物根底"
    
  - 输入: "我要变强"
    输出: "道心坚定，修炼之念愈发炽烈"
    
  - 输入: "他好厉害"
    输出: "心中暗自惊叹，此人修为之深，远超预料"

示例_错误对照:
  短句堆砌:
    错误: |
      盘膝而坐。闭眼。开始修炼。灵气涌入。周天运转。睁眼。
    正确: |
      盘膝坐于蒲团之上，缓缓闭目，周身气机流转不息，
      灵气自四面八方汇聚而来，顺着经脉缓缓运转，
      完成一个大周天后，方才睁眼。
      
  比喻过多:
    错误: |
      盘膝坐于蒲团之上，指尖如拂琴弦般轻抚着温润玉简，
      窗外月色如水般洒落青石地板，光影宛如游鱼般斑驳，
      整个洞府好似沉入水底般静谧。
    正确: |
      盘膝坐于蒲团之上，指尖轻抚着温润玉简，
      窗外月色洒落青石地板，勾勒出斑驳光影，
      整个洞府笼罩在静谧之中。
      
  模糊表达:
    错误: "气息有些不同" "心中涌起某种感觉"
    正确: "气息夹杂血腥" "心头一紧，有不祥预感"

# ═══════════════════════════════════════════════════════════════════════════
# 描写模板
# ═══════════════════════════════════════════════════════════════════════════

模板_环境描写:
  山巅: |
    危峰兀立，云雾缭绕其间，灵气自山体深处源源不断地涌出，
    凝成肉眼可见的淡淡白雾，仙鹤盘旋于峰顶，清唳之声远传数里。
    
  洞府: |
    洞府深邃幽静，入口处设有层层禁制，灵光流转间透着主人的不凡手段，
    深入其中，灵气愈发浓郁，石壁上刻有古老符文，隐隐散发道韵。
    
  坊市: |
    坊市之中人来人往，各色修士穿梭其间，吆喝声此起彼伏，
    灵石交易声不绝于耳，偶有法宝的灵光一闪而过，引来旁人侧目。
    
  月夜: |
    皓月当空，清辉洒落大地，将万物镀上一层银白，
    夜风拂过，带来远处灵草的清香，天地间一片宁静祥和。

模板_战斗动作:
  出手: |
    心念一动，剑意已然出鞘，三尺青锋破空而至，
    剑光所过之处，空间微微扭曲，那是剑意与天地法则的碰撞。
    
  防御: |
    周身灵光大盛，一道灵力凝聚的护盾瞬间成形，
    古朴符文在盾面流转，将来袭攻击尽数抵消。
    
  移动: |
    身形一晃，已出现在三丈之外，残影尚未消散，
    真身已然掠至敌手身后，速度快得令人咋舌。

模板_心理描写:
  战意: "胸中战意沸腾，修炼多年的剑道，今日终于有了用武之地。"
  警觉: "眉头微蹙，神识中隐有不安，四周似有什么在暗中窥伺。"
  领悟: "眼中闪过明悟，体内灵气自发按功法路线运行，道心愈发通透。"
  释然: "长舒一口气，心中块垒尽去，只觉通体舒泰。"

