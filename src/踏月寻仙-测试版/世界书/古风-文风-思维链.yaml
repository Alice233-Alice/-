# 使用说明：
# 1. 将本思维链置于系统提示词或世界书中
# 2. AI生成回复前，先在<think>标签内完成思考
# 3. 思考完成后，</think>紧跟正文输出
# 4. 严格遵守各部分字数要求
# 5. {{}}包裹的变量会被酒馆自动替换为实际值