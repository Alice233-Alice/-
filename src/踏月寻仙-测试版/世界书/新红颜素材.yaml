腊月的雪下了整夜，晨起推开窗，院子里积了厚厚一层白，檐角挂着冰凌，在日光下泛着清透的亮。

容锦披了件鹤氅走到廊下，正瞧见院子里那株红梅开得正盛。枝头簇簇的花瓣托着薄雪，红白相衬，煞是好看。她伸手去折近处的一枝，指尖刚触到花枝，便听见身后传来轻快的脚步声。

“姐姐起得倒早。”

容锦回头，见妹妹容绣裹着件猩猩红的斗篷，踩着一双鹿皮小靴踏雪而来。她生得比容锦娇小些，眉眼间带着几分未脱的稚气，此刻鼻尖冻得微微泛红，倒更衬得那张脸白腻得像羊脂玉。

“你这丫头，昨儿夜里踢被子，我起来给你盖了两回。”容锦将那枝梅花折下来，递给妹妹，“喏，拿着。”

容绣接过花枝凑到鼻端嗅了嗅，忽然眨了眨眼，凑近容锦耳边低声道：“姐姐，昨儿个我听见你翻来覆去的，是不是又在想苏郎？”

容锦脸上微微一热，伸手去拧她的嘴：“胡说什么。”

“哪里胡说了。”容绣躲开她的手，笑嘻嘻地说，“苏郎去京城赶考都三个月了，姐姐夜夜独守空闺，能不想么？我瞧着你枕头底下还压着他写的那几封信呢，边角都快翻烂了。”

容锦被她戳中心事，索性也不遮掩了，叹了口气道：“想又有什么用，他若能中个功名回来，也算不负我这一番苦等。”

两人正说着话，忽听得前院传来叩门声。

容绣性子急，提着裙子便跑过去开门。门一开，她整个人便愣住了——门外站着的，正是风尘仆仆的苏衍。他穿了件半旧的青衫，肩上落着雪，眉目间带着长途跋涉后的疲惫，却在看见容绣的那一刻，眼里倏地亮了。

“绣儿。”他唤她的名字，嗓音比从前沉了些，多了几分成年男子的厚重。

容绣愣了一瞬，随即回头大喊：“姐姐！姐姐你快来！”

容锦闻声走过来，看见苏衍的那一刻，手里的帕子无声地落在地上。她想开口说什么，嘴唇动了动，却只吐出两个字：“瘦了。”

苏衍跨进门来，一手握住她，一手握住容绣，将姐妹二人的手拢在自己掌心里。他低头看她们，目光温柔得像春日初融的雪水：“我中了，同进士出身，吏部选了江南道的一个县令缺。这次回来，是接你们一起赴任的。”

容锦眼眶一热，别过脸去不让他看见。容绣却直接扑进苏衍怀里，搂着他的腰好一阵撒娇，嘴里嘟嘟囔囔说着“你怎么才回来”“姐姐想你都想瘦了”之类的话。

苏衍笑着拍了拍容绣的背，又去看容锦。她站在那里，雪光映着她的侧脸，眼眶红红的，却倔强地不肯落泪。

“锦娘。”他唤她的小字，声音低低的，“过来。”

容锦这才转过脸来，眼泪终究没忍住，顺着脸颊滑下来。苏衍伸手替她擦去泪痕，指腹摩挲过她细腻的肌肤，停在她的下颌处，微微抬起那张脸，低头在她额上印了一个吻。

容锦浑身一颤，三个月未曾触碰的人忽然近在咫尺，她闻到他身上混着雪意和风尘的气息，熟悉的、陌生的，勾得她心口发烫。

三人进了正房，丫鬟们知趣地退了下去。苏衍将姐妹二人一左一右揽在怀里，各自吻了吻。容绣的唇软而薄，带着少女特有的甜香；容锦的唇则丰润些，含蓄地微微抿着，却在被他撬开齿关的那一刻，从喉咙深处泄出一声极轻的呻吟。

“想我么？”苏衍放开她们，低声问。

容绣抢着答：“想！绣儿天天想、夜夜想，想得饭都吃不下，你看我是不是也瘦了？”她说着便扯开斗篷的系带，露出里面一截纤细的腰身，拉着苏衍的手让他摸。

苏衍在她腰侧轻轻捏了一把，惹得她咯咯笑起来，又转头去看容锦：“锦娘呢？”

容锦垂着眼，半晌才低声说：“你这人，何必明知故问。”

苏衍便笑了，伸手去解她鹤氅的系带。指尖碰到她颈侧的肌肤时，明显感觉到她微微一僵，却没有躲开。鹤氅滑落在地，露出里面一件湖蓝色的褙子，将她身段的曲线勾勒得恰到好处。容锦生得高挑些，腰细臀圆，胸前鼓鼓囊囊的，撑得衣襟微微开了一道缝，隐约可以窥见里面中衣的领口。

“锦娘比从前更丰腴了些。”苏衍的目光在她胸前停了停，语调里带了几分玩味。

容锦被他看得脸热，抬手去掩衣襟，却被他握住手腕拉进了怀里。

“别掩。”他在她耳边说，气息热热的喷在她耳廓上，“我离家这么久，该让我好好看看。”

容绣在一旁瞧着，心里头又酸又甜。她素来知道姐姐生得美，苏衍自然多看她几眼，但此刻自己倒成了个旁人似的。她不甘寂寞，凑过去扯苏衍的衣袖：“苏郎，我呢？我也比从前好看了么？”

苏衍转过头来看她，眉眼间含着笑：“绣儿更好看，像个画里走出来的娃娃。”

容绣被夸得心花怒放，主动扬起脸来索吻。苏衍便低头含住她的唇瓣，比方才吻容锦时更用力些，舌尖抵开她的齿关，缠着她的小舌好一阵吮吸。容绣被他吻得浑身发软，靠在他肩头嘤咛出声。

苏衍揽着姐妹二人走到了内室的榻边。那榻极宽大，铺着厚厚几层锦褥，是他临行前特意吩咐人置办的。此刻三人跌坐在榻上，锦褥软软地陷下去，像陷进一片温柔的泥沼里。

容锦替苏衍褪了外衫，指尖触到他胸膛时，发现那上头的肌肉比从前更结实了，想来是这几个月赶路劳顿练出来的。容绣也凑上来帮忙，解他腰间的系带时，手心不经意擦过他下身，惹得他闷哼一声。

苏衍握住容绣那只作乱的手，嗓音带了点哑：“急什么。”

容绣吐了吐舌头，缩回手去，转而去解自家衣裳。她动作利索，三两下便脱了上襦，只余一件杏色的抹胸，裹着那对不算丰硕却极为匀称的嫩乳。十七八岁的少女，肌肤嫩得能掐出水来，肩头和锁骨都生得玲珑精致，像一块未经雕琢的美玉。

容锦却慢得多。她背对着苏衍，一件一件地脱，指尖带着细微的颤抖。脱到中衣时，苏衍忽然伸手从背后揽住她的腰，低头吻在她后颈上。那里是她最怕痒的地方，唇舌甫一碰到，她便浑身一颤，缩着脖子低呼了一声。

“别躲。”苏衍按住她的腰，顺着后颈一路吻下去，吻过肩胛骨的起伏，吻过脊背中央那道浅浅的沟壑。他的唇每落下一处，容锦的身子便酥一分，最终软倒在他怀里，任他将自己剥了个干净。

苏衍将她翻过来面对自己，目光落在她胸前那两团丰腻的乳肉上。顶端两颗殷红的乳头微颤着，在微凉的空气里渐渐硬起来。他低头含住一颗，舌尖绕着乳晕打圈，又用牙齿轻轻咬住那颗硬挺的乳头磨了磨。

容锦仰起脖子，从喉咙里逸出一声压抑的呻吟。她伸手去推他的头，力道却轻得几乎感觉不到。

容绣在一旁看得口干舌燥，自己解开抹胸丢在一旁，又将亵裤褪到膝弯。她夹了夹腿，股间已经泛出些许潮意。她从后头抱住苏衍的腰，用自己裸露的身子贴上他的背，柔软的胸脯压在他后背上来回蹭着。

“苏郎，别只疼姐姐。”她在他耳边说，声音软得像掺了蜜。

苏衍从善如流，转过身来搂住容绣。两个女子此刻都是衣衫尽褪，像两朵并蒂的花，一朵艳丽，一朵清秀。他将她们并排放在榻上，自己居高临下地打量着。

容锦侧卧着，一手搭在腰间，长发散在枕上，衬得那张脸越发成熟妩媚。容绣则仰躺着，双腿微微曲起，双手交叠在小腹上，眼巴巴地望着他，目光里盛满了期待。

“你们姐妹俩，先亲近亲近。”苏衍忽然说。

容锦一怔，去看妹妹。容绣也正看向她，两个女子四目相对，脸颊都泛起了红晕。

终究是容绣胆子大些，她翻过身来凑近容锦，低声说：“姐姐别恼我，苏郎让咱们做什么，咱们便做什么。”

容锦抿了抿唇，伸手将妹妹揽进了怀里。两具温热的身体贴在一起，软软的胸脯挤压着彼此的胸脯，都同时颤了颤。容绣将脸埋在姐姐的颈窝里，嗅到她身上淡淡的兰花香，忍不住伸出舌尖在她锁骨上轻轻舔了一下。

容锦倒吸一口气，却听苏衍在一旁说：“别停。”

她便继续了。她捧起妹妹的脸，学着他从前吻自己的方式，吻上妹妹的唇。姐妹俩的唇舌缠在一处，舌尖笨拙地试探着彼此，发出细碎的吮吸声。容绣的手从她腰侧滑下去，在她臀上轻轻揉捏着，指尖偶尔滑入股间那道幽深的沟壑。容锦也不甘示弱，手指捻上妹妹胸前那颗小巧的乳尖，轻轻搓揉着，惹得容绣低低地叫起来。

“姐姐……姐姐轻些……”

苏衍坐在榻边，看着姐妹俩缠绵厮磨，眼底的火越烧越旺。他脱掉剩下的衣物，下身的阳物已经硬挺起来，龟头涨成紫红色，柱身上盘着隐约的青筋。

他起身上榻，从后头贴住容锦。她正侧着身吻妹妹，屁股微微翘起，股间那条粉嫩的肉缝已经湿漉漉的，沾着晶莹的汁液。苏衍扶着自己的阳物，用龟头在她阴唇上来回蹭了几回，沾满了滑腻的爱液，然后腰一挺，整根没入。

容锦浑身剧烈地一颤，叫声被妹妹吞进了嘴里。三个月不曾承欢，甬道紧致得几乎恢复到初次的样子，此刻被他一口气撑开，又胀又酸的感觉让她眼眶都湿了。

“疼么？”苏衍停住动作，俯下身来问她。

容锦摇了摇头，又点了点头，声音含混地从唇间漏出来：“……你动，你动便是。”

苏衍便缓慢地抽送起来。他在她体内进出着，感觉那湿热的肉壁紧紧地裹着自己，每一次抽插都带出细微的水声。他用手掐着她的腰，让她每一次都能更深地吃进自己的阳物。

容绣在一旁看着，见姐姐被苏衍顶得身子一耸一耸的，乳波荡漾，眼神迷离，唇边挂着来不及咽下的银丝。她又湿了几分，忍不住伸手探到自己腿间，手指拨开湿透的阴唇，学着他从前的样子，轻轻揉着那颗突起的小核。

苏衍见她自渎，便伸手将她拉过来，让她躺到容锦身侧，张开了腿。他一面继续在容锦体内抽送，一面用手指插入容绣湿窄的小穴，拇指按在她阴蒂上画着圈。

容绣咬着下唇，细白的双腿微微打颤，手攥紧了身下的锦褥，从鼻子里哼出细细的呻吟。她一边被他的手指逗弄着，一边看着姐姐被他操干得面色酡红、呻吟不止，心跳得快要从喉咙口蹦出来。

苏衍在容锦体内又抽送了数十下，感觉到她的高潮将至。她的内壁开始不规则地收缩，腰肢摇摆得越来越急，嘴里翻来覆去地喊着他的名字。他猛地加快速度，狠狠顶了几下，顶得她浑身痉挛，尖叫着软倒在榻上，蜜液顺着大腿根流下来，洇湿了身下的锦褥。

他从容锦体内退出来，转向早已意乱情迷的容绣。她的穴口已经被他自己的手指玩得红肿潮润，像一朵初绽的花苞。苏衍用龟头对准那条窄缝，一点一点地往里送。容绣虽然已经不是初次，但到底年轻，甬道紧窄得让他几乎寸步难行。

“疼么？”他问。

“有一点点。”容绣诚实地说，又急忙补充，“但绣儿不怕疼的，苏郎你尽管进来，全给我，不用留力气。”

她这番天真又大胆的话让苏衍心里一热，腰上便又用了些力。阳物碾过层层叠叠的嫩肉，终于尽根没入。她里头又烫又紧，紧紧裹着他，像有一千张小嘴在同时吮吸。容绣张着嘴大口大口地喘气，手指掐进他的背肌里，眼角沁出一点泪花。

苏衍俯下身去吻干她的泪，一边吻她的眼睛和脸颊，一边开始缓缓抽送。容绣很快便从胀痛里尝出了快意，腿勾上他的腰，小屁股迎合着他的动作一摇一摆，嘴里咿咿呀呀地叫着，声音又软又娇，听得一旁的容锦都忍不住笑了。

苏衍见她笑了，便伸手将她也揽过来，手掌在她仍旧湿淋淋的腿间抚摸着，手指伸进去轻轻抽插。阳物插着妹妹，手指插着姐姐，他来回看着两张相似又不相似的脸，两张脸上都染着同样的情欲色。

容绣先到了。她本来就是强撑着，被苏衍一下深过一下地顶，身子绷得像一张弓，脚趾蜷起来，从喉咙深处发出一声长长的呜咽。她穴里猛烈地收缩着，一股热流浇在他的龟头上，烫得他闷哼一声。

苏衍从她体内抽出来时，容绣已经昏昏沉沉地半闭上了眼。

他再度转向容锦，将她翻过来趴在榻上，从身后重新插进去。这个姿势插得极深，容锦承受不住，撑着褥子的双臂直发抖，口中溢出的呻吟带着哭腔。苏衍伸手去摸她胸前乱晃的乳，揉捏着那团软肉，下身猛烈地抽插着。

终于他也到了极限。他猛地拔出阳物，白浊的精液射在容锦的后腰上和她身下的锦褥上，一股一股的，热热的，沾得她白皙的肌肤上星星点点。

三人都没了力气，瘫在凌乱的锦褥上喘着气。

半晌，容绣先缓过劲来，蹭到苏衍怀里，把脸贴在他汗湿的胸膛上。容锦也翻过身来，枕着他的手臂，合上了眼。

窗外雪又落了，沙沙地打在窗纸上，像极细的蚕在啃桑叶。屋里暖烘烘的炭火烧得正旺，将一室的靡靡气息都捂在了里头。

容锦忽然轻声说：“往后去了江南，便是正经的官夫人了。”

“是。”苏衍应她。

“那你要正经些，不能再这样胡闹。”

苏衍笑了一声，低头在她眉心吻了吻：“在你面前，我几时正经过。”






苏衍听她这么说，低低笑了一声，把脸埋进她的颈窝里。

容锦感觉到他温热的鼻息喷在锁骨上，痒得很。她伸手推他的额头，没推动。

“多大的人了，还这样撒娇。”她的语气是嗔怪的，手上的力道却软了下来，反倒是搭在了他的后脑勺上，指腹不自觉地拨弄着他鬓边几缕汗湿的碎发。

苏衍不说话，只是把她搂得更紧了些。他的手臂箍在她腰间，箍得很紧，像要把她整个人揉进自己身体里似的。他的脸在她脖颈间蹭了蹭，鼻尖蹭过她颈侧那一小片极敏感的肌肤，蹭得她浑身都软了。

容锦叹了口气，不再推他。

她就吃他这一套。从十六岁嫁给他到现在，她一直吃他这一套。旁人在场的时候，他是稳重踏实的苏举人、苏知县，说起话来一板一眼，做起事来一板一眼，谁见了都要赞一句少年老成。可一旦只剩他们两个人，他就像忽然小了十岁似的，往她怀里钻，往她身上赖，说些没脸没皮的话，做些没羞没臊的事。

她有时候拿他没办法。

偏偏她又舍不得不理他。他这样撒娇的时候，她总觉得心口那一块软得不像话，像刚出锅的糖糕，又甜又烫，一戳就化了。

“锦娘。”苏衍闷闷地喊了一声，嘴唇贴着她的锁骨，说话时的震动传进她骨头缝里。

“嗯。”

“你在家等我这几个月，辛苦了。”

容锦的手顿了顿。她垂下眼，盯着他头顶的发旋，好一会儿才轻声说：“你平安回来就好了。”

苏衍抬起头来看她。他一只手撑在褥子上，另一只手仍揽着她的腰，目光从她眉心滑到鼻梁，从鼻梁滑到嘴唇，最后停在她眼里。他凑过去，在她唇上落了一个极轻的吻，轻得像蜻蜓点水。

然后他又把脸埋回她颈窝里了。

“以后去了江南，咱们就再不分开。”他闷声说，“我在衙门里办差，你在后衙管着家。等我散了衙，你就在廊下等我。我叫人搬一把藤椅放廊下，上头铺你最喜欢的那条湖蓝色褥子，让你坐着等我。”

容锦听他说得认真，嘴角不自觉地勾了起来。

“绣儿呢？”她问。

“绣儿就坐在你旁边的矮凳上，手里捧着个话本子看，时不时抬头往门口瞄一眼，看姐夫回来没有。”苏衍说着说着自己也笑了，“她要是等得不耐烦了，就跑到衙门口去等，让全县的百姓都看见，县太爷的小姨子是个多没规矩的丫头。”

容绣本来已经迷迷糊糊快睡着了，听见姐夫编排她，猛地睁开眼，从苏衍背后探出半张脸来，朝他肩膀上不轻不重地咬了一口。

“你才没规矩。”她嘟囔着，又缩回去，把脸贴在苏衍的背上，凉凉的脸颊贴着他热热的脊背，舒服得叹了口气。

容锦伸手越过苏衍，在妹妹脸上轻轻捏了一把。

“听见没有，”她对苏衍说，“绣儿不高兴了。”

“那我明天去街上买两串糖葫芦赔罪。”苏衍笑着说，转过脸去看身后的容绣，“两串够不够？”

“三串。”容绣闷声说。

“行，三串。”

容锦看着他们两个一来一往的，笑出了声。她这一笑，方才那些离愁别绪、相思之苦，都随着笑声散在了暖融融的炭火气里。

苏衍见她笑了，心里更是欢喜。他把姐妹俩都拢进怀里，容锦在左，容绣在右，三个人挤在同一张大榻上，盖着同一条锦被。被面上绣着鸳鸯戏水的花样，是他们成亲时置办的，洗了这么多年，颜色都有些旧了，却依然厚实暖和。

“锦娘。”苏衍又叫了她一声。

“又怎么了？”容锦闭着眼，懒懒地应他。

“你会不会嫌我，”他斟酌了一下措辞，声音低下去，“嫌我在你面前太没正形了？”

容锦睁开一只眼看他。她看见他半垂着眼睑，睫毛在烛光下投出一小片阴影，神情里带着几分难得的不确定。

她心里忽然酸了一下。

这个男人在外头，在所有人面前，都是挺直了腰杆撑着，撑出一个有担当、有分寸、有章法的好模样。那些求他办事的人、辖下的衙役书吏、同僚上司、甚至容绣，都觉得苏衍是个靠得住的人。只有在她面前，他才会露出这副样子——患得患失、黏黏糊糊、像个怕被丢下的孩子。

她从没有嫌过他。

她只是心疼。心疼他在外头撑了那么久，回来才能卸下那些壳子。

但她说不出口。她嘴笨，从来都说不出口。

所以她只是把手臂收紧了些，让他的脸贴在自己胸口上，让他能听见自己的心跳。

“睡吧。”她轻声说，“明天还要收拾行李呢。”

苏衍没再说话。他闭着眼睛，听着容锦的心跳声，一下一下，稳当又踏实。

容绣从背后伸过手来，小手摸索着找到他的手掌，把自己的手指塞进他指缝里，十指相扣。

窗外的雪还在落，炭盆里的炭偶尔爆出一声脆响。三个人挤在榻上，呼吸渐渐均匀了。

容锦在将睡未睡的边缘，感觉到苏衍的嘴唇动了动，贴着她锁骨下方的肌肤，含混地说了一句话。

她没听清，但不知为什么，她觉得那句话是——

“锦娘，在你面前，我才是我。”






第二日天还没亮透，容锦便醒了。

她睁开眼的时候，炭盆里的火已经灭了，只剩下一层灰白的余烬。窗外雪停了，檐角挂着的水滴正在一滴滴往下落，偶尔砸在窗棂上，发出清脆的声响，像是春天已经在赶来的路上了。

她侧过头，看见苏衍还睡着。他的睫毛很长，阖着眼的时候，投下一小片扇形的阴影落在颧骨上，看起来比醒着的时候安静许多，也孩子气许多。她盯着他看了好一会儿，看到身边的容绣也醒了，正揉着眼睛从被窝里探出半张脸来。

“姐姐。”容绣的声音还带着睡意，软绵绵的，像没化开的饴糖。

“嘘。”容锦竖起食指压在唇上，朝苏衍努了努下巴，示意让她别吵醒他。

容绣点了点头，轻手轻脚地从被窝里爬起来。她穿亵衣的动作小心翼翼的，布料蹭动被褥的窸窣声都压到了最低。等终于下了地，她才踮着脚尖走到容锦身边，凑到她耳边悄声说：“我去让厨房烧热水，今儿要赶路，得让大家都洗把热水脸。”

容锦点了点头，容绣便像一只偷了灯油的小老鼠似的，悄没声息地溜出了内室。

等苏衍醒的时候，院子里已经忙开了。

丫鬟们正把昨儿晚上收拾好的箱笼往外搬，容锦站在廊下，手里拿着本册子，一桩一桩地核对，时不时抬头吩咐几句。她今日换了件藕荷色的交领褙子，外面罩着素面的大氅，头发挽了个利落的髻，只用一根银簪子别着，看起来干练利落，和昨夜软在他怀里喘息的女人判若两人。

苏衍靠在门框上看她，嘴角不自觉地翘起来。

“大人的洗脸水端进去了。”容锦瞥了他一眼，语气不冷不热的，“还在这站着干什么，想误了时辰？”

“这就去。”苏衍老老实实地转身进了屋。

容绣正端着一托盘点心从厨房里出来，恰好看见这一幕，噗嗤一声笑出来。她快步走到廊下，把点心举到容锦面前：“姐，你看姐夫多怕你，你说一句他连个屁都不敢放。”

“他几时怕过我。”容锦收了册子，从托盘上拈了块桂花糕咬了一口，“他就是装的，在外头人五人六的，回来就这副德行。”

“那不正说明姐夫稀罕你么。”容绣笑嘻嘻地说，“在外头对谁都端着，只有在你跟前才敢原形毕露。”

容锦没接话，但吃糕点的速度慢了下来。她垂下眼，嘴唇碰到指尖那块松软的桂花糕，甜丝丝的味道化在舌尖上。她知道妹妹说的是实话。苏衍那个人，对旁人都和和气气的，但总隔着一层谁也看不清的东西。唯独在她面前，他什么都藏不住，高兴了笑得像个傻子，委屈了就把脸埋在她怀里赖着不走，生气了便绷着脸一言不发，等着她去哄。

她见过他在外头的样子——脊背永远挺得笔直，说话有分寸有章法，笑也是点到即止的笑。那种苏衍让人放心，让人敬重，但也让人心疼。所以每次他回到她面前卸下那层壳子，露出里头那个会撒娇会耍赖的苏衍来，她嘴上说他没正形，心里却总是欢喜的。

就好像他所向披靡，却只在她面前喊累。

一路上风雪渐收，越往南走，天气越暖。从腊月出发，抵达江南地面时，已经是正月初七了。官道两旁的积雪化得差不多了，偶尔能看见田埂上新冒出的草芽，嫩绿嫩绿的，让看惯了皑皑白雪的眼睛忽然觉得很舒服。

马车在官道上颠簸了十来天，苏衍骑着马走在车旁，时不时弯下腰来跟车里的姐妹俩说几句话。容锦掀着帘子往外看，看见远处的山是青的，水是绿的，连空气里都带着一股湿润润的草木香。她深深吸了一口气，觉得浑身上下的筋骨都松快了些。

“锦绣，你快看。”她指着远处一片水田，“那不是鹭鸶么？”

容绣扒着窗框往外看，果然看见几只白鹭正站在浅浅的水田里，不紧不慢地踱着步子。她高兴得在坐榻上蹦了起来，震得车帘哗啦啦地响。

“苏郎苏郎！”她朝外头喊，“我看见鹭鸶了！雪白雪白的，腿又细又长，和画上的一模一样！”

苏衍策马靠到窗边来，朝她指的方向看了一眼，笑着说：“等安顿下来，我带你们去城外的太湖边上看，那边的鹭鸶更多，还有白鹤。”

“当真？”容绣的眼睛亮晶晶的。

“我几时骗过你？”

容绣满意了，缩回车厢里，拉着容锦的袖子一个劲儿地说江南的好。说这边的水清得像绸子，说这边的姑娘说话软得像唱歌，说这边的桂花糕比北边的甜十倍，虽然她还没吃着，但她听赶车的车夫说的，总不会错。容锦听着妹妹絮絮叨叨的，嘴角的笑意一直没下去过。

到了县城，苏衍先去县衙报到。容锦则带着容绣去了后衙的宅子。

宅子不大，比起他们老家的祖宅来小了不少，但胜在规矩齐整。前后两进，前院有口水井，井边种着两棵香樟树，树干粗得要两个人合抱。后院是住人的地方，正中间是堂屋，左右各有一间厢房，院子角落里还有一小块花圃，荒了一个冬天，泥地里已经冒出些不知名的野草来。

容绣站在院子里转了个圈，觉得这地方虽然小，却处处透着一种说不出的秀气。廊柱上雕的花纹和老家的不一样，不是北方的祥云瑞兽，而是缠枝莲和葡萄，细巧得很。墙是白的，瓦是青的，衬着冬日里依然翠绿的香樟树，看起来像一幅淡墨山水画。

“姐姐，咱们往后就住这儿了？”她问。

“嗯。”容锦站在院中央，打量着屋舍。她已经在心里盘算开了——正堂得添一张条案，条案上头摆个花瓶，插几枝时令的花。厢房里的床褥要换新的，南边的冬天虽然不冷，但潮气重，得多备几床厚褥子。厨房在西南角，灶台是新的，烟囱通得也顺，回头得让丫鬟烧几锅热水，把锅碗瓢盆都烫一遍。

“还有，”她忽然转过身来看容绣，“你得收收性子了。往后咱们是县令家的女眷，街坊邻居都看着，你不能再像在老家那样满街乱跑，也不许动不动就往衙门口凑。县太爷的小姨子要有小姨子的样子，听见没有？”

容绣瘪了瘪嘴，委委屈屈地“哦”了一声。但她委屈了没多一会儿，又开始叽叽喳喳地议论起厢房的分配来。

苏衍散了衙回来的时候，天色已经擦黑了。

他刚踏进后宅的院门，就闻到了一股饭菜的香气。厨房里亮着灯，暖黄的灯光从窗户格子里透出来，映在院子的青石板地面上，像一个温柔的邀请。

容锦正在厨房里忙活，袖子挽到手肘，露出两截藕白的手臂。她面前的菜案上摆着条鲫鱼，刚刮了鳞掏了内脏，鱼嘴还在一张一合的。她没想到南边的灶台这么难使，火候忽大忽小的，煎个鱼煎得她额头上全是汗。

容绣在旁边帮忙择菜，把那些老的黄的叶子一片片摘下来丢进脚边的竹篮子里，嘴里哼着一首不知道从哪里学来的江南小调，调子软得不像话，拐着弯儿往上飘。

苏衍走进厨房的时候，两个人都没发现他。他站在门口，看着容锦绷着脸对付那条鲫鱼，看着容绣晃着脑袋哼歌，忽然觉得脚底下那些赶路的疲惫，身上的风尘，衙门里的人情世故和弯弯绕绕，都在这油烟和饭香里一点一点地化了。

他清了清嗓子。

容锦一抬头，看见他靠在门框上，手里还提着一个油纸包。

“你走路怎么没声的。”她擦了擦额头的汗，语气不满里带着卸下紧绷后的放松。

苏衍走进来，把油纸包放在灶台上打开，露出里头两串红亮亮的糖葫芦，还冒着微微的甜香。他没说话，朝容锦摊了摊手，脸上带着点邀功的意思。

容锦低头看了那糖葫芦一眼，嘴唇动了动，绷了半天的表情终于破开了一道缝。她偏过头去，用肩膀撞了他一下，然后拿起一串糖葫芦，咬下一个糖裹的山楂。

“还行，”她说，“不太酸。”

容绣闻声转过头来，看见糖葫芦，哇地叫了一声，扑过来一把抓起另一串。她咬下一颗，腮帮子鼓鼓的，含糊不清地说：“苏郎你真的买了！”

“说好的三串。今晚先拿两串，剩下一串明天给你。”苏衍伸手在她鼻尖上刮了一下。

容锦看着他们两个，低头又咬了一颗山楂。糖衣在嘴里碎开，甜丝丝的，酸味跟在甜味后面慢慢泛上来，又甜又酸的汁水在舌尖上打转。

她把鱼下进锅里，油花噼里啪啦地响起来。

院子里的锅碗瓢盆声、油煎鱼声、姐妹俩的说笑声和糖葫芦的酸甜味搅在一起，在这个南方的县城后衙里，生出了第一缕叫做“家”的炊烟。




江南的初春来得早，才刚过了正月十五，县衙后宅那两棵香樟树就抽了新芽，绿得嫩生生的，在微风里轻轻晃着。容绣蹲在井边洗菜，袖子挽到胳膊肘上头，露出一截白嫩嫩的小臂。她一边洗一边朝屋里喊：“姐，你倒是快些，苏郎说他今儿散了衙要带咱们去太湖边上看白鹤，你忘了？”

容锦在屋里应了一声，手上却没停。她正把苏衍昨儿换下来的官服叠好放进衣箱里，叠到一半，手指碰到袖口上一处磨得起毛的地方，停了一下。她抬头看了看窗外，香樟树的影子投在窗纸上，像一幅晃动的墨画。她忽然就想起头一回见到苏衍的样子来。

那是八年前的事了。容锦十二岁，苏衍十四岁。

容家是北地一个小县城里的殷实人家，家中开着两间布庄，虽不算大富大贵，倒也吃穿不愁。容老爷膝下只有两个女儿，长女容锦，次女容绣。容绣那时还是个扎着两个羊角辫的小丫头片子，整天拖着鼻涕跟在姐姐屁股后头转。苏衍是邻县苏家的独子，他爹和容老爷是年轻时赶考认识的，两人虽都没考上什么功名，倒是结下了交情。那年苏家遭了一场官司，家里的田产被占去大半，苏老爷一气之下病倒了，临死前写了封信给容老爷，托他照看年幼的苏衍。

容老爷接了信，当夜就套了马车赶去邻县，把十四岁的苏衍接了回来。

容锦记得很清楚，那是个腊月初八的傍晚，天下着大雪，她正帮着厨娘在灶房里熬腊八粥，米香和红枣的甜味在热气里搅成一团。容绣抱着她的腿，踮着脚尖往锅里看，口水都快滴下来了。容老爷忽然掀了灶房的棉帘子，带着一股冷风进来，身后跟着一个半大的少年。

那少年穿着一件洗得发白的棉袍，肩头和袖口沾着雪，已经半化了，洇出一片深色的水渍。他生得眉清目秀的，嘴唇冻得微微发青，站在那里脊背倒是挺得笔直，一双眼睛望向容锦的时候，既不躲闪也不唐突，只是安静地看她，像一只不小心闯入陌生院子的小兽，明明浑身都在发抖，却还要装出镇定的模样。

“丫头，这是苏家的小子，往后就住在咱们家了。”容老爷拍了拍苏衍的背，朝他努努下巴，“这是我家大丫头，叫容锦。那个小的是她妹妹，容绣。”

苏衍朝容锦点了点头，开口说了一句：“叨扰了。”

他声音不大，嗓子哑哑的，像是很久没喝水了。容锦注意到他右手一直攥着衣角，指节都捏白了。她没说话，转身从灶台上盛了一碗刚熬好的腊八粥，搁在桌边，推到他面前。苏衍看了她一眼，坐下来，一勺一勺地吃。他吃得很慢，很安静，碗里的粥见底的时候，他眼圈微微有些泛红，但他没让那点红变成别的东西。

容锦就是那个瞬间记住了他的。

后来苏衍就住在了容家。他读书极用功，人也勤快。容老爷原先只打算供他念两年书，识些字，将来好去布庄做个账房。可苏衍太能读了，白天帮着布庄搬货记账，晚上就着油灯背书，一本《论语》翻烂了书角，用米汤粘好了又接着翻。容老爷看得心里又疼又喜，干脆咬了咬牙，给他请了个正经的先生。

容锦和容绣那时候也跟着先生认字，三个人挤在同一张书案上，苏衍坐中间，容锦坐左边，容绣坐右边。先生在上面摇头晃脑地讲《诗经》，容绣在下面偷偷折纸鹤，一只接一只地折，折好了就悄悄推到苏衍面前。苏衍不动声色地收起来，塞进袖口里。容锦只当没看见，低了头继续写字，心里却想，这丫头怎么从来不给姐姐折纸鹤呢。

有一回容锦在布庄里帮着盘账，算了一天算得头昏脑涨，眼看着有一笔数目怎么都对不上。她急得把算盘拨了又拨，珠子噼里啪啦地响，账本上的字都快被她看花了。苏衍从外头回来，见她的样子，悄悄走到她身后，弯下腰，把下巴搁在她肩膀上，和她一起看那本账簿。她被他突如其来的靠近吓了一跳，肩头一缩，脖子根微微泛了红。苏衍伸出手去，手指按在账簿上的某一处，说：“这儿的账记错了，多算了五钱银子。”

他的气息贴着她的耳朵掠过，带着外头冷风和读书人的墨香。容锦心不在焉地点了点头，手上的算盘珠拨得乱七八糟。苏衍大概是看出来了，直起腰要走，走了两步，又回头看她一眼，嘴角翘着一点点，似笑非笑。

“锦娘，”他说，“你耳朵红了。”

容锦差点把算盘砸到他脸上。

容绣从小就爱黏着苏衍，比黏容锦还厉害。苏衍在书房念书的时候，她就搬个小凳子坐在门槛上等着，手里拿着个绣绷子装模作样地绣花，实际上十针里有八针是绣歪的。苏衍念完书出来，她就蹦起来跟在他后头，一路从书房跟到灶房，从灶房跟到院子，嘴里不停地说着今天街上看到的花猫、隔壁王大娘家新蒸的馒头、先生讲课时打了几个哈欠。苏衍总是耐心地听着，时不时回她几句，偶尔伸手把她辫子上沾的草屑摘掉。

有一回容锦生病发了热，躺在床上烧得迷迷糊糊的。苏衍在镇上给人抄了一整夜的书，赚了三百文润笔费，天没亮就去药铺抓了药回来。他蹲在廊下熬药，扇子摇得飞快，火苗舔着药罐子底，浓黑的药汁咕嘟咕嘟地冒着泡。他的眼睛被烟熏得通红，人打了个哈欠又赶紧忍住，怕把瞌睡虫招出来耽误了药。等药熬好了端进去，容锦烧得嘴唇都起皮了，皱着眉头不愿喝。苏衍也不催她，只是在床边坐下来，一只手托着她的后颈把她扶起来，另一只手端着药碗，自己先抿了一小口，烫得直吸凉气，还要说：“不苦，真的不苦，不信你尝尝。”

容锦被他逗笑了，一笑就咳起来，咳得他连忙去拍她的背。最后还是捏着鼻子把药灌下去了，灌完才觉得上当——苦得要命。她想骂他，可看他那双被烟熏得通红的眼睛，话到嘴边又咽了回去，只别过脸去说了句：“你以后别熬那么久的烟。”

苏衍没应她，只是把她额头上搭的湿帕子取下来，重新在冷水里浸了浸，拧干了再搭上去。他的手很凉，碰到她额头的时候，她微微缩了一下。

容绣有一次问苏衍：“苏郎，你为什么对姐姐那么好啊？”

苏衍正在廊下削一根竹笛，刀刃沿着竹管细细地刮，刮下一层薄薄的竹皮来。他头也没抬，只说了四个字：“她值得的。”

容绣听了，歪着脑袋想了想，忽然很认真地说：“那我呢？我值不值得？”

苏衍这才抬起头来，看着面前这个比自己矮了大半个头的小丫头。她仰着脸，眼睛里亮晶晶的，有几分纯然的好奇，也有几分莽撞的期待。他伸手在她头顶拍了拍，把一朵不知什么时候落在她发间的槐花拈下来，搁在她掌心里。

“你也值得，”他说，“你和你姐姐，都值得。”

容绣把那朵槐花攥在手心里，攥得很紧，花香被掌心的温度一烤，幽幽地散开来。

从那天起，容绣心里就认准了——她也要苏衍。

后来容老爷病重，把苏衍叫到床前。老人家的手指了指守在床边的容锦，又指了指站在门边的容绣，气若游丝地对苏衍说了几个字：“你娶锦儿，也要照顾绣儿。姊妹俩，我一并托给你了。”

苏衍跪在床前，端端正正地磕了三个头。

容老爷走的那年冬天，雪下得格外大。容锦披麻戴孝跪在灵前，一天一夜没吃没喝，嘴唇冻得乌青，容绣在她旁边缩成一团，小声地哭着，鼻涕眼泪糊了一脸。苏衍替她们挡了所有的应酬和来吊唁的亲戚，等丧事办完，他瘦了一大圈，颧骨都凸出来了。他把那本记得密密麻麻的丧事开销账本合上，对容锦说：“咱们去江南。我考中了功名，咱们就离开这儿，重新开始。”

容锦看着他眼眶下面那一圈乌青和嘴角因为上火起的燎泡，没说话，只是把账本从他手里抽出来，翻了翻里头他连买一根孝带都一笔笔记下来的字迹，点了点头。

她什么都听他的。

抵达江南县城的第十天，苏衍终于得了一天休沐。他一早起来换了身便服，把容绣最心仪的那串糖葫芦和容锦爱吃的桂花糕都装进了食盒里，带着姐妹俩去了太湖。

太湖边的芦苇还枯着，枯黄枯黄的杆子在风里摇来摇去，水边的柳树却已经开始泛青了，垂下来的柳丝上缀着小米粒似的嫩芽。远处的水面宽阔得看不到边，天水相接的地方有一层薄薄的雾，把远山的轮廓都柔化了，像隔着一层纱看美人。

容绣撒腿就往湖边跑，一边跑一边喊：“白鹤在哪儿呢？苏郎你说有白鹤的！”

苏衍指着远处一片浅滩说：“那边，看见没有？那些白色的，站着不动的。”

容绣眯着眼睛看了半天，终于看见了，兴奋得跳起来，拉着容锦的手直晃：“姐！姐！是真的白鹤！活的！”

容锦被她晃得头晕，笑着拍开她的手。她转过头去看苏衍。苏衍正站在柳树下，看着她，嘴角有笑意。春寒料峭的风从湖面上吹过来，吹得他的衣袍猎猎作响。他伸手把她耳边被风吹乱的碎发别到耳后，手指顺势从她耳垂上滑过，指尖带着微微的凉意。然后他弯腰在她耳边低声说了一句：“这里往后，就是咱们的家了。”

容锦没说话。她看了一眼湖边正蹲着看白鹤的容绣，又看了一眼身旁这个从十四岁起就一直陪在她身边的男人。柳树、白鹤、远山、碧水，还有这湿润润的江南风，一切都像是画里的东西。可是他的手是实在的，他说话时的气息是实在的，他袖口上那处磨起毛的地方也是实在的。

她伸手理了理苏衍的衣襟，把那处磨毛的袖口翻进去，掖好。

“走吧，”她说，“带绣儿去看白鹤。”