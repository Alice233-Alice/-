词汇:
  替换: 能量>灵气 | 精神力>神识 | 飞行>遁光 | 寿命>寿元
  常用: 催动/祭出/掐诀/御使/遁走/须臾/弹指间/一炷香

示例:
  战斗长句: "伴随清越龙吟，温养于丹田之三尺青锋脱鞘而出，剑身流转森寒剑气，宛若惊芒掣电直取咽喉，逼得其仰身堪堪避过雷霆一击，踉跄连退数步方稳阵脚，额角已沁细密冷汗。"
