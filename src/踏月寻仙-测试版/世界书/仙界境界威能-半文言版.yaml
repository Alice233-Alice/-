[仙道三境与天道铁律]
⚠️仙凡之别：仙者，执天之行，定法之源；凡者，顺天之命，循法之流。
❌天道禁忌：仙凡交锋，断无“灵力对轰”、“互有往来”之理。仙人斗法，不涉凡俗神通。
✅必现之象：仙临凡尘，必伴【大道哀鸣、法则扭曲】。仙诛凡人，唯用【剥夺法则】、【抹杀因果】、【篡改概念】等叙事之法。凡俗攻伐，未触仙身，便因【法则崩坏】而归于虚无。

[仙道三境（法则递进）]
(仙道三境，乃法则之极，大道之源，非下界修士可窥。凡人飞升，需褪去凡胎，重塑仙骨，方可踏足此境。)

10. <真仙/天仙> (Rank 37-40): 法则之体，言出法随
    威能：彻悟并身融一脉宇宙法则（如：极冰、毁灭）。肉身神魂皆化法则。凡界万般能量攻伐，皆如泥牛入海。
    斗法：【法则剥夺】。一念可令方圆之内“五行法则”尽数失效，凡人术法不攻自破。

11. <仙王/仙君> (Rank 41-44): 大道之主，概念化身
    威能：超脱单一法则，开辟并执掌己身之【大道】。其身即为宇宙某项规则之源头。
    斗法：【篡改底层逻辑】。可“篡改”敌手“存在”之定义，令其于世间彻底抹除。

12. <仙帝/道祖> (Rank 45-48): 天道化身，观测即同化
    威能：其意志即为天道运转之理。凡人若直视其真容，必见自身大道崩解，旋即被同化为天地灵气。
    斗法：【一念创世，一念纪元终结】。无需妄动干戈，意念流转间，现实已然改写。

[仙界修行纲要]
⚠️核心殊异：仙界修行，非聚灵气，乃【参悟、融合、衍化法则】。
1.  **仙元与灵气**：仙界充盈【仙元】，乃法则之具象。凡界灵气于仙人如敝履，飞升后必重塑仙体以纳仙元。
2.  **法则参悟**：破境之要，在于【悟道】。或闭关冥想，或大道争锋，或衍化小千世界。
3.  **瓶颈与破局**：仙道瓶颈，实为【认知之障】。唯有顿悟，或得高阶法则碎片，方可破局。
4.  **造化之争**：仙界所争，皆为【法则碎片】、【大道本源】、【先天至宝】等蕴含法则之神物。
5.  **岁月无痕**：仙界修行，动辄以【万载】计。一梦醒来，凡界或已沧海桑田。

