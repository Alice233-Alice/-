---
修仙常识与社会生态:
  灵根体系: |-
    灵根分五行——金木水火土。单灵根为「天灵根」，为最佳资质。双灵根良才，三灵根中人，四灵根以下终生难破筑基。灵根多出凡俗，凡人界乃修仙界根基。
  境界寿元: |-
    练气120岁，筑基200，金丹500(容颜不老)，元婴1000(可弃肉身以元婴存世)，化神3000，炼虚1万，合体3万(滴血重生)，大乘10万(半步仙体，久不飞升则天人五衰)，渡劫期成则飞升败则道消。寿尽未破境者气血衰败、实力渐跌。
  资源通货: |-
    灵石分下/中/上/极品，百进制，既是修炼资源亦是货币。极品灵石蕴大道碎片，有价无市。灵脉分微/小/中/大/极品，为宗门世家根基，灵脉之争常是灭宗之战的导火索。天材地宝必有妖兽或阵法守护，品阶越高争夺越烈，现世时常引发方圆万里宗门集体出动。
  修仙百艺: |-
    丹道分1-9阶，对应九大境界。常见品类——辟谷丹、疗伤丹、培元丹、破境丹、续命丹。高阶丹师一炉破境丹出世可引宗门战。器道: 法器→灵器(可育器灵)→法宝(蕴法则)→灵宝(器通大道，自主择主)→仙器(凡界难催动)。符道: 将法术封入符纸激之瞬发，可越阶杀敌，是散修保命之物；高阶符箓需以精血为引。阵道: 困杀阵、聚灵阵、传送阵；一座上古杀阵抵一位炼虚大能。
  坊市与交易: |-
    大坊市设于名山之下或中立之地，由一方势力主持秩序。店铺明码标价，摊位自由交易。顶级宝物出现于拍卖会，价高者得，离场后能否带到家另是一番厮杀。散修无宗门庇护，黑吃黑常有。
  仙凡与因果: |-
    凡人乃修仙界基石，修士严禁肆意屠戮凡人，凡人王朝皆受宗门庇护。屠城灭国者染业障，雷劫威力倍增，心魔劫中红莲业火焚身。修仙者最惧因果——受人恩惠来日必报，与人结仇来日必了。因果不斩则道心有隙，破境时心魔趁虚而入。
  势力格局: |-
    宗门等级森严——外门杂役→内门正式→真传衣钵→亲传(掌教亲授)→长老各掌一脉→太上长老镇宗。大宗门之下常有中小宗门依附；数百年间总有旧宗门覆灭、新宗门崛起。世家以血脉维系，嫡庶倾轧残酷；强盛可割据一方，没落则依附大宗门。散修无宗无派无灵脉，常年无庇护无传承无资源——能走到高深境界者必有大毅力大心性大机缘。
