---
变量更新规则:
  全局:
    只读字段:
      check:
        - 禁止更新：/本尊/突破阈值、/本尊/寿元上限、/本尊/境界描述、/本尊/寿元状态、/本尊/状态、/本尊/进度、/红颜/*/突破阈值、/红颜/*/寿元上限、/红颜/*/境界描述、/红颜/*/寿元状态、/红颜/*/状态、/红颜/*/进度、/_系统设置/修炼系统版本、/成就系统/进度追踪
    库存漏更检查:
      check:
        - 输出 JSONPatch 前，必须回看本轮正文与 Analysis：凡出现 明确获得、买下、拾取、搜出、摘取、收起、带走、收入储物 的具体物品，都必须逐一判断是否入库
        - 若该物品已归本尊持有，且未当场消耗、交出、损毁、遗失、仍属他人，则 JSONPatch 必须包含对应 /本尊/背包、/本尊/法宝 或 /本尊/杂物袋 路径；否则视为漏更，必须重写
    Analysis联动:
      check:
        - 只能复述 JSONPatch 可直接证明的变化
        - 修炼相关只允许写 修为±N、阶段变化、突破成功或失败、等级±1；未更新等级时禁止写 练气/筑基/金丹等境界名 + 初期/中期/后期/大圆满
        - Analysis 提及 好感、关系、任务 变化时，JSONPatch 必须有对应路径
        - Analysis 提及 获得、买下、拾取、收起、消耗、交出、丢失、毁坏 物品或灵石变化时，JSONPatch 必须有对应 /本尊/背包、/本尊/法宝、/本尊/杂物袋 或 /本尊/灵石 路径

  世界:
    世界时钟:
      check: [事件推进时更新]
    世界地图:
      check:
        - 探索、开图、区域信息显著变化时更新；仅补当前区域或本轮明确触及的地点，避免整张地图大范围重写
        - danger 表示地区客观危险度，范围 0~100；平静城镇/宗门通常 0~25，普通野外 20~45，秘境/凶地 40~70，禁地/绝地 70~100
    世界图志:
      check: [世界事件推进时更新]
    当前处境:
      check:
        - 只要本轮发生玩家行动，下一轮必须 replace
        - 仅一句话概括当前结果态，不复读上一轮原句
    可参与机遇:
      type: Array<{名称,来源,类型,描述,回报预期,风险评估,时限?,优先级}>
      check:
        - 每轮 2~5 项，且必须匹配当前场景
        - 本轮发生玩家行动后，下一轮必须整组 replace /当前处境 与 /可参与机遇；禁止沿用旧列表或换皮复读
        - 宁可整组 replace 为 1 项甚至 []，也绝不能只改其中 1 项后把其余旧项留在数组里
        - 玩家输入若与上一轮某项语义接近，视为已选择；该项及其并列旧项本轮都不得原样或近义保留
        - 默认整组换新；仅主线钩子、倒计时事件、突破准备可保留 1 项延续项，且必须体现进度、余波或新阻碍
        - 名称尽量具体到人、地、物、事；本尊处于瓶颈、突破、压境或临近阈值时，至少 1 项必须为突破相关
        - 亲密、双修、情欲场景必须包含红颜类选项；安全日常风险可写“无”
        - /可参与机遇 只能整组 replace，禁止按下标增删改来继承剩余项
        - 若本轮正文没有足够线索支撑 2~5 项可信新机遇，则优先少给、精给，或直接 replace []；不要拿上一轮旧项凑数

  本尊:
    等级:
      range: 1~48
      check:
        - 仅在突破成功或渡劫成功时 +1；/本尊/境界描述 为只读派生字段，只更新等级不手写境界名
    修为:
      range: ">=0"
      check:
        - 表示当前小境界内积累值，不是总修为；直接写真实数值，不写百分比
        - 只有本轮正文明确出现 打坐、闭关、炼化丹药、双修采补、战后消化感悟、临阵顿悟、传承灌顶 等修炼过程时，才允许改动 /本尊/修为；纯对话、暧昧拉扯、赶路、购物、观察、普通探索、普通休息 默认不变
        - 练气-筑基：短时吐纳/战后调息 +3~12，闭关半日~数日/稳固根基 +12~35，丹药/双修/小机缘 +20~60，传承/顿悟/大机缘 +60~150，重伤/走火/失败 -10~60
        - 更高大境界不要按低境界数值简单线性放大；应优先拉长积累周期、降低上涨频率，宁可多回合不涨，也不要因为境界更高就每轮稳定增长一大截
        - 同一天或同一连续场景内重复修炼，第二次起收益明显递减；若无跨日闭关、长期炼化、环境跃迁级机缘等明确描述，不得连续多轮稳定上涨
        - 修为达到突破阈值的 80% 后，普通修炼与日常调息收益减半；达到 90% 后，只有闭关、破关丹药、生死战后感悟、重大机缘才允许继续增长；达到阈值后若未正式突破，修为原则上不再上涨
        - 同回合若既无闭关、丹药，也无机缘、传承，不要写过大的修为暴涨；突破成功后修为归零
    修炼状态:
      check:
        - 阶段仅允许：修炼中、瓶颈中、突破中、稳固中、压境中；常态积累=修炼中，接近阈值或缺契机=瓶颈中，正式冲关=突破中，刚突破=稳固中，主动压境=压境中
        - 瓶颈原因、突破目标 仅在 瓶颈中、突破中、压境中 时更新；上次结果仅允许 无、成功、失败
    尝试突破:
      check: [兼容旧档镜像；若同时更新该字段，必须与 /本尊/修炼状态/阶段 同步，突破中=true，其余阶段=false]
    身份:
      check:
        - /本尊/身份/宗门 表示当前归属或势力标签，/本尊/身份/出身 表示核心身份或来历；拜入、叛逃、被逐、改换门庭、受封、伪装公开、身份暴露、名号更替时更新，未发生变化时不要为润色改写
    灵根:
      check: [仅在觉醒、变异、受污、破损、伪装解除、洗练重塑等明确事件后更新]
    体质:
      check: [仅在觉醒、蜕变、夺舍改体、洗髓、重创致残、补全修复等明确事件后更新；灵根、体质一旦更新，名称必须与剧情结果一致]
    功法:
      check: [只写当前主修功法；获得传承并真正改修、废功重修、主修路线切换时更新；若带来新神通需同步到 /本尊/神通列表]
    神通列表:
      type: "{[名]:{名称,描述,类型,品阶,熟练度}}"
      check:
        - 新神通用 insert 完整对象
        - 熟练度仅允许：入门、熟练、精通、大成、圆满、化境；禁止 初窥门径、小成、中成、大圆满 等别名；品阶仅在顿悟、传承、关键机缘时提升
    本命兵器:
      check: [仅在认主、祭炼成本命、兵器破碎、弃用、重铸、更换本命路线时更新；未正式拥有时写“无”]
    灵石:
      range: ">=0"
      check: [普通货币只写 /本尊/灵石；禁止写入 /本尊/背包/灵石 或 /本尊/杂物袋/灵石]
    已活岁月:
      range: ">=0"
      check: [岁月推进、寿元损耗、沉睡或特殊时间流逝事件时更新]
    行踪:
      check:
        - 位移、场景切换时必须同时 replace /本尊/行踪/所属层级 与 /本尊/行踪/当前区域
        - 所属层级仅允许：天层、神州、东苍、南炎、西庚、北冥、四海、下层；当前区域必须是具体地点链，禁止只写大层级或写成 地层·xx、天层·xx、下层·xx
        - /本尊/行踪/危险度 表示当前区域对本尊的即时风险，范围 0~100；进入新区域、遭遇强敌/天灾/阵法/伏击，或确认环境安全性显著变化时 replace；若局势未变则不改
    背包:
      check:
        - 默认储物路径使用 /本尊/背包/{物品名}；新物品 insert 完整对象；现有物品数量变化用 delta 或 replace /数量；数量<=0 时 remove 整个物品路径
        - 丹药、符箓、材料、玉简、食物、钥匙、地图、信物、阵旗、战利品等普通可携带物，只要明确获得并带走，必须写入背包
        - 买下、拾取、搜刮、收起、获赠、炼成、分到战利品时要入包；吞服、使用、送人、卖出、遗失、被夺、损毁时要同回合同步减量或移除
        - 只看到、只提到、只是想买、属于别人、仍在环境中、当场即食未留存的物品，不要写入背包
        - 同一物品同一时刻只保留在一个库存路径；普通货物默认放背包，不要和 /本尊/法宝 或 /本尊/杂物袋 重复登记
        - 若正文已明确写出本尊把某件普通物品拿到手、收入口袋、收入储物戒或带离现场，而 JSONPatch 没有对应背包 patch，视为漏更
    法宝:
      check:
        - 路径使用 /本尊/法宝/{法宝名}；飞剑、阵盘、护符、飞舟、法印、铃、镜、甲、鼎、珠等可长期持有的宝物写在这里
        - 获得、认主、夺得、获赠、借入、修复、损毁、遗失、被夺、借出不还时必须同步更新
        - 普通丹药、材料、玉简、食物不要写进法宝；一次性法宝若当回合用尽、炸毁、烧毁，应当回合 remove
        - 若正文明确获得的是可长期持有的宝物、兵器、阵盘、护符、飞舟等，而 JSONPatch 未写入 /本尊/法宝，对应视为漏更
    杂物袋:
      check:
        - /本尊/杂物袋 默认少用；只有剧情明确区分次级储物、临时杂囊、破旧储物袋或低价值杂物暂存时才写这里
        - 若剧情没有明确区分容器，所有普通可携带物统一记 /本尊/背包，避免物品被藏进不可见路径
    战斗状态:
      check:
        - 开战时 /本尊/战斗状态/正在战斗=true，结束时=false；战中施法、神通通常令灵力值 -10~30；灵力值范围 0~100，修炼、休息、丹药、日常可恢复
        - 伤势按 无伤→轻伤→重伤→濒死 推进；本尊不死，濒死时触发双鱼佩护主脱战，代价为沉睡 1~7 天与冷却 30 天
    当前敌人:
      type: Array<{名称,境界,战力评估,状态,特点}>
      check: [开战时 replace 整数组；战中按受伤、死亡 replace /状态；战斗结束时 replace 为 []]
    渡劫状态:
      check:
        - 金丹及以上突破前必须先渡劫；仅在渡劫成功后才可等级 +1
        - 开劫时 /本尊/渡劫状态/正在渡劫=true，劫力承受初始 100；受劫通常 -10~30，≤0 判失败
        - 结束时必须 /本尊/渡劫状态/正在渡劫=false，并清空 劫种、劫难等级、当前阶段、总阶段数、劫难描述、触发原因；若要保留余波，只允许保留 劫力承受、已用护道、上次渡劫结果、渡劫冷却、失败惩罚记录
        - 成功时必须同时更新：等级 +1、修为归零、修炼状态/阶段=稳固中、修炼状态/上次结果=成功、尝试突破=false；失败时至少更新：修为下调、修炼状态/上次结果=失败、尝试突破=false

  红颜:
    红颜.${角色名}:
      type: "{等级,修为,灵根,体质,功法,本命兵器,神通列表,灵石,已活岁月,尝试突破,修炼状态,好感度,关系,关系上下文}"
      check:
        - 首次遇见、结识、收为同伴时，必须先 insert 完整对象；角色不存在时禁止直接 delta 好感；已存在角色时禁止再次 insert 同一路径
        - 非关键剧情中单回合最多推进 1 位红颜的修炼成长；虞汐与虞颜必须分别描写
    好感度:
      range: -200~200
      check: [0~20 最多 ±6，21~60 最多 ±4，61~120 最多 ±3，121+ 最多 ±2；虞颜下限 30；更新现有红颜时只能用 /红颜/{角色名}/好感度 的 delta]
    关系:
      check: [关系只能用 /红颜/{角色名}/关系 的 replace]
    关系上下文:
      check:
        - 仅允许：当前情绪、态度缘由、关系诉求、相处禁忌、未了约定
        - 只在关系明显波动时更新，如心动、误会、吃醋、承诺、决裂；单回合至多更新 2 个字段
    修炼成长:
      check:
        - 修为增减逻辑与本尊同类，但日常通常不超过本尊同类增幅的五成；若本轮正文未单独描写其修炼、受创或获得机缘，默认不改修为
        - 红颜修炼更偏背景推进，除非本轮焦点明确落在她身上，否则不要陪跑式每轮都涨
        - 接近或达到突破阈值时，优先更新 /红颜/{角色名}/修炼状态/阶段 为 瓶颈中 或 突破中
        - 突破成功时必须同时更新：等级 +1、修为归零、修炼状态/阶段=稳固中、修炼状态/上次结果=成功、尝试突破=false；失败时至少更新：修为下调、修炼状态/上次结果=失败、尝试突破=false

  NPC图鉴:
    check: [互动、观察、确认身份时更新]

  任务列表:
    type: "{[任务ID]:{名称,类型,目标,状态,秘境信息?,创建时间}}"
    check:
      - 任务类型仅允许：主线、支线、每日、临危受命、秘境探索
      - 路径必须使用 /任务列表/{任务ID} 或 /任务列表/{任务ID}/目标；禁止使用 ./任务列表 或 stat_data.任务列表
      - 新任务用 insert 完整对象；对象至少包含 名称、类型、目标、状态；默认状态为 进行中
      - 推进任务时 replace /目标 或必要字段；状态变为 已完成 或 已失败 时必须 remove 该任务，禁止 replace 为终态
      - 任务ID 与 名称 都必须是中文短语，可带少量数字；禁止 MQ、SQ、DQ、UQ、Q1、task_01、main_quest、sidequest 等英文、拼音、缩写、代号
      - 同时进行中的主线任务不宜超过 3 个

  声望系统:
    type: "{[势力]:{值,关系}}"
    check: [与势力互动、结仇、立场变化时更新]
