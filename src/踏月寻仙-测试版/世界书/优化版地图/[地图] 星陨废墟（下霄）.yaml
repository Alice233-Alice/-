[地图] 星陨废墟（下霄）

【星陨废墟·陨仙坟场】极危·险度90·非化神莫久留
定位: 九天罡风带之上、天渊侧, 去地3-5万丈下霄; 天界崩碎残骸被天渊引力与乱流堆成废墟海。
特性/涉足: 空间极不稳(一步百里), 古仙执念神通随机触发; 须穿罡风持镇空宝, 自备灵石。
连通: 下经罡风带通天渊; 虚空边缘朔日涟漪可达九天遗迹。
分域: 仙宫残骸带(玉简丹方); 飞舟坟场(货舱残宝); 陨落仙台(法则碎片/仙魂); 虚空边缘(通中霄)。
奇珍/风险: 古仙遗蜕、星核原矿、仙舟龙骨; 法则碎片、虚空游鳐、陨落执念。
异变/访客: 天渊潮汐时星辰共鸣, 短暂拼出古仙城壁画铭文; 太虚蜃楼、万象森罗坊、化神散修曾探。

