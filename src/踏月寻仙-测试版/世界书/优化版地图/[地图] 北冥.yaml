[地图] 北冥

【北冥·玄武灵境】低危·险度30
定位: 神州北方水域; 冰海、琉璃雪原、冰雪仙城、鲛人珊瑚宫并存, 玄武蛰伏深海, 灵息化潮。
法则: 水/冰法+5成, 心境空明, 火法-3成; 水产、海贸、寻幽探宝兴盛。
连通: 南接神州; 极北海眼被阵法封印, 下通归墟。
势力: 坐忘冥海阁(冰雪道, 镇极北); 泣珠幻海庭(鲛人王族, 音律幻术, 富甲四海); 渡厄幽帆(横渡北冥商船)。
地标/资源: 极光雪原(悟道); 珊瑚海市(水族交易); 玄武灵泉(洗髓); 玄冥真水、万年冰魄、鲛人泣珠。
风险: 寻常海域安宁; 极北深海、归墟封印附近有暗流和深海巨兽。
市井: 冰海渔村取灵鱼胃中"冰珠"; 渡厄幽帆码头刻归人石、冰盏楼祭归人; 鲛人海市以陆上玩物换珍宝, 在许听雨像前述日常寄思念。

