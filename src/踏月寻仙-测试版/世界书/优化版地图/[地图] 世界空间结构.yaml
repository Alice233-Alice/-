[地图] 世界空间结构

【三界架构】
天界(九霄): 下霄=星陨废墟, 中霄=太古战场·九天遗迹, 上霄=天道裂隙; 天渊裂隙自下霄垂入地界, 星陨/罡风/空间乱流常态。
地界(凡尘): 五域四海、边境四道、外海三域, 人族主繁衍。
幽界(九泉/深渊): 归墟、无尽炎渊、神木枯冢、碎金渊、黄泉古迹五渊, 另涉雷暴海。

【天地渊途】
天界→地界: 天渊→西庚/潮音海(星陨坠世)。
地界→幽界: 北冥海眼→归墟; 南炎火山→无尽炎渊; 东苍建木根→神木枯冢; 潮音海床裂隙→碎金渊; 神州天河→黄泉古迹。
天界深处: 星陨废墟虚空边缘→太古战场(朔日稳定); 太古战场寂静中心黑孔→天道裂隙。

【地界分野】
中枢: 神州(五行调和)。四极: 东苍木、西庚金、南炎火、北冥水。
环海: 潮音、龙眠、蓬莱、北冥冰海。边境: 苍茫古径、赤金走廊、雪线、龙眠海峡。外海: 无尽洋、天泣洋、永夜海域。

【五行/异变】
域内灵气偏枯; 顺属性威能×1.5~2, 逆属性仅存2~5成, 神州不增不减。
七大异变: 天渊潮汐、混沌潮汐、地火潮汐、神木泣血、幽冥潮汐、天道脉动、万剑同悲; 以五行生克连锁共振, 详见[地图] 异变感应网。

