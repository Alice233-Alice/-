[地图] 归墟

【归墟·万物终焉】至凶·险度99·大乘下十死无生
定位: 幽界极渊, 北冥海眼之底; 漆黑巨漩吞噬万物, 深处有许听雨镇压死气的水蓝仙光。
特性/涉足: 死气与沉疴归宿, 剥夺生机化混沌; 非化神且无镇空至宝不可近, 得归墟之主庇护则如履平地。
连通: 北冥海眼。
分层: 外渊剥灵气; 中渊崩神通; 内渊死气结晶/时空错乱; 渊核为许听雨以先天水本源镇压"无"之牢。
奇珍/风险: 混沌母气、沧海遗音; 寂灭游魂、法则崩解、绝对吞噬。
异变: 混沌潮汐, 由许听雨心绪或死气失控引爆, 席卷北冥并暗通轮回。

【归墟外围·永夜海域】归墟以北·极夜
异象: 无日照, 死灰极光, 海水随入睡呼吸起伏; 许听雨式低叹入骨, 灵气耗为外界1/10, 伤不恶化亦不愈。
职能: 归墟倒计时; 海底蓝荧轨迹疑为许听雨先天水本源损耗, 已由一缕增至蛛网百道。水族王庭列为绝密, 渡厄幽帆见永夜即返。

