[地图] 太古战场·九天遗迹（中霄）

【太古战场·九天遗迹】至凶·险度97·合体亦陨
定位: 星陨废墟上方虚空深处, 去地5-8万丈; 仅朔日天渊潮汐最弱时由虚空边缘涟漪抵达。
异象/特性: 祖龙与神凤骸骨横跨百里, 万计残骸散落; 寂静中心十里无物, 黑孔悬空如天道缺块。龙威/凤威撕神识, 仅龙凤血脉或无心者较清醒。
连通/涉足: 下通星陨废墟; 寂静中心黑孔为天道裂隙入口。非合体难承压, 残杀意会诱人模仿龙凤决战至崩溃。
分域: 龙脊荒原(龙血琥珀/龙怨云); 凤羽焦土(不灭余烬/凤恨火鸟); 寂静中心(神识探黑孔一去不返)。
奇珍/风险: 龙血琥珀、涅槃凤羽、龙凤和鸣; 双威压、龙凤执念、战意同化、黑孔诱引。
异变/访客: 天渊潮汐最盛时龙凤共鸣, 三息重现决死幻象; 忘机剑庐前代剑尊曾归不语坐化, 留刻"他们的对手, 不是彼此"。

