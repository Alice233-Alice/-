[地图] 异变感应网

【异变感应网·世界脉动】

概述: 七大异变(天渊潮汐、混沌潮汐、地火潮汐、神木泣血、幽冥潮汐、天道脉动、万剑同悲)并非孤立天灾。太虚蜃楼两千年观测称其为"世界脉动": 一处爆发会沿五行/深渊通道改变另一处爆发概率、时间或形态。

【五行相生链】生方爆发会提高被生方概率
- 火生土: 地火潮汐→幽冥潮汐。地火扰地脉, 热浪沿暗河至天河源, 黄泉雾散, 轮回幻境残片显现。
- 土生金: 幽冥潮汐→万剑同悲。黄泉死气入潮音海下, 残剑感应而"剑哭"; 剑痕铭文更清, 无形断刃倍增。
- 金生水: 万剑同悲→混沌潮汐。金气液化入深海, 归墟水本源感知; 许听雨所镇之"无"对先天金气敏感, 死气侵蚀短强。
- 水生木: 混沌潮汐→神木泣血。归墟水灵暴走渗地底, 激活枯冢畸变生机; 潮汐越强, 泣血越提前。
- 木生火: 神木泣血→地火潮汐。建木排死气堵塞无尽炎渊赤焰层灵脉, 数月不疏则地火喷薄。

【五行相克链】克方爆发会压制、延迟或改写被克方
- 水克火: 混沌潮汐使地火潮汐推迟数年, 但下次强度约+3成。
- 火克金: 地火潮汐使万剑同悲提前、更烈、持续更短。
- 金克木: 万剑同悲使神木泣血妖藤暴动加剧, 总时长缩短。
- 木克土: 神木泣血使幽冥潮汐范围更广、峰值减弱, 黄泉入口短暂错位。
- 土克水: 幽冥潮汐使混沌潮汐延迟, 积压后爆发规模更大。

【特殊感应】
- 归墟↔天渊: 近乎同步共振, 是"无"与"缺"的上下回声。
- 天道脉动→所有异变: 脉动后一年内深渊异变概率约+1成; 频率加快至"永夜阈值"时, 五大深渊将永久异变。
- 万剑同悲→天渊潮汐: 单向牵引。天渊乱流会生无名剑意, 随星陨坠回碎金渊; 碎金渊疑似在召回上层剑意碎片。

【修士可触发节点】
- 天渊潮汐: 触碰龙凤古战场界壁迷阵中"祖龙爪痕"坐标, 或投未炼星核入渊核。
- 混沌潮汐: 归墟外渊大规模释放死气功法, 使寂灭游魂冲击渊核并牵动许听雨镇压力。
- 地火潮汐: 无尽炎渊黑焰层下强降祝融神火, 引整座炎渊火阶同步攀升。
- 神木泣血: 采伐/火焚/死气灌注建木本体, 令根系排泻过载。
- 幽冥潮汐: 轮回井旁唤醒亡魂、生魂入井, 或干扰晚棠梦游/燃尽净世幽莲。
- 万剑同悲: 碎金渊断刃崖以两道相反剑意全力对撞, 令无形断刃显形碎裂并小范围剑哭。

【同发共振案例】
- 三千年前天渊潮汐+混沌潮汐: 星陨轰潮音海, 死气席卷北冥; 剑意长城崩三十里, 北冥冰海冻半年。十里祖龙颈椎坠太白剑宗前, 后炼名器"龙骨悲歌", 每次挥动引碎金渊无规则剑哭。
- 古事"南炎无声": 天道脉动+地火潮汐疑似同发, 南炎一城蒸发, 三千修士二十万凡人无骨无灰, 城址转冷如霜。太虚蜃楼推测归墟之"无"曾借地火裂隙窥见天道裂隙。

【近五百年周期】
- 天渊潮汐: 约20年一次, 因归墟共振近年加快。
- 混沌潮汐: 无固定周期, 受许听雨心绪、寂灭游魂数量、近距离修士活动影响。
- 地火潮汐: 约100年一次, 近三次间隔97/98/104年。
- 神木泣血: 约1000年一次, 下次预计二百余年后; 万剑同悲后可提前。
- 幽冥潮汐: 甲子一遇, 晚棠梦境被动摇时紊乱。
- 天道脉动: 无周期且加快, 近千年次数约等于此前五千年总和。
- 万剑同悲: 无固定周期, 常在剑修突破大境界后短时发作。

