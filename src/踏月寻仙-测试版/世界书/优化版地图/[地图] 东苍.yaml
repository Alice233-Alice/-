[地图] 东苍

【东苍·青帝仙乡】低危·险度20
定位: 神州东方木域, 巨木托起树冠仙城, 人族与木灵共居; 青龙镇守, 甘霖福泽。
法则: 木法/医道+5成, 寿元流逝缓, 金法-3成; 利培育灵植、疗伤、养老、求药。
连通: 西接神州, 东临龙眠/蓬莱二海; 建木深根下通神木枯冢。
势力: 苍木龙吟阁(御兽双修); 灵枢百草谷(医修/灵植圣地); 浮云朝露阁(灵药商盟)。
地标/资源: 建木神树、百花秘境、青帝苑; 青木灵液、飞天神木、化形灵参。
风险: 寻常仙城治安极佳, 禁私斗毁林; 原始秘境有树人、远古遗迹、迷雾阵。
市井: 根城凡人照料建木根; 采药村靠秘境外围叶芝为生, 百草谷低价坐诊; 叶脉长廊售森林奇物, 忘忧茶可温和替换痛苦记忆。

