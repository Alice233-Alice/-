[地图] 天渊

【天渊·天之伤痕】极危·险度95·非元婴勿入
定位: 九霄天界悬空裂痕, 去地三万丈; 长三万里宽百里, 边缘七彩空间乱流, 星陨自此坠世。
特性/涉足: 光阴错乱, 岁月无常; 结丹方可凌空, 须御空避流异宝, 每月朔日空间片刻安宁。
连通: 星陨之径直坠西庚与潮音海。
分层: 乱流带(结丹极限); 星辰冢(陨石海); 龙凤古战场; 渊核(空间断绝、通未知)。
奇珍/风险: 星核、龙凤遗血、空间道纹; 虚空游鳐、星陨雨、界壁迷阵/残留杀意。
异变: 天渊潮汐与归墟呼应, 起时星陨坠世、龙凤幻影重现。

【九天罡风带】险度90: 元婴下触之成齑粉; 产罡风精粹。

