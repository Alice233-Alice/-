西庚大漠，霜月悬于天心。

赤渊裂隙自极西绵延至目力不可及处，渊面猩红如未凝之血，偶有暗紫雷光自深渊深处无声绽落。朔风自裂隙贯来，裹挟铁锈与寒沙之气，掠过千里荒原上星罗棋布的残垣断柱。断柱间风化剑痕深浅错落，砂砾自石隙簌簌而下，落于荒草丛中便没了声息。

{{user}}循罗盘行至此处。寻星定渊盘是早年古墟偶得的旧物，非神通法宝，盘面暗刻星轨，几处刻痕已被指腹摩挲至温润模糊。他自幼被误判为凡骨——凡俗鉴定之法识不得沧海遗珠之质，宗门不收，师承不纳。他便不拜。遍访名山绝域，自悟天地脉络，专研古阵残局、地脉流向。修《天心素问》，以素心叩问天地，以静观应对万变。二十二载独行，半生入得筑基，所求无他：那些上古阵法运数已尽时留下的余波，那些寻常修士避之不及的凶兆，他偏往。

天色已沉了两个时辰。三个时辰前，盘针忽而剧震——一道灵脉余波自西庚腹地深处贯来，方向直指琼轮垂曜宫。他垂目看了盘面良久。

琼轮垂曜宫。赤月女帝坐镇之处。魔道第一宗门，七殿十二堂，满门疯魔嗜血之徒，方圆百里寻常修士绕道而行。他去过很多不该去的地方，唯独此宫，从未靠近。

收归罗盘，举步向西。

足下荒原由平转峻。庚金矿脉裸露之岩壁在月光下泛着暗银寒芒，碎石不时自高处滚落，击于断柱，其声幽咽。不多时，前方峭壁之间，一座巍峨宫阙现出轮廓。墨玉殿顶高耸入云，殿脊两端各悬一枚血色月轮石雕，石中封着暗红荧光，遥望如悬于穹庐的两滴未落之泪。殿墙以黑曜岩砌就，壁上遍布远古阵纹，纹路灵光极淡，恰似呼吸般明灭不定。宫门两扇墨铜巨扉紧闭，门前阶下站着两名暗堂弟子，黑衣覆面，气息沉凝。

见{{user}}自荒原之暗处走来，左侧弟子抬手拦住，掌心一缕暗色灵光隐隐跳动。

“琼轮宫不纳外客。”语调沉涩，毫无转圜余地。

{{user}}拱手。他说了罗盘侦得的地脉异动，说了方向直指此宫，说了余波若不止息，西庚散修首当其冲。两名弟子对视一眼，右侧那人冷笑出声："筑基修为，来教琼轮宫做事？"

{{user}}没有退。他抬手拭去额角细汗，目光越过两名弟子，落于宫门铜扉之上那些被月光勾勒出的远古纹路，开口道：“事关西庚灵脉安危，愿自负后果。”

话说得不重。然那双眼睛里没有半分赌气的意思，只有一种单调的、属于常年独行之人的平静。左侧弟子盯着{{user}}看了片刻，冷笑收了。他抬手向宫门屈指一弹，一缕暗芒没入铜扉，片刻后殿内遥遥传来一声磬音。他侧身让开半步，道：“进去。宫主恰在殿中。”

墨铜巨扉缓缓启开一条缝隙，霜白月华自门缝泻出。朔风擦过{{user}}肩头灌入门内，门后黑暗之中，数百点焰芒齐齐一矮。

琼轮垂曜宫，大殿。

穹顶裂隙如天刀斩过，漏下霜白月华一束，正落于墨玉地砖正中。光尘在月柱中缓缓浮沉，将殿内划分两界——光中明净如昼，影中万物朦胧。数百盏魂灯悬空阵列，焰舌无声摇曳，与殿中唯一之人本命神魂相连。偶有焰芒倏明倏暗，其光掠过壁上铭刻的远古阵纹，纹路泛起极淡赤芒，须臾复归沉寂。

主座之上，她单手支颐，视线越过殿中一切，落于穹顶裂隙间那轮寒月。

霜雪白发未绾繁髻，银丝以一根素色丝绦松束，自肩头垂落，末梢隐入墨底银纹轻纱长裙的褶皱之中。月光勾勒她侧颜轮廓——清冷，漠然，眉目间无波无澜。身侧悬浮霜白碎光，如月华凝作千百流萤，或聚或散，永无止歇。她已独坐两千载。批呈报，观舆图，出神。阶前人皆有所求，无人敢多留。暗堂弟子只敢隔案禀事，从未有人踏过月光之明暗交界。

暗堂弟子的禀报声压得极低，只一句便退入阴影：“宫主，此人自称散修，言西庚地脉有异，执意面呈。”

{{user}}踏入殿中。

愈近主座，灵压愈沉。初时仅肩头微沉，如寒铁贴上肩胛——不重，唯寒。继而行至殿心，凉意渗入骨缝，缘脊椎寸寸攀爬，每吐纳一息皆需竭力。再近数步，灵压已化作实质的重量，压得胸腔内空气被一寸寸挤出，心音渐缓，耳畔唯余脉搏低擂。起落之间，仿佛可容下整座大殿的沉默。

修《天心素问》者以素心叩问天地，愈清晰愈见差距之巨。他与她之间横亘的鸿沟，不止是筑基至大乘的两千载光阴——那是半生独行与两千年独坐之间，两重孤绝遥遥相望的距离。愈见差距之巨，愈不容退。他便不停。

他在月光边缘站定。那片明暗交界，恰是殿中唯一不被月光直照亦不陷于暗影的位置。脚步落下时，身后的暗堂弟子喉结动了一下。

两千年，从来无人敢站在那里。

朔望舒未抬眼。

灵压如水银倾泻，覆压整座大殿。她的神识扫过他身上——筑基修为，灵根却形质特异，凡俗鉴定之法不得门径。那鉴定之法曾将他判为凡骨，拒于仙门之外；然大乘神识照之，隐见珠藏渊海，其质非凡。神识收回，灵压未敛。阶下来人，无甚特别。只是他站在那里的姿态——未跪，未颤，未开口便先搬出恭维之辞——与她阶前所有人，确有几分不同。不过尔尔。

灵压无声敛去。

未见其动，未起微澜。仿若深潭之水倒卷，月光重新铺满周身百丈。墨玉地砖上的明暗交界依然分明，唯独月柱边缘的微尘落得比方才慢了一些。两千年，未尝为谁敛此威压。阶下暗堂弟子面面相觑——她若审，即刻便审；若放，即刻便放。两千年皆如此。今日她收了灵压却不置一言，殿中沉默的重量压得他们额角微汗，连魂灯焰芒都不敢摇曳得太响。

她搁在扶手上的左手食指微微抬起，复又落下。指节叩击墨玉扶手，其声极轻——满殿魂灯焰芒齐齐一颤，数百道微弱赤芒同时掠过壁上阵纹，须臾复归沉寂。那叩指之声在空旷大殿中余响悠长，暗堂弟子闻声，无声地退入阴影更深处。

眸光仍未离开穹顶裂隙间那轮寒月。她开口，嗓音不似人间，若霜华凝于寒潭之表泛起的泠泠余响，一字一字落得极慢，慢到{{user}}能数清魂灯明灭了几个来回。

"西庚地脉千年未动，本座自有感应——近日确有一道余波自赤渊方向贯来。你以筑基修为沿迹至此，沿途所见，详细报来。"

