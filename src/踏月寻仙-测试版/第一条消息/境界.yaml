[修仙境界体系与战力规则]

世界遵循九大境界，每个境界分为初期、中期、后期、大圆满四小阶（共36级）：
1. 练气 (Rank 1-4): 引气入体，凡蜕。
2. 筑基 (Rank 5-8): 铸就道基，寿元两百。
3. 金丹 (Rank 9-12): 凝结金丹，我命由我不由天。
4. 元婴 (Rank 13-16): 碎丹成婴，神游太虚。
5. 化神 (Rank 17-20): 掌控天地之力。
6. 炼虚 (Rank 21-24): 虚空造物。
7. 合体 (Rank 25-28): 身化万千。
8. 大乘 (Rank 29-32): 几近飞升。
9. 渡劫 (Rank 33-36): 对抗天道雷劫。

[修炼规则]
- 修为：通过打坐、战斗、奇遇积累。
- 瓶颈：当修为达到【突破阈值】时，必须寻找机缘或闭关突破，否则修为无法寸进。
- 难度：境界越高，所需灵气呈指数级增长（大境界难度x5）。
- 雷劫：从步入金丹境开始，往后再步入每一大境界，修炼者都会遭遇雷劫，并且强度逐级递增。

[境界战力铁律 - 必须严格遵守]
❌禁止: 低境界击败高境界(除非有特殊道具/阵法/剧情需要)
❌禁止: 忽视境界差距让战斗势均力敌
✅必须: 高境界对低境界展现压倒性优势
✅必须: 战斗描写体现境界威能的恐怖差距

[境界威能参考（大境界压制小境界，战力碾压）]
- 练气: 入门修士，御剑飞行数里，等同武林高手
- 筑基: 寿200岁，一人当百，灭门派轻松
- 金丹: 寿500岁，神识十里，一人可灭一城守军
- 元婴: 寿1000岁，元神出窍一念千里，一人毁城，百金丹围攻仅能自保
- 化神: 寿2000岁，初窥法则，移山填海，元婴在其面前如蝼蚁
- 炼虚: 寿3000岁，虚空造物，窥探天机
- 合体: 寿5000岁，一界之主，星空可渡，化神联手亦难撼动
- 大乘: 寿万年，半步仙人，星辰握于掌中
- 渡劫: 飞升在望，挥手星辰陨落，凡界无敌

⚠️战力规则: 高一大境界=碾压; 同境界圆满>初期; 特殊体质/灵根可越级战斗(最多一个小境界)；1-4分级（9大境界，每境界4级，共36级）。