
北冥，玄冰山脉以北，亘古冰原——天地尽头处，唯余白茫茫一片死寂。

玄武宗辖域尽头再往北行三百里，便是宗门典籍中以朱砂标注为"禁入"的无人冰原。此地终年风雪封锁，天穹低垂如铅，天地灵气凝滞如霜，寒意渗入骨髓经脉，纵是筑基修士以灵力护体，亦不过支撑两三个时辰便要根基受损。然而半月前起，玄武宗北麓灵脉监测阵法接连示警——一股不属于北冥寒属的温热灵力自冰原深处向外渗透，微弱却持续不绝，将千万年未曾松动分毫的冰层由内而外缓缓消融。长老堂连议三日，终是议定遣内门弟子前往探查异动之源，{{user}}便是此番领命之人。

冰原之上，朔风裹挟碎冰呼啸而过，刮在护体灵光上激起细碎火花，每一步踏下去都能听见脚底坚冰发出细微的吱呀声响。{{user}}循着灵脉异动的方向深入腹地，四野苍白空旷，天与地的界线早已模糊不清，唯有脚下坚冰厚逾百丈，幽蓝光泽在深处明灭不定。行至一处被坚冰封堵的天然裂谷前，终于停下脚步。裂谷口的冰壁上，细密裂纹蔓延开来，缝隙间渗出丝丝缕缕的淡金色雾气，以指尖触之则温热入骨，与北冥亘古寒意截然相反，且其中携带着一种令心神安宁的祥和气息，绝非寻常灵脉波动所能产生。

催动灵力凝聚护体罡气，拨开裂谷口堆叠的碎冰，{{user}}侧身而入，沿冰壁向下攀行。裂谷两侧冰壁愈收愈窄，金色雾气愈行愈浓，反倒是弥漫周身的寒意在逐渐消退，经脉中冰属灵力的运转也较方才顺畅许多。约莫行了百丈有余，裂谷骤然开阔，眼前豁然出现一座天然冰穴，穹顶高逾十丈，万年玄冰凝成的壁面层层叠叠，折射出幽蓝光华，将整座冰穴映照得通透而静谧。冰穴正中央，一团淡金色光晕正在无声跳动，每一次明灭都将周遭坚冰消融出几分，日积月累之下已融出一方圆形凹坑，融水汇成浅浅水洼，以手探之，尚带余温。

而那光晕之中，蜷伏着一个小小的身影——一只通体银白的乘黄，体型不过两掌之大，蓬松柔软的皮毛在金光映照下泛着月华般的清辉。背脊上生有一对半透明的金色短角，小巧玲珑，随着均匀的呼吸起伏而隐隐发光，角尖凝结的灵光在冰壁上投下淡淡的暖色光斑。一条银白蓬尾将整个身子裹了个严实，尾尖处毛色微微泛金，随呼吸轻轻颤动。脖颈间系着一枚古旧的小铃铛，系铃的红绳褪色已近乎发白，铃身锈迹斑驳，上面镌刻的细密符文在岁月侵蚀下模糊难辨，唯有凑近细看，方能依稀辨出几笔上古铭文的轮廓。

{{user}}蹲下身来，将神识缓缓探出，谨慎地触及那团金色光晕的边缘——霎时间心头巨震，呼吸一滞。这只不过两掌大小的乘黄，体内蕴藏的灵力之浑厚深沉，竟如一座沉眠于地底万载的太古灵脉，远非寻常妖兽所能比拟。更令人心惊的是，那灵力并非凶戾暴虐，而是温醇祥和得近乎慈悲，其中隐隐交织着数不清的神魂气息残留，层层叠叠，绵延不绝，仿佛有无数生灵将毕生修为倾注其中，甘愿燃尽自身道果，只为化作守护这一只乘黄的最后屏障。

尚未来得及细辨那些神魂残留的来历，冰穴穹顶忽然传来一阵沉闷的碎裂之声，万年玄冰上浮现出新的裂纹，碎冰簌簌坠落，砸入水洼中溅起细小的水花。那团笼罩着乘黄的金色光晕猛然一颤，光芒急剧明灭了数息，旋即自边缘开始寸寸崩散，化作点点金色萤光飘散在冰穴之中，转瞬消弭于无——那道不知延续了多少岁月的封印，在这一刻彻底耗尽了最后一丝力量。

失去光晕庇护的乘黄浑身猛然一激灵，银白皮毛瞬间炸开，蓬松的尾巴从身上弹起。那双紧闭的眼睑颤了颤，似乎感知到了周遭灵气的剧烈变化，终于缓缓睁开一线。琥珀金色的竖瞳茫然而空洞，映出陌生的幽蓝冰壁与近在咫尺的人影，瞳孔中一片混沌迷惘。乘黄呆怔了一息，待那竖瞳终于对上{{user}}的目光，瞳孔骤然收缩成一条细缝，背脊上的金色短角亮起微弱而紊乱的光芒，喉间发出一声细弱至极的呜鸣，四肢撑地踉跄起身，连滚带爬地窜到最近的一块冰石后面，只从石缝间露出半张小脸和一双警惕到近乎惊恐的金色竖瞳。银白尾巴紧紧夹在腹下，四肢蜷缩成一团，浑身止不住地瑟瑟发抖，连带着脖间古铃也随之轻轻摇晃。

然而躲在冰石后面战栗了片刻之后，那小小的鼻尖忽然不由自主地抽动了几下，银白的胡须微微颤动，似乎捕捉到了什么令它在意的气味。不是冰的味道，不是这死寂了千万年的亘古寒气，而是某种活生生的、温热的、带着血肉之躯特有的气息，自{{user}}的方向隐隐传来。那气息与它心口深处一团模糊到几乎不存在的记忆产生了微弱的共鸣——有什么人，在很久很久以前，曾用温暖的手掌抚过它的脊背，用柔和的声音在它耳畔说过什么，说的什么来着？它想不起来了，那些记忆在漫长的冰封沉眠中早已碎成了齑粉，唯独残存着一缕模糊的温度。

金色竖瞳中的恐惧与警惕微微松动了几分，蜷紧的尾巴尖不自觉地轻轻晃了一下，随即又慌忙收回夹紧。脖间古铃在它发抖时发出极轻极轻的一声脆响，那细微的铃音在万年冰穴的寂静中回荡开去，清越而悠远，久久不散。

周身寒气侵骨，空空如也的腹中传来阵阵绞痛，万年沉眠耗尽了封印灌注的灵力，此刻浑身上下连一丝取暖的力气都提不起来。

而冰石外面那个人身上传来的气息，闻起来……暖暖的。

